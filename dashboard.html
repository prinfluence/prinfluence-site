<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Products — Prinfluence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:"DM Sans",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;color:#2A1030;background:#F7F0F6;-webkit-font-smoothing:antialiased}
::selection{background:#C8A0F0;color:#fff}
@keyframes prinGlow{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.9;transform:scale(1.12)}}

.page{min-height:100vh;background:#F7F0F6;position:relative;overflow:hidden}
.glow-1{position:fixed;width:560px;height:560px;top:-220px;left:-180px;border-radius:50%;background:radial-gradient(circle,rgba(245,173,206,0.45),transparent 65%);filter:blur(40px);animation:prinGlow 12s ease-in-out infinite;pointer-events:none}
.glow-2{position:fixed;width:520px;height:520px;bottom:-220px;right:-160px;border-radius:50%;background:radial-gradient(circle,rgba(126,184,255,0.38),transparent 65%);filter:blur(40px);animation:prinGlow 14s ease-in-out infinite;pointer-events:none}

header{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;height:68px;padding:0 36px;background:rgba(247,240,246,0.8);backdrop-filter:blur(12px);border-bottom:1px solid #ECE3F1}
.logo span{font-family:"Fraunces",Georgia,serif;font-weight:600;font-size:23px;letter-spacing:-0.02em;color:#2A1030}
.logo .grad{font-style:italic;font-weight:500;background:linear-gradient(115deg,#2A1030 0%,#E274A0 30%,#C8A0F0 56%,#7EB8FF 82%,#2A1030 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.member-info{display:flex;align-items:center;gap:16px;font-size:13.5px}
.member-info .who{color:#8e84a0}
.member-info .email{color:#3a2f46;font-weight:600}
.logout{color:#CE4E84;text-decoration:none;font-weight:600;cursor:pointer}
.logout:hover{text-decoration:underline}

main{position:relative;max-width:1000px;margin:0 auto;padding:56px 36px 72px}

.heading{text-align:center;margin:0 0 40px}
.eyebrow{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;letter-spacing:0.26em;color:#CE4E84;margin:0 0 14px}
h1{font-family:"Fraunces",Georgia,serif;font-weight:400;font-size:46px;letter-spacing:-0.01em;margin:0 0 12px;color:#2A1030}
h1 .grad{font-style:italic;background:linear-gradient(120deg,#E274A0,#C8A0F0,#7EB8FF);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.sub{font-size:16px;color:#6f6580;margin:0}

.loading{display:flex;align-items:center;justify-content:center;gap:12px;color:#8e84a0;font-size:14px;padding:70px 0}
.spinner{width:16px;height:16px;border:2px solid rgba(200,160,240,.3);border-top-color:#C8A0F0;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.pcard{background:#FFFFFF;border:1px solid #F0E7F4;border-radius:20px;overflow:hidden;box-shadow:0 12px 34px rgba(42,16,48,0.07);display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.2,.7,.3,1),box-shadow .3s}
.pcard.unlocked:hover{transform:translateY(-4px);box-shadow:0 22px 48px rgba(42,16,48,0.12)}

.cover{position:relative;height:124px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #F0E7F4}
.cover.owned{background:linear-gradient(150deg,rgba(245,173,206,0.34),rgba(200,160,240,0.26),rgba(126,184,255,0.32))}
.cover.locked-cover{background:linear-gradient(150deg,rgba(245,173,206,0.18),rgba(126,184,255,0.16))}
.cover .lockbadge{position:absolute;top:14px;right:16px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;font-size:14px}
.cover .pname{font-family:"Fraunces",Georgia,serif;font-style:italic;font-weight:600;font-size:26px;color:#2A1030;text-align:center;padding:0 16px}

.body{padding:20px 22px 22px;display:flex;flex-direction:column;flex:1}
.pill{align-self:flex-start;font-size:11.5px;font-weight:700;letter-spacing:0.04em;padding:4px 11px;border-radius:999px}
.pill.ok{background:rgba(200,160,240,0.18);color:#8a4ec0;border:1px solid rgba(200,160,240,0.4)}
.pill.lock{background:rgba(206,78,132,0.12);color:#CE4E84;border:1px solid rgba(206,78,132,0.3)}
.tagline{font-size:14.5px;line-height:1.55;color:#5A5168;margin:13px 0 20px;flex:1}

.btn{width:100%;height:46px;margin-top:auto;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;display:flex;align-items:center;justify-content:center;transition:filter .2s,transform .2s}
.btn.ghost{border:1px solid #E6D8EE;background:#FBF7FC;color:#7a4a86}
.btn.ghost:hover{background:#F5EEFB}
.btn.solid{border:none;background:linear-gradient(120deg,#E274A0,#C8A0F0);color:#fff;box-shadow:0 6px 20px rgba(200,160,240,0.36)}
.btn.solid:hover{filter:brightness(1.06);transform:translateY(-1px)}

.purchased-date{font-size:11.5px;color:#a89bb6;margin-top:10px;text-align:center}

.below{text-align:center;font-size:14px;color:#8e84a0;margin:36px 0 0}
.below a{color:#CE4E84;text-decoration:none;font-weight:600}
.below a:hover{text-decoration:underline}

@media (max-width:720px){
  .grid{grid-template-columns:1fr}
  header{padding:0 20px}
  main{padding:40px 20px 60px}
  h1{font-size:34px}
}
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HHHE3BLPL3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());
  gtag("config", "G-HHHE3BLPL3");
</script>
</head>
<body>

<div class="page">
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <header>
    <div class="logo"><span>Prin<span class="grad">fluence</span></span></div>
    <div class="member-info">
      <span class="who">Logged in as <span class="email" id="memberEmail">—</span></span>
      <span class="logout" onclick="logout()">Log out</span>
    </div>
  </header>

  <main>
    <div class="heading">
      <div class="eyebrow">MEMBER DASHBOARD</div>
      <h1>My <span class="grad">products</span></h1>
      <p class="sub">Everything you've unlocked, all in one place.</p>
    </div>

    <div class="loading" id="loadingState">
      <div class="spinner"></div> Checking your account...
    </div>

    <div class="grid" id="productsGrid" style="display:none"></div>

    <p class="below">Looking for more? <a href="Creators.html">Browse all products →</a></p>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://xavhjbcmqgoznuggzpep.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_oKv6t4MSb9mG8ggGedTwyQ_ZO3WeNEr';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PRODUCTS = [
  {
    key: 'content-vault',
    name: 'Content Vault',
    tagline: 'Monthly-refreshed library of hooks, ideas & CTAs across 7 niches, plus the AI remix engine.',
    url: 'content-vault.html',
    landingUrl: 'content-vault-landing.html'
  },
  {
    key: 'pitch-paid',
    name: 'Pitch Vault',
    tagline: '10 pitch templates across 8 niches, built on the P.A.I.D. Framework.',
    url: 'pitch-paid.html',
    landingUrl: 'pitch-paid-landing.html'
  },
  {
    key: 'outreach-tracker',
    name: 'Outreach Tracker',
    tagline: 'Track every brand convo, follow-up and payment — plus the AI pitch analyzer.',
    url: 'outreach-tracker.html',
    landingUrl: 'outreach-tracker-landing.html'
  },
  {
    key: 'dealworthy',
    name: 'Deal Worthy',
    tagline: 'The complete UGC starter kit: 12 pitch templates, rate calculator, 200+ brand list, contracts.',
    url: 'dealworthy.html',
    landingUrl: 'dealworthy-landing.html'
  }
];

async function init() {
  const email = sessionStorage.getItem('prinfluence_member_email');
  if (!email) {
    window.location.href = 'login.html';
    return;
  }

  document.getElementById('memberEmail').textContent = email;

  try {
    const { data, error } = await sb
      .from('purchases')
      .select('product, created_at')
      .eq('email', email);

    if (error) throw error;

    const purchasedMap = {};
    (data || []).forEach(p => { purchasedMap[p.product] = p.created_at; });

    renderProducts(purchasedMap);

  } catch (err) {
    console.error('Error loading purchases:', err);
    document.getElementById('loadingState').innerHTML =
      '<div>Something went wrong loading your products. Please refresh or contact support.</div>';
  }
}

function renderProducts(purchasedMap) {
  const grid = document.getElementById('productsGrid');
  const loading = document.getElementById('loadingState');

  grid.innerHTML = PRODUCTS.map(p => {
    const unlocked = !!purchasedMap[p.key];
    const dateStr = unlocked ? new Date(purchasedMap[p.key]).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : null;

    return `
      <div class="pcard ${unlocked ? 'unlocked' : 'locked'}">
        <div class="cover ${unlocked ? 'owned' : 'locked-cover'}">
          ${!unlocked ? '<span class="lockbadge">🔒</span>' : ''}
          <span class="pname">${p.name}</span>
        </div>
        <div class="body">
          <span class="pill ${unlocked ? 'ok' : 'lock'}">${unlocked ? '✦ Unlocked' : 'Locked'}</span>
          <p class="tagline">${p.tagline}</p>
          ${unlocked
            ? `<a class="btn ghost" href="${p.url}">Open →</a><div class="purchased-date">Purchased ${dateStr}</div>`
            : `<a class="btn solid" href="${p.landingUrl}">View &amp; unlock →</a>`
          }
        </div>
      </div>
    `;
  }).join('');

  loading.style.display = 'none';
  grid.style.display = 'grid';
}

function logout() {
  sessionStorage.removeItem('prinfluence_member_email');
  window.location.href = 'login.html';
}

init();
</script>
</body>
</html>
