<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Prinfluence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F3EE;--panel:#FFFFFF;--ink:#1C1620;--ink-soft:rgba(28,22,32,0.62);--ink-faint:rgba(28,22,32,0.38);
  --line:rgba(28,22,32,0.12);--rose:#CE4E84;--gold:#C5A062;
  --font-display:"Fraunces",Georgia,serif;--font-sans:"DM Sans",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--font-sans);min-height:100vh}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:26px clamp(20px,5vw,56px);max-width:760px;margin:0 auto}
.brandmark .word{font-family:var(--font-display);font-size:21px;font-weight:600;color:var(--ink);text-decoration:none}
.back-link{font-size:13.5px;color:var(--ink-soft);text-decoration:none}
.back-link:hover{color:var(--rose)}
.wrap{max-width:680px;margin:0 auto;padding:20px clamp(20px,5vw,56px) 100px}
.meta{display:flex;gap:14px;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--rose);font-weight:600;margin-bottom:18px}
h1{font-family:var(--font-display);font-size:clamp(30px,5vw,46px);font-weight:500;letter-spacing:-.02em;line-height:1.1;margin-bottom:24px}
.cover{width:100%;border-radius:18px;margin-bottom:36px;object-fit:cover;max-height:420px}
.content{font-size:17px;line-height:1.75;color:rgba(28,22,32,0.82)}
.content p{margin-bottom:22px}
.content h2{font-family:var(--font-display);font-size:26px;font-weight:500;margin:36px 0 16px;letter-spacing:-.01em}
.content h3{font-family:var(--font-display);font-size:21px;font-weight:500;margin:28px 0 12px}
.content a{color:var(--rose);text-decoration:underline}
.content ul,.content ol{margin:0 0 22px;padding-left:24px}
.content li{margin-bottom:8px}
.loading{text-align:center;padding:80px 0;color:var(--ink-faint)}
.cta-band{margin-top:56px;padding:36px;background:var(--panel);border:1px solid var(--line);border-radius:18px;text-align:center}
.cta-band h3{font-family:var(--font-display);font-size:22px;font-weight:500;margin-bottom:10px}
.cta-band p{font-size:14px;color:var(--ink-soft);margin-bottom:20px}
.cta-btn{display:inline-block;background:var(--rose);color:#fff;text-decoration:none;font-size:14px;font-weight:600;padding:13px 26px;border-radius:100px}
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HHHE3BLPL3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());
  gtag("config", "G-HHHE3BLPL3");
</script>
</head>
<body>

<div class="topnav">
  <a class="brandmark" href="Home.html"><span class="word">Prinfluence</span></a>
  <a class="back-link" href="blog.html">← All posts</a>
</div>

<div class="wrap" id="postWrap">
  <div class="loading">Loading...</div>
</div>

<script>
const SUPABASE_URL = 'https://xavhjbcmqgoznuggzpep.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_oKv6t4MSb9mG8ggGedTwyQ_ZO3WeNEr';

function getSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get('slug');
}

async function loadPost() {
  const slug = getSlug();
  const wrap = document.getElementById('postWrap');

  if (!slug) {
    wrap.innerHTML = '<div class="loading">No post specified.</div>';
    return;
  }

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/blog_posts?slug=eq.${encodeURIComponent(slug)}&status=eq.published&limit=1`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
    });
    const data = await res.json();
    const post = data[0];

    if (!post) {
      wrap.innerHTML = '<div class="loading">Post not found.</div>';
      return;
    }

    document.title = post.title + ' — Prinfluence';

    const dateStr = post.published_at ? new Date(post.published_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : '';
    const words = (post.content || '').trim().split(/\s+/).length;
    const readMins = Math.max(2, Math.round(words / 200));

    wrap.innerHTML = `
      <div class="meta"><span>${post.category || 'Blog'}</span><span>${readMins} min read</span><span>${dateStr}</span></div>
      <h1>${post.title}</h1>
      ${post.cover_image ? `<img class="cover" src="${post.cover_image}" alt="" />` : ''}
      <div class="content">${post.content}</div>
      <div class="cta-band">
        <h3>Want more like this?</h3>
        <p>Get a new post like this in your inbox every week — no fluff, just what's working.</p>
        <a class="cta-btn" href="Resources.html#subscribe">Subscribe →</a>
      </div>
    `;
  } catch (err) {
    console.error(err);
    wrap.innerHTML = '<div class="loading">Something went wrong loading this post.</div>';
  }
}

loadPost();
</script>
</body>
</html>
