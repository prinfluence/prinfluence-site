<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Prinfluence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F3EE;--panel:#FFFFFF;--ink:#1C1620;--ink-soft:rgba(28,22,32,0.62);--ink-faint:rgba(28,22,32,0.38);
  --line:rgba(28,22,32,0.12);--rose:#CE4E84;--gold:#C5A062;
  --font-display:"Fraunces",Georgia,serif;--font-sans:"DM Sans",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--font-sans);min-height:100vh}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:26px clamp(20px,5vw,56px);max-width:1100px;margin:0 auto}
.brandmark .word{font-family:var(--font-display);font-size:21px;font-weight:600;color:var(--ink);text-decoration:none}
.back-link{font-size:13.5px;color:var(--ink-soft);text-decoration:none}
.back-link:hover{color:var(--rose)}
.wrap{max-width:1100px;margin:0 auto;padding:20px clamp(20px,5vw,56px) 100px}
.eyebrow{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--rose);font-weight:600;margin-bottom:14px}
h1{font-family:var(--font-display);font-size:clamp(34px,5vw,52px);font-weight:500;letter-spacing:-.02em;margin-bottom:40px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
.card{text-decoration:none;color:inherit;display:flex;flex-direction:column}
.thumb{aspect-ratio:16/10;border-radius:14px;overflow:hidden;background:var(--panel);margin-bottom:16px;position:relative}
.thumb img{width:100%;height:100%;object-fit:cover}
.cat{position:absolute;top:12px;left:12px;background:rgba(255,255,255,0.92);font-size:11px;font-weight:600;padding:5px 12px;border-radius:100px;color:var(--rose)}
.card h4{font-family:var(--font-display);font-size:19px;font-weight:500;margin-bottom:8px;line-height:1.25}
.card p{font-size:13.5px;color:var(--ink-soft);line-height:1.55}
.empty{text-align:center;padding:100px 0;color:var(--ink-faint)}
@media (max-width:760px){.grid{grid-template-columns:1fr}}
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HHHE3BLPL3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());
  gtag("config", "G-HHHE3BLPL3");
</script>
</head>
<body>

<div class="topnav">
  <a class="brandmark" href="Home.html"><span class="word">Prinfluence</span></a>
  <a class="back-link" href="Resources.html">← Resources</a>
</div>

<div class="wrap">
  <div class="eyebrow">The blog</div>
  <h1>Everything I've written</h1>
  <div class="grid" id="postsGrid">
    <div class="empty">Loading...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xavhjbcmqgoznuggzpep.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_oKv6t4MSb9mG8ggGedTwyQ_ZO3WeNEr';

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/blog_posts?status=eq.published&order=published_at.desc`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
    });
    const posts = await res.json();

    if (!posts || posts.length === 0) {
      grid.innerHTML = '<div class="empty">No posts yet — check back soon.</div>';
      return;
    }

    grid.innerHTML = posts.map(post => `
      <a class="card" href="blog-post.html?slug=${encodeURIComponent(post.slug)}">
        <div class="thumb">
          <span class="cat">${post.category || 'Blog'}</span>
          ${post.cover_image ? `<img src="${post.cover_image}" alt="" />` : ''}
        </div>
        <h4>${post.title}</h4>
        <p>${post.excerpt || ''}</p>
      </a>
    `).join('');
  } catch (err) {
    console.error(err);
    grid.innerHTML = '<div class="empty">Something went wrong loading posts.</div>';
  }
}

loadPosts();
</script>
</body>
</html>
