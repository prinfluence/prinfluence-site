<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login — Prinfluence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --paper:#F6F3EE;--panel:#FFFFFF;
  --ink:#1C1620;--ink-soft:rgba(28,22,32,0.62);--ink-faint:rgba(28,22,32,0.40);
  --line:rgba(28,22,32,0.12);--line-soft:rgba(28,22,32,0.06);
  --rose:#CE4E84;--rose-deep:#A93567;
  --gold:#C5A062;--gold-soft:rgba(197,160,98,0.20);
  --mint:#A8E6C1;
  --font-display:"Fraunces",Georgia,serif;
  --font-sans:"DM Sans",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{background:var(--paper);color:var(--ink);font-family:var(--font-sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse 60% 50% at 50% -10%,rgba(206,78,132,0.07),transparent),radial-gradient(ellipse 50% 40% at 100% 100%,rgba(197,160,98,0.08),transparent);pointer-events:none}

.card{position:relative;z-index:1;width:100%;max-width:440px;background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:48px 42px;box-shadow:0 30px 70px -40px rgba(28,22,32,0.18)}

.brandmark{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:10px}
.brandmark .word{font-family:var(--font-display);font-size:25px;font-weight:600;letter-spacing:-0.02em;color:var(--ink)}
.logo-influence{background:linear-gradient(100deg,#E9C977 0%,#D7A964 20%,#E29ABF 52%,#A99AEC 74%,#7EB8FF 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.logo-it{font-style:italic;font-weight:500;-webkit-text-fill-color:transparent}

.eyebrow{text-align:center;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);font-weight:600;margin-bottom:32px}

h1{font-family:var(--font-display);font-size:28px;font-weight:600;text-align:center;margin-bottom:10px;letter-spacing:-.02em;color:var(--ink)}
.lead{font-size:14.5px;color:var(--ink-soft);text-align:center;margin-bottom:32px;line-height:1.6;font-weight:300}

.field{margin-bottom:18px}
.field label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:8px;font-weight:500}
.field input{width:100%;padding:14px 18px;background:var(--paper);border:1px solid var(--line);border-radius:12px;color:var(--ink);font-size:15px;font-family:var(--font-sans);outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--rose)}
.field input::placeholder{color:var(--ink-faint)}

.btn-login{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:10px;background:var(--rose);color:#fff;border:none;font-family:var(--font-sans);font-size:15.5px;font-weight:600;padding:16px 28px;border-radius:100px;cursor:pointer;transition:transform .25s cubic-bezier(.2,.7,.3,1),box-shadow .25s;margin-top:6px}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 16px 34px -12px var(--rose)}
.btn-login:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-login .arr{transition:transform .25s}
.btn-login:hover .arr{transform:translateX(4px)}

.msg{margin-top:18px;padding:14px 18px;border-radius:12px;font-size:13.5px;line-height:1.55;display:none;font-weight:400}
.msg.show{display:block}
.msg.success{background:rgba(168,230,193,0.15);border:1px solid rgba(168,230,193,0.4);color:#2F6B47}
.msg.error{background:rgba(206,78,132,0.08);border:1px solid rgba(206,78,132,0.25);color:var(--rose-deep)}

.divider{display:flex;align-items:center;gap:14px;margin:32px 0 24px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
.divider span{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}

.products-preview{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.mini-card{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 6px;text-align:center;font-size:10.5px;color:var(--ink-soft);font-weight:500;line-height:1.4}

.footer-link{text-align:center;margin-top:28px;font-size:14px;color:var(--ink-faint)}
.footer-link a{color:var(--rose);text-decoration:none;font-weight:500}
.footer-link a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="card">
  <div class="brandmark">
    <span class="word">Prin<span class="logo-influence"><span class="logo-it">fluence</span></span></span>
  </div>
  <div class="eyebrow">Member Access</div>

  <h1>Welcome back</h1>
  <p class="lead">Enter the email you used at checkout — we'll check what you've purchased and take you straight to it.</p>

  <div class="field">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
  </div>

  <button class="btn-login" id="loginBtn" onclick="checkAccess()">Access my products <span class="arr">→</span></button>

  <div class="msg" id="msgBox"></div>

  <div class="divider"><span>Your products live here</span></div>

  <div class="products-preview">
    <div class="mini-card">Content<br>Vault</div>
    <div class="mini-card">Outreach<br>Tracker</div>
    <div class="mini-card">Pitch<br>Vault</div>
    <div class="mini-card">Deal<br>Worthy</div>
  </div>

  <div class="footer-link">
    Haven't purchased yet? <a href="Creators.html">See all products →</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xavhjbcmqgoznuggzpep.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_oKv6t4MSb9mG8ggGedTwyQ_ZO3WeNEr';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function checkAccess() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('msgBox');

  msg.className = 'msg';
  if (!email || !email.includes('@')) {
    msg.textContent = 'Please enter a valid email address.';
    msg.classList.add('show', 'error');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = 'Checking...';

  try {
    const { data, error } = await sb
      .from('purchases')
      .select('product')
      .eq('email', email);

    if (error) throw error;

    if (!data || data.length === 0) {
      msg.textContent = "We couldn't find any purchases under that email. Double-check it matches what you used at checkout, or reach out if you think this is a mistake.";
      msg.classList.add('show', 'error');
      btn.disabled = false;
      btn.innerHTML = 'Access my products <span class="arr">→</span>';
      return;
    }

    sessionStorage.setItem('prinfluence_member_email', email);
    msg.textContent = `Found ${data.length} product${data.length > 1 ? 's' : ''}! Redirecting...`;
    msg.classList.add('show', 'success');

    setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);

  } catch (err) {
    console.error(err);
    msg.textContent = 'Something went wrong checking your account. Please try again in a moment.';
    msg.classList.add('show', 'error');
    btn.disabled = false;
    btn.innerHTML = 'Access my products <span class="arr">→</span>';
  }
}

document.getElementById('email').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') checkAccess();
});
</script>
</body>
</html>
