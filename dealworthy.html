and lead with your best metrics.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"raw footage unedited files assets\"><div class=\"v-cat\" style=\"color:var(--cyan);\">Content</div><div class=\"v-term\">Raw Footage <span>\u203a</span></div><div class=\"v-def\">Unedited video files \u2014 no music, text overlays, or color grading. Brands request raw footage so their editors can cut it differently for different placements. Raw footage is an upsell \u2014 your base rate covers edited deliverables only. Charge 40\u201360% of your base rate as an add-on for raw files.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"deliverables scope work contract\"><div class=\"v-cat\" style=\"color:var(--pink);\">Foundation</div><div class=\"v-term\">Deliverables <span>\u203a</span></div><div class=\"v-def\">The specific items you agree to produce \u2014 video count, length, format, revision rounds, raw footage, hooks. Every deliverable must be explicitly named in your contract before work begins. Vague deliverables are how scope creep happens \u2014 where brands keep asking for \"one more thing.\" Be specific. Put it in writing.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"brief brand guidelines requirements\"><div class=\"v-cat\" style=\"color:var(--pink);\">Foundation</div><div class=\"v-term\">Brand Brief <span>\u203a</span></div><div class=\"v-def\">A document from a brand outlining goals, requirements, messaging, dos/don'ts, and timeline. A good brief is your creative roadmap. If a brand doesn't provide one, ask for it \u2014 or provide your own intake questionnaire. Never start creating without knowing the brand's key message, target audience, and what \"success\" looks like to them.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"ctr click through rate link performance\"><div class=\"v-cat\" style=\"color:var(--mint);\">Performance</div><div class=\"v-term\">CTR (Click-Through Rate) <span>\u203a</span></div><div class=\"v-def\">The percentage of people who clicked a link after seeing your content. A high CTR means your content drives action \u2014 which is what every brand paying for conversion campaigns measures. If you have link-in-bio data showing strong CTR on products you've featured, include it in every pitch for conversion-focused deals.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"perpetuity unlimited rights forever\"><div class=\"v-cat\" style=\"color:var(--purple);\">Money Terms</div><div class=\"v-term\">Perpetuity <span>\u203a</span></div><div class=\"v-def\">Unlimited duration usage rights \u2014 the brand can use your content forever. This is the most expensive rights tier and should never be included in a base rate. If a brand asks for perpetual rights, charge at minimum 100% of your base rate as an additional fee. Know what you're giving away before you agree to it.</div></div>\n      </div>\n      <div class=\"vocab-none\" id=\"vocab-none\">No terms match your search.</div>\n    </div>\n\n    <!-- \u2550\u2550\u2550 RATE CALCULATOR \u2550\u2550\u2550 -->\n    <div id=\"rates\" class=\"page\">\n      <div class=\"mod-header\">\n        <div class=\"mod-num\">06</div>\n        <div class=\"mod-title-wrap\">\n          <div class=\"mod-label\">Module</div>\n          <div class=\"mod-name\">Rate Calculator \u2014 Know Your Number</div>\n        </div>\n      </div>\n      <div class=\"page-intro\">Two types of UGC work require different pricing logic. Brand Deals: you post to your audience. UGC Production: you create content the brand uses in their ads. Both pay well. This calculator handles both.</div>\n\n      <div class=\"calc-card\">\n        <div class=\"calc-title\">Brand Deal Calculator <span class=\"tag tag-pink\" style=\"margin-left:auto;\">Post to Your Audience</span></div>\n        <div class=\"form-row\"><label>Your Average Video Views (AVV)</label><input type=\"number\" id=\"avv\" placeholder=\"e.g. 15000\"></div>\n        <div class=\"form-row\"><label>Campaign Type</label>\n          <select id=\"ct\">\n            <option value=\"0.10\">Awareness \u2014 brand wants reach &amp; impressions ($0.10/view)</option>\n            <option value=\"0.065\">Repurposing \u2014 brand wants content for ads too ($0.065/view)</option>\n            <option value=\"0.03\">Conversion \u2014 brand tracking direct sales/clicks ($0.03/view)</option>\n          </select>\n        </div>\n        <div class=\"form-row\"><label>Usage Duration</label>\n          <select id=\"dur\">\n            <option value=\"0\">3 months (base \u2014 included)</option>\n            <option value=\"0.25\">6 months (+25%)</option>\n            <option value=\"0.50\">12 months (+50%)</option>\n            <option value=\"1.00\">Perpetual (+100%)</option>\n          </select>\n        </div>\n        <div class=\"form-row\"><label>Paid Ad Rights</label>\n          <select id=\"ads\">\n            <option value=\"0\">Organic only (included)</option>\n            <option value=\"0.30\">Paid social ads \u2014 Meta, TikTok (+30%)</option>\n            <option value=\"0.50\">All platforms including TV/OOH (+50%)</option>\n          </select>\n        </div>\n        <div class=\"form-row\"><label>Exclusivity</label>\n          <select id=\"excl\">\n            <option value=\"0\">None (included)</option>\n            <option value=\"0.10\">30-day category (+10%)</option>\n            <option value=\"0.20\">60-day category (+20%)</option>\n            <option value=\"0.30\">90-day category (+30%)</option>\n            <option value=\"0.75\">Full exclusivity (+75%)</option>\n          </select>\n        </div>\n        <button class=\"calc-btn\" onclick=\"calcBrand()\">Calculate Brand Deal Rate \u2192</button>\n        <div class=\"calc-result\" id=\"br\">\n          <div class=\"cr-label\">Your Rate</div>\n          <div class=\"cr-num\" id=\"br-num\"></div>\n          <div class=\"cr-lines\" id=\"br-lines\"></div>\n        </div>\n      </div>\n\n      <div class=\"calc-card\">\n        <div class=\"calc-title\">UGC Production Calculator <span class=\"tag tag-purple\" style=\"margin-left:auto;\">Content Asset Only</span></div>\n        <div class=\"form-row\"><label>Experience Level</label>\n          <select id=\"ul\">\n            <option value=\"175\">Beginner \u2014 first portfolio ($150\u2013$200/video)</option>\n            <option value=\"275\">Intermediate \u2014 5\u201315 clients ($250\u2013$300/video)</option>\n            <option value=\"450\">Advanced \u2014 repeat clients ($400\u2013$500/video)</option>\n            <option value=\"800\">Premium \u2014 major brands ($700\u2013$900/video)</option>\n          </select>\n        </div>\n        <div class=\"form-row\"><label>Number of Videos</label><input type=\"number\" id=\"uv\" placeholder=\"e.g. 3\" min=\"1\"></div>\n        <div class=\"form-row\"><label>Usage Rights</label>\n          <select id=\"ur\">\n            <option value=\"0\">3 months (included)</option>\n            <option value=\"75\">12 months (+$75/video)</option>\n            <option value=\"150\">Perpetual (+$150/video)</option>\n          </select>\n        </div>\n        <div class=\"form-row\"><label>Add-ons</label>\n          <select id=\"ua\">\n            <option value=\"0\">None</option>\n            <option value=\"0.50\">Raw footage (+50% of base)</option>\n            <option value=\"0.25\">Rush delivery 3\u20135 days (+25%)</option>\n            <option value=\"0.75\">Raw footage + Rush (+75%)</option>\n          </select>\n        </div>\n        <button class=\"calc-btn\" onclick=\"calcUGC()\">Calculate UGC Rate \u2192</button>\n        <div class=\"calc-result\" id=\"ur-res\">\n          <div class=\"cr-label\">Your Rate</div>\n          <div class=\"cr-num\" id=\"ur-num\"></div>\n          <div class=\"cr-lines\" id=\"ur-lines\"></div>\n        </div>\n      </div>\n\n      <div class=\"insight\"><div class=\"i-head\">Your rate floor is non-negotiable</div><div class=\"i-body\">Set a floor \u2014 the minimum you will accept before you'd rather not do the work. Know that number. Hold it. The moment you go below your floor for a brand you \"really want,\" you've trained them that your rates negotiate downward. Packages, timelines, and scope are negotiable. Your floor is not.</div></div>\n    </div>\n\n    <!-- \u2550\u2550\u2550 EMAILS \u2550\u2550\u2550 -->\n    <div id=\"emails\" class=\"page\">\n      <div class=\"mod-header\">\n        <div class=\"mod-num\">09</div>\n        <div class=\"mod-title-wrap\">\n          <div class=\"mod-label\">Module</div>\n          <div class=\"mod-name\">Pitch Templates \u2014 Outreach That Gets Responses</div>\n        </div>\n      </div>\n      <div class=\"page-intro\">Outreach doesn't work if you don't know who to contact or what to say. Below: how to find the right person at any brand, plus the copy-ready templates that actually get responses.</div>\n\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">How to find the right contact at any brand <span class=\"acc-chev\">\u203a</span></button>\n        <div class=\"acc-body\"><strong style=\"color:var(--text);\">Hunter.io</strong> \u2014 Enter any domain (e.g. \"glossier.com\") and it returns all publicly available email addresses plus the company's email format.<br><br><strong style=\"color:var(--text);\">Apollo.io</strong> \u2014 Search by job title + company. \"Influencer Marketing Manager at [brand]\" finds the specific decision-maker.<br><br><strong style=\"color:var(--text);\">LinkedIn</strong> \u2014 Search \"[Brand Name] + influencer marketing\" to find the team directly.<br><br><strong style=\"color:var(--text);\">Who to contact:</strong> Small brands: Marketing Manager. Mid-size: Influencer Marketing Manager or Partnerships Manager. Large brands: Creator Partnerships Manager or Influencer Marketing Coordinator.<br><br><strong style=\"color:var(--text);\">Avoid:</strong> VPs, CMOs, C-Suite. They don't manage day-to-day creator partnerships.</div>\n      </div>\n\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">200 Brand Categories \u2014 Your Outreach List <span class=\"acc-chev\">\u203a</span></button>\n        <div class=\"acc-body\"><strong style=\"color:var(--text);\">Skincare &amp; Beauty (40):</strong> Clean beauty DTC, acne-focused skincare, SPF brands, indie makeup, haircare startups, nail brands, body care, men's grooming DTC.<br><br><strong style=\"color:var(--text);\">Fitness &amp; Wellness (30):</strong> Activewear DTC, supplement companies, recovery tools, yoga equipment, wellness apps, functional beverages.<br><br><strong style=\"color:var(--text);\">Food &amp; Beverage (25):</strong> Matcha and coffee DTC, protein snacks, meal kits, specialty food brands, adaptogen drinks.<br><br><strong style=\"color:var(--text);\">Fashion &amp; Apparel (25):</strong> Sustainable fashion DTC, loungewear, accessories, shapewear, plus-size DTC.<br><br><strong style=\"color:var(--text);\">Home &amp; Lifestyle (25):</strong> Home organization, candles, bedding DTC, kitchen gadgets, cleaning product DTC.<br><br><strong style=\"color:var(--text);\">Tech &amp; Apps (20):</strong> Productivity apps, creator tools, AI apps, budgeting apps, photo/video editing apps.<br><br><strong style=\"color:var(--text);\">Finance &amp; Business (15):</strong> Fintech apps, budgeting tools, investing platforms, freelance tools.<br><br><strong style=\"color:var(--text);\">Pet &amp; Family (20):</strong> Premium pet food DTC, pet wellness supplements, baby product DTC, parenting apps.<br><br><em style=\"color:var(--text3);\">The complete list of 200 specific brand names, direct URLs, and verified contact formats is in the companion Outreach Tracker.</em></div>\n      </div>\n\n      <div class=\"divider\"></div>\n\n      <div class=\"email-card\">\n        <div class=\"email-head\">\n          <div class=\"email-name\"><div class=\"email-dot\" style=\"background:var(--pink);\"></div>Cold Email \u2014 First Contact</div>\n          <span class=\"tag tag-pink\">Initial Outreach</span>\n        </div>\n        <div class=\"email-subj-wrap\">\n          <div class=\"email-subj-lbl\">Subject line</div>\n          <div class=\"email-subj-val\">UGC Content Idea for <span class=\"hl\">[Brand]</span> \u2014 <span class=\"hl\">[Your Name]</span></div>\n        </div>\n        <div class=\"email-body-text\" id=\"e1\">Hi <span class=\"hl\">[First Name]</span>,\n\nI noticed <span class=\"hl\">[specific thing about their recent content, campaign, or product \u2014 one sentence, be specific]</span>. That kind of <span class=\"hl\">[intentionality / direction / authenticity]</span> is exactly what resonates with the audience I create for.\n\nI'm <span class=\"hl\">[Your Name]</span> \u2014 a UGC creator focused on <span class=\"hl\">[your niche]</span>. I create <span class=\"hl\">[content type]</span> for DTC brands, specifically built for <span class=\"hl\">[platform + purpose]</span>.\n\nI'd love to create a <span class=\"hl\">[specific deliverable]</span> for <span class=\"hl\">[specific product or campaign]</span>. Recent example: <span class=\"hl\">[portfolio link]</span>\n\nMy content averages <span class=\"hl\">[metric \u2014 engagement rate / AVV / saves]</span>.\n\nWould it make sense to connect this week, or should I send over a few concepts first?\n\n<span class=\"hl\">[Your Name \u00b7 handle \u00b7 email]</span></div>\n        <div class=\"email-foot\"><button class=\"copy-btn\" onclick=\"copyE('e1',this)\">Copy</button></div>\n      </div>\n\n      <div class=\"email-card\">\n        <div class=\"email-head\">\n          <div class=\"email-name\"><div class=\"email-dot\" style=\"background:var(--mint);\"></div>Gifting \u2192 Paid Conversion</div>\n          <span class=\"tag tag-mint\">Gifted to Paid</span>\n        </div>\n        <div class=\"email-subj-wrap\">\n          <div class=\"email-subj-lbl\">Subject line</div>\n          <div class=\"email-subj-val\">Following up on the <span class=\"hl\">[Product Name]</span> \u2014 paid partnership idea</div>\n        </div>\n        <div class=\"email-body-text\" id=\"e2\">Hi <span class=\"hl\">[First Name]</span>,\n\nWanted to follow up on the <span class=\"hl\">[product name]</span> you sent. I've been genuinely using it and <span class=\"hl\">[one specific, honest observation \u2014 what stood out, what you noticed]</span>.\n\nI created <span class=\"hl\">[X pieces of content]</span> featuring it and the response was <span class=\"hl\">[specific result: views / saves / DMs asking where to buy]</span>. That kind of organic engagement tells me there's real appetite here.\n\nI'd love to move into a paid partnership for your <span class=\"hl\">[upcoming campaign / Q[X]]</span>. I already understand what resonates with your audience \u2014 I'd love to build on that with a proper brief and budget.\n\nPaid package overview: <span class=\"hl\">[brief summary or rate card link]</span>.\n\nHappy to send a full proposal or jump on a quick call.\n\n<span class=\"hl\">[Your Name]</span></div>\n        <div class=\"email-foot\"><button class=\"copy-btn\" onclick=\"copyE('e2',this)\">Copy</button></div>\n      </div>\n\n      <div class=\"email-card\">\n        <div class=\"email-head\">\n          <div class=\"email-name\"><div class=\"email-dot\" style=\"background:var(--purple);\"></div>Follow-Up \u2014 No Reply</div>\n          <span class=\"tag tag-purple\">Follow-Up</span>\n        </div>\n        <div class=\"email-body-text\" id=\"e3\">Hi <span class=\"hl\">[First Name]</span>,\n\nFollowing up on my note from <span class=\"hl\">[X days/weeks ago]</span> \u2014 I know your inbox moves fast.\n\nI still think there's a strong fit between what I create and what <span class=\"hl\">[Brand]</span> is building, especially with <span class=\"hl\">[something timely \u2014 upcoming season / recent campaign direction]</span>.\n\nSince I last reached out, I also <span class=\"hl\">[new update \u2014 hit a new metric / published content that performed well]</span>. Happy to share if that's useful context.\n\nOne reply either way tells me everything I need to know.\n\n<span class=\"hl\">[Your Name]</span></div>\n        <div class=\"email-foot\"><button class=\"copy-btn\" onclick=\"copyE('e3',this)\">Copy</button></div>\n      </div>\n\n      <div class=\"email-card\">\n        <div class=\"email-head\">\n          <div class=\"email-name\"><div class=\"email-dot\" style=\"background:var(--amber);\"></div>Responding to \"Not Right Now\"</div>\n          <span class=\"tag tag-amber\">Objection</span>\n        </div>\n        <div class=\"email-body-text\" id=\"e4\">Hi <span class=\"hl\">[First Name]</span>,\n\nAppreciate you getting back to me \u2014 genuinely.\n\nTotally understand the timing. I won't push on it.\n\nI'd love to stay on your radar for when the calendar opens up. Would it be okay if I followed up in <span class=\"hl\">[4\u20136 weeks / Q[X]]</span>? I'll make sure I have something relevant to share when I do.\n\nIn the meantime \u2014 here's my portfolio if it's useful for internal reference: <span class=\"hl\">[link]</span>.\n\nLooking forward to connecting when the timing is right.\n\n<span class=\"hl\">[Your Name]</span></div>\n        <div class=\"email-foot\"><button class=\"copy-btn\" onclick=\"copyE('e4',this)\">Copy</button></div>\n      </div>\n\n      <div class=\"email-card\">\n        <div class=\"email-head\">\n          <div class=\"email-name\"><div class=\"email-dot\" style=\"background:var(--pink);\"></div>Performance-Led Pitch</div>\n          <span class=\"tag tag-pink\">Metrics-First</span>\n        </div>\n        <div class=\"email-subj-wrap\">\n          <div class=\"email-subj-lbl\">Subject line</div>\n          <div class=\"email-subj-val\"><span class=\"hl\">[Engagement %]</span> engagement, <span class=\"hl\">[niche]</span> creator \u2014 partnership idea for <span class=\"hl\">[Brand]</span></div>\n        </div>\n        <div class=\"email-body-text\" id=\"e5\">Hi <span class=\"hl\">[First Name]</span>,\n\nI'll skip the small talk and lead with the numbers since I imagine your inbox is full:\n\n\u00b7 Average engagement rate: <span class=\"hl\">[X%]</span>\n\u00b7 Last 10 videos AVV: <span class=\"hl\">[X views]</span>\n\u00b7 Save rate on product content: <span class=\"hl\">[X%]</span>\n\u00b7 Audience: <span class=\"hl\">[demographic match to brand]</span>\n\nI create UGC for DTC brands in the <span class=\"hl\">[niche]</span> space \u2014 the kind of content built specifically to drive saves and conversions on paid social.\n\nI'd love to put these numbers behind a <span class=\"hl\">[specific deliverable]</span> for <span class=\"hl\">[Brand]</span>.\n\nRecent work: <span class=\"hl\">[portfolio link]</span>\nRate card available on request.\n\nWorth a 15-minute call?\n\n<span class=\"hl\">[Your Name]</span></div>\n        <div class=\"email-foot\"><button class=\"copy-btn\" onclick=\"copyE('e5',this)\">Copy</button></div>\n      </div>\n\n      <div class=\"email-card\">\n        <div class=\"email-head\">\n          <div class=\"email-name\"><div class=\"email-dot\" style=\"background:var(--purple);\"></div>Niche Authority Pitch</div>\n          <span class=\"tag tag-purple\">Expertise Angle</span>\n        </div>\n        <div class=\"email-subj-wrap\">\n          <div class=\"email-subj-lbl\">Subject line</div>\n          <div class=\"email-subj-val\">A <span class=\"hl\">[niche specialist]</span>'s take on <span class=\"hl\">[Brand]</span></div>\n        </div>\n        <div class=\"email-body-text\" id=\"e6\">Hi <span class=\"hl\">[First Name]</span>,\n\nI've spent the last <span class=\"hl\">[X years/months]</span> building a creator practice around <span class=\"hl\">[specific niche \u2014 e.g. clean skincare for sensitive skin, minimalist home routines]</span>. It's a narrow lane on purpose \u2014 and it means the audience that follows me is exactly the audience <span class=\"hl\">[Brand]</span> is trying to reach.\n\nWhen I look at <span class=\"hl\">[Brand]</span>'s recent content, I see <span class=\"hl\">[specific observation about their direction or a gap you could fill]</span>. I'd love to bring a creator perspective to it.\n\nHere's a quick concept I'd execute: <span class=\"hl\">[one-sentence content idea specific to their product]</span>.\n\nPortfolio: <span class=\"hl\">[link]</span>\n\nIf this resonates, I can send a full proposal with deliverables and rates this week.\n\n<span class=\"hl\">[Your Name]</span></div>\n        <div class=\"email-foot\"><button class=\"copy-btn\" onclick=\"copyE('e6',this)\">Copy</button></div>\n      </div>\n\n      <div class=\"email-card\">\n        <div class=\"email-head\">\n          <div class=\"email-name\"><div class=\"email-dot\" style=\"background:var(--cyan);\"></div>Product Launch Pitch</div>\n          <span class=\"tag tag-cyan\">Time-Sensitive</span>\n        </div>\n        <div class=\"email-subj-wrap\">\n          <div class=\"email-subj-lbl\">Subject line</div>\n          <div class=\"email-subj-val\">Content support for the <span class=\"hl\">[Product Name]</span> launch</div>\n        </div>\n        <div class=\"email-body-text\" id=\"e7\">Hi <span class=\"hl\">[First Name]</span>,\n\nSaw the announcement around <span class=\"hl\">[Product Name / upcoming launch]</span> \u2014 congratulations. The positioning is sharp and there's clearly real audience interest already.\n\nLaunch windows are the moment where strong UGC moves the needle most. Brands that supplement paid with creator content in the first 30 days typically see <span class=\"hl\">[reference stat or your own results]</span>.\n\nI'd love to be one of the creators behind that push. I can deliver:\n\u00b7 <span class=\"hl\">[X]</span> UGC videos optimized for paid social\n\u00b7 <span class=\"hl\">[X]</span> hook variations for A/B testing\n\u00b7 Raw footage for your in-house team to recut\n\nTurnaround: <span class=\"hl\">[X days]</span> from product receipt.\n\nReel: <span class=\"hl\">[link]</span>\n\nIf timing's tight, happy to fast-track. Let me know.\n\n<span class=\"hl\">[Your Name]</span></div>\n        <div class=\"email-foot\"><button class=\"copy-btn\" onclick=\"copyE('e7',this)\">Copy</button></div>\n      </div>\n\n      <div class=\"email-card\">\n        <div class=\"email-head\">\n          <div class=\"email-name\"><div class=\"email-dot\" style=\"background:var(--mint);\"></div>Seasonal Campaign Pitch</div>\n          <span class=\"tag tag-mint\">Campaign-Aligned</span>\n        </div>\n        <div class=\"email-subj-wrap\">\n          <div class=\"email-subj-lbl\">Subject line</div>\n          <div class=\"email-subj-val\"><span class=\"hl\">[Q4 / Holiday / Spring]</span> content idea for <span class=\"hl\">[Brand]</span></div>\n        </div>\n        <div class=\"email-body-text\" id=\"e8\">Hi <span class=\"hl\">[First Name]</span>,\n\n<span class=\"hl\">[Season/holiday]</span> is the highest-intent window of the year for <span class=\"hl\">[Brand]</span>'s category \u2014 and from what I'm seeing on TikTok and Reels, <span class=\"hl\">[specific trend or behavior you've noticed]</span> is the angle that's working right now.\n\nI'd love to build a small content package built around that exact moment:\n\n\u00b7 <span class=\"hl\">[Format 1 \u2014 e.g. \"What's in my [season] routine\"]</span>\n\u00b7 <span class=\"hl\">[Format 2 \u2014 e.g. \"Why I switched to [Product] before [season]\"]</span>\n\u00b7 <span class=\"hl\">[Format 3 \u2014 e.g. \"Honest review after [time period]\"]</span>\n\nI usually book seasonal content <span class=\"hl\">[X weeks]</span> out, so the window for <span class=\"hl\">[campaign]</span> is closing soon on my end.\n\nPortfolio: <span class=\"hl\">[link]</span>\n\nWant me to send a formal proposal?\n\n<span class=\"hl\">[Your Name]</span></div>\n        <div class=\"email-foot\"><button class=\"copy-btn\" onclick=\"copyE('e8',this)\">Copy</button></div>\n      </div>\n\n      <div class=\"email-card\">\n        <div class=\"email-head\">\n          <div class=\"email-name\"><div class=\"email-dot\" style=\"background:var(--amber);\"></div>Repeat Partnership Pitch</div>\n          <span class=\"tag tag-amber\">Retention</span>\n        </div>\n        <div class=\"email-subj-wrap\">\n          <div class=\"email-subj-lbl\">Subject line</div>\n          <div class=\"email-subj-val\">Round two? Building on what worked for <span class=\"hl\">[Brand]</span></div>\n        </div>\n        <div class=\"email-body-text\" id=\"e9\">Hi <span class=\"hl\">[First Name]</span>,\n\nThe <span class=\"hl\">[previous campaign / product launch]</span> we did together generated <span class=\"hl\">[specific result \u2014 views, engagement, sales lift if you have it]</span>. I've been watching what's resonated from that content and I think there's an obvious second act.\n\nA few ideas for round two:\n\u00b7 <span class=\"hl\">[Format that worked best \u2014 extended into a Part 2 or Series]</span>\n\u00b7 <span class=\"hl\">[New product or angle we haven't covered yet]</span>\n\u00b7 <span class=\"hl\">[Format you wanted to try but didn't get to]</span>\n\nSince we already have the working relationship and the brand voice dialed in, turnaround on round two is faster and the risk on your end is lower than working with someone new.\n\nMy rates have moved up slightly since we last worked \u2014 happy to send the updated card if you'd like to scope something.\n\n<span class=\"hl\">[Your Name]</span></div>\n        <div class=\"email-foot\"><button class=\"copy-btn\" onclick=\"copyE('e9',this)\">Copy</button></div>\n      </div>\n\n      <div class=\"email-card\">\n        <div class=\"email-head\">\n          <div class=\"email-name\"><div class=\"email-dot\" style=\"background:var(--pink);\"></div>Rate Negotiation \u2014 Response to \"What's Your Rate?\"</div>\n          <span class=\"tag tag-pink\">Negotiation</span>\n        </div>\n        <div class=\"email-subj-wrap\">\n          <div class=\"email-subj-lbl\">Subject line</div>\n          <div class=\"email-subj-val\">Re: rates &amp; deliverables \u2014 <span class=\"hl\">[Campaign]</span></div>\n        </div>\n        <div class=\"email-body-text\" id=\"e10\">Hi <span class=\"hl\">[First Name]</span>,\n\nThanks for the note \u2014 excited about the possibility of working with <span class=\"hl\">[Brand]</span>.\n\nFor a project of this scope, my rate is <span class=\"hl\">$[X]</span>. This includes:\n\n\u00b7 <span class=\"hl\">[X]</span> finished UGC videos (vertical, <span class=\"hl\">[X]</span> seconds, edited)\n\u00b7 <span class=\"hl\">[X]</span> hook variations per video\n\u00b7 One round of revisions\n\u00b7 <span class=\"hl\">[3 months]</span> of usage rights across organic social\n\nAdd-ons available separately:\n\u00b7 Raw footage \u2014 <span class=\"hl\">+$[X]</span>\n\u00b7 Paid ad rights \u2014 <span class=\"hl\">+30% of base</span>\n\u00b7 Extended usage (12 months / perpetual) \u2014 quoted per use case\n\u00b7 Rush turnaround \u2014 <span class=\"hl\">+25%</span>\n\nHappy to walk through the structure on a quick call and tailor the package to what your team needs most.\n\n<span class=\"hl\">[Your Name]</span></div>\n        <div class=\"email-foot\"><button class=\"copy-btn\" onclick=\"copyE('e10',this)\">Copy</button></div>\n      </div>\n\n      <div class=\"email-card\">\n        <div class=\"email-head\">\n          <div class=\"email-name\"><div class=\"email-dot\" style=\"background:#f08080;\"></div>Counter to a Lowball Offer</div>\n          <span class=\"tag\" style=\"background:rgba(240,128,128,0.12);color:#f08080;border:1px solid rgba(240,128,128,0.25);\">Hold the Line</span>\n        </div>\n        <div class=\"email-subj-wrap\">\n          <div class=\"email-subj-lbl\">Subject line</div>\n          <div class=\"email-subj-val\">Re: <span class=\"hl\">[Campaign]</span> \u2014 rate alignment</div>\n        </div>\n        <div class=\"email-body-text\" id=\"e11\">Hi <span class=\"hl\">[First Name]</span>,\n\nReally appreciate you sharing the budget \u2014 and the directness, that always makes things easier.\n\nI'd love to make this work. The number you've shared is below my rate for this scope, but I have two options that might bridge the gap:\n\n<strong style=\"color:var(--text);\">Option 1 \u2014 Match your budget, reduce scope.</strong>\nI can deliver <span class=\"hl\">[fewer videos / shorter length / fewer hooks / organic-only rights]</span> for <span class=\"hl\">$[their budget]</span>. Same quality, smaller package.\n\n<strong style=\"color:var(--text);\">Option 2 \u2014 Same scope, my rate.</strong>\nFull package as briefed at <span class=\"hl\">$[your rate]</span>. Worth it if performance is the priority \u2014 this is the package I build campaigns on.\n\nEither works for me. Which direction makes more sense on your end?\n\n<span class=\"hl\">[Your Name]</span></div>\n        <div class=\"email-foot\"><button class=\"copy-btn\" onclick=\"copyE('e11',this)\">Copy</button></div>\n      </div>\n\n      <div class=\"email-card\">\n        <div class=\"email-head\">\n          <div class=\"email-name\"><div class=\"email-dot\" style=\"background:var(--purple);\"></div>Long-Term Ambassador Pitch</div>\n          <span class=\"tag tag-purple\">Retainer</span>\n        </div>\n        <div class=\"email-subj-wrap\">\n          <div class=\"email-subj-lbl\">Subject line</div>\n          <div class=\"email-subj-val\">Ongoing creator partnership for <span class=\"hl\">[Brand]</span> \u2014 proposal</div>\n        </div>\n        <div class=\"email-body-text\" id=\"e12\">Hi <span class=\"hl\">[First Name]</span>,\n\nOne-off campaigns are great. Ongoing creator partnerships are where the real ROI is \u2014 for the brand and the creator. Audiences trust repetition, not novelty.\n\nI'd love to propose a 3 or 6-month creator partnership with <span class=\"hl\">[Brand]</span>:\n\n<strong style=\"color:var(--text);\">Monthly deliverables:</strong>\n\u00b7 <span class=\"hl\">[X]</span> UGC videos for paid social\n\u00b7 <span class=\"hl\">[X]</span> hook variations\n\u00b7 One organic post on my channel\n\u00b7 Quarterly strategy call\n\n<strong style=\"color:var(--text);\">Why this works:</strong>\n\u00b7 Lower per-asset cost vs. one-off projects\n\u00b7 Audience sees consistent brand presence\n\u00b7 You get a creator who genuinely knows the product\n\u00b7 I can react to launches and trends fast\n\nMonthly retainer: <span class=\"hl\">$[X]</span> (15\u201320% discount vs. per-project rate).\n\nWant me to send a full one-pager?\n\n<span class=\"hl\">[Your Name]</span></div>\n        <div class=\"email-foot\"><button class=\"copy-btn\" onclick=\"copyE('e12',this)\">Copy</button></div>\n      </div>\n\n    </div>\n\n    <!-- \u2550\u2550\u2550 PORTFOLIO SITE TEMPLATE \u2550\u2550\u2550 -->\n    <div id=\"portfolio\" class=\"page\">\n      <div class=\"mod-header\">\n        <div class=\"mod-num\">05</div>\n        <div class=\"mod-title-wrap\">\n          <div class=\"mod-label\">Module</div>\n          <div class=\"mod-name\">Portfolio Site \u2014 The Page That Closes Deals</div>\n        </div>\n      </div>\n\n      <div class=\"page-intro\">A polished portfolio link in your pitch is the single highest-leverage asset you own. Brands decide whether you're a real option within 30 seconds of clicking it. This is the exact structure that works \u2014 copy it section for section.</div>\n\n      <div style=\"border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--surface);margin-bottom:1.25rem;\">\n        <div style=\"background:var(--bg2);padding:.5rem .9rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;\">\n          <span style=\"width:9px;height:9px;border-radius:50%;background:#f08080;display:inline-block;\"></span>\n          <span style=\"width:9px;height:9px;border-radius:50%;background:var(--amber);display:inline-block;\"></span>\n          <span style=\"width:9px;height:9px;border-radius:50%;background:var(--mint);display:inline-block;\"></span>\n          <span style=\"margin-left:14px;font-size:11px;color:var(--text3);font-family:'Inter',monospace;\">yourname.co \u00b7 UGC Creator</span>\n        </div>\n        <div style=\"padding:2rem 1.75rem;background:linear-gradient(180deg,var(--surface) 0%,var(--bg2) 100%);\">\n          <div style=\"font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--pink);font-weight:600;margin-bottom:.5rem;\">UGC Creator \u00b7 Skincare &amp; Wellness</div>\n          <div style=\"font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;line-height:1.1;margin-bottom:.5rem;\">Hi, I'm <em style=\"color:var(--pink);\">[Your Name]</em>.<br>I help DTC brands sell.</div>\n          <div style=\"font-size:12px;color:var(--text2);line-height:1.65;max-width:380px;font-weight:300;margin-bottom:1rem;\">Honest, scroll-stopping UGC for skincare brands. Built for paid social. Average engagement: <span style=\"color:var(--text);font-weight:600;\">6.2%</span> \u00b7 AVV: <span style=\"color:var(--text);font-weight:600;\">22K</span>.</div>\n          <div style=\"display:flex;gap:6px;\">\n            <span style=\"font-size:10px;font-weight:600;padding:5px 12px;border-radius:20px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;\">View Reel \u25b7</span>\n            <span style=\"font-size:10px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);color:var(--text3);\">Get in touch</span>\n          </div>\n        </div>\n        <div style=\"padding:1.25rem 1.75rem;border-top:1px solid var(--border);\">\n          <div style=\"font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:.75rem;\">Featured Work</div>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;\">\n            <div style=\"aspect-ratio:9/16;background:linear-gradient(135deg,var(--pink-dim),var(--purple-dim));border-radius:8px;display:flex;align-items:flex-end;padding:8px;font-size:9px;color:var(--text2);\">Skincare \u2764\ufe0e 12.4K</div>\n            <div style=\"aspect-ratio:9/16;background:linear-gradient(135deg,var(--cyan-dim),var(--mint-dim));border-radius:8px;display:flex;align-items:flex-end;padding:8px;font-size:9px;color:var(--text2);\">Wellness \u2764\ufe0e 8.7K</div>\n            <div style=\"aspect-ratio:9/16;background:linear-gradient(135deg,var(--amber-dim),var(--pink-dim));border-radius:8px;display:flex;align-items:flex-end;padding:8px;font-size:9px;color:var(--text2);\">Lifestyle \u2764\ufe0e 15.2K</div>\n          </div>\n        </div>\n      </div>\n      <div style=\"font-size:10.5px;color:var(--text3);text-align:center;margin-bottom:2rem;font-style:italic;\">Visual mockup \u2014 the structure below is what brands actually scroll through.</div>\n\n      <div style=\"font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--pink);font-weight:600;margin-bottom:.9rem;\">The 7 sections that close deals</div>\n\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">01 \u00b7 Hero \u2014 name, niche, one-line value <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\"><strong style=\"color:var(--text);\">Headline structure:</strong> \"Hi, I'm [Name]. I help [target client] [outcome].\" That's it. Don't overthink it. A brand should know in the first 3 seconds who you are, who you serve, and what you do for them.<br><br>Below the headline: 1\u20132 sentences with your top 2 metrics (engagement rate + AVV). Then your CTA \u2014 \"View Reel\" or \"Get in touch.\" Visual: one short looping clip of your best work as background.</div></div>\n\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">02 \u00b7 Showreel \u2014 your 60-second sizzle <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">A single 60\u201390 second cut of your best 4\u20136 content pieces. Open with the most attention-grabbing 3 seconds you've ever filmed. This is the section brands rewatch. If you don't have a reel \u2014 make one before you launch the site.<br><br>Host on Vimeo (cleaner than YouTube), embed it. Loop, autoplay (muted), captions on. The reel is your portfolio's most powerful asset.</div></div>\n\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">03 \u00b7 Featured Work \u2014 6\u20139 portfolio pieces <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">Grid of 6\u20139 thumbnails (3\u00d72 or 3\u00d73). Each one clickable. Each one labeled with: format (Testimonial / Tutorial / Lifestyle), the brand category, and one performance stat (views / saves / engagement).<br><br>Mix formats deliberately so brands see range. Lead with your single best piece. Never include weak content \"for completeness\" \u2014 your portfolio is judged by your worst piece, not your best.</div></div>\n\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">04 \u00b7 About Me \u2014 the niche-credible bio <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">Three short paragraphs:<br>\u00b7 <strong style=\"color:var(--text);\">Para 1:</strong> Who you are + why you create in this niche (authentic origin).<br>\u00b7 <strong style=\"color:var(--text);\">Para 2:</strong> What kind of content you specialize in and the brands you serve best.<br>\u00b7 <strong style=\"color:var(--text);\">Para 3:</strong> One personal humanizing line \u2014 a value, a lifestyle detail, a creator philosophy.<br><br>Photo: well-lit, natural, on-brand. Not a corporate headshot. Brands hire personalities, not LinkedIn profiles.</div></div>\n\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">05 \u00b7 Stats &amp; Audience \u2014 the receipts <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">A clean stat block:<br>\u00b7 Total reach across platforms<br>\u00b7 Average video views (AVV)<br>\u00b7 Engagement rate<br>\u00b7 Save rate on product content<br>\u00b7 Audience age, gender, top geo<br><br>Update monthly. Outdated stats kill credibility. If a metric isn't strong yet, leave it off \u2014 never include a weak metric just to fill space.</div></div>\n\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">06 \u00b7 Brands &amp; Testimonials \u2014 social proof <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">Logo wall of any brand you've worked with \u2014 even gifted partnerships count if the content went well. Sub-section: 2\u20133 short testimonials from past clients (1\u20132 sentences each, with name and role).<br><br>No past brand work? Skip this section entirely. An empty social proof section is worse than no section.</div></div>\n\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">07 \u00b7 Services &amp; Contact \u2014 clear next step <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">Three packages laid out clearly: Single UGC Video \u00b7 3-Video Package \u00b7 Brand Deal Post. Show inclusions. Don't show prices \u2014 invite the conversation.<br><br>Contact: a clean form OR a single email link (your professional email, not a creator handle). Set up a Calendly link for \"Book a 15-min call\" \u2014 brands love friction-free booking and it makes you look established.</div></div>\n\n      <div class=\"divider\"></div>\n      <div style=\"font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:.75rem;\">Where to build it</div>\n\n      <div class=\"grid3\">\n        <div class=\"card-sm\"><div style=\"font-size:13px;font-weight:600;color:var(--pink);margin-bottom:4px;\">Squarespace</div><div style=\"font-size:12px;color:var(--text2);line-height:1.6;font-weight:300;\">Best for clean, magazine-style portfolio sites. Templates: Aubrey, Ishimoto, Quincy. $16/mo.</div></div>\n        <div class=\"card-sm\"><div style=\"font-size:13px;font-weight:600;color:var(--purple);margin-bottom:4px;\">Carrd / Beacons</div><div style=\"font-size:12px;color:var(--text2);line-height:1.6;font-weight:300;\">Best for fast, one-page portfolios. Live in a day. Free\u2013$19/yr. Perfect to launch with before upgrading.</div></div>\n        <div class=\"card-sm\"><div style=\"font-size:13px;font-weight:600;color:var(--cyan);margin-bottom:4px;\">Notion + Super</div><div style=\"font-size:12px;color:var(--text2);line-height:1.6;font-weight:300;\">Best for creators who already live in Notion. Easy to update. Use Super.so for clean URLs and faster load.</div></div>\n      </div>\n\n      <div class=\"insight\"><div class=\"i-head\">Ship it at 80%</div><div class=\"i-body\">Your portfolio site doesn't need to be perfect. It needs to exist. The creators who win launch at 80% and iterate. Build the 7 sections this week. Get the link. Start sending it tomorrow. You can always improve a live site \u2014 you cannot improve a site you haven't published.</div></div>\n    </div>\n\n    <!-- \u2550\u2550\u2550 BRAND HIT LIST \u2550\u2550\u2550 -->\n    <div id=\"brandlist\" class=\"page\">\n      <div class=\"mod-header\">\n        <div class=\"mod-num\">08</div>\n        <div class=\"mod-title-wrap\">\n          <div class=\"mod-label\">Module</div>\n          <div class=\"mod-name\">The 200 Brand Hit List \u2014 Your Outreach Universe</div>\n        </div>\n      </div>\n      <div class=\"page-intro\">200 active DTC brands across 6 niches, each with their public email format and the right role to target. This is your outreach universe \u2014 start with the brands closest to your pillars.</div>\n\n      <div class=\"insight\" style=\"margin-bottom:1.25rem;\"><div class=\"i-head\">How to use this list</div><div class=\"i-body\">For each brand: copy the email format, drop in the first/last name of the role-holder, and verify on <strong style=\"color:var(--text);\">Hunter.io</strong> or <strong style=\"color:var(--text);\">Apollo.io</strong> before sending (always \u2014 emails change). Decision-maker titles vary by company size: smaller brands lean Marketing Manager; mid-size add Influencer / Partnerships Manager; larger brands have a dedicated Creator Partnerships team. Always avoid VPs and C-suite \u2014 they don't run day-to-day creator deals.</div></div>\n\n      <div class=\"vocab-search-wrap\"><span class=\"vocab-search-icon\">\ud83d\udd0d</span><input type=\"text\" class=\"vocab-search\" placeholder=\"Search brand, niche, or category...\" oninput=\"filterBrands(this.value)\"></div>\n\n      <div class=\"day-pills\" style=\"margin-bottom:1rem;\">\n        <button class=\"day-pill active\" onclick=\"filterBrandCat('all',this)\">All 200</button>\n        <button class=\"day-pill\" onclick=\"filterBrandCat('beauty',this)\">Beauty (35)</button>\n        <button class=\"day-pill\" onclick=\"filterBrandCat('fitness',this)\">Fitness (33)</button>\n        <button class=\"day-pill\" onclick=\"filterBrandCat('food',this)\">Food (33)</button>\n        <button class=\"day-pill\" onclick=\"filterBrandCat('fashion',this)\">Fashion (32)</button>\n        <button class=\"day-pill\" onclick=\"filterBrandCat('home',this)\">Home (33)</button>\n        <button class=\"day-pill\" onclick=\"filterBrandCat('tech',this)\">Tech (34)</button>\n      </div>\n\n      <div id=\"brand-grid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:6px;\"></div>\n      <div id=\"brand-none\" class=\"vocab-none\">No brands match your search.</div>\n\n      <div style=\"font-size:10.5px;color:var(--text3);text-align:center;margin-top:1.5rem;font-style:italic;line-height:1.6;\">Email formats are based on publicly listed company patterns and may change. Always verify with Hunter.io / Apollo.io before sending. The roles listed are the standard influencer-marketing decision-makers \u2014 exact titles vary by org chart.</div>\n    </div>\n\n    <!-- \u2550\u2550\u2550 CONTRACTS \u2550\u2550\u2550 -->\n    <div id=\"contracts\" class=\"page\">\n      <div class=\"mod-header\">\n        <div class=\"mod-num\">10</div>\n        <div class=\"mod-title-wrap\">\n          <div class=\"mod-label\">Module</div>\n          <div class=\"mod-name\">Contracts \u2014 5 Templates Every UGC Creator Needs</div>\n        </div>\n      </div>\n      <div class=\"page-intro\">A deal without a contract is a misunderstanding waiting to happen. These 5 templates \u2014 reviewed by an entertainment attorney \u2014 cover the most common scenarios. Open any one, fill in the brackets, and copy it ready to send.</div>\n\n      <div class=\"insight\" style=\"margin-bottom:1.25rem;border-left-color:var(--amber);\"><div class=\"i-head\" style=\"color:var(--amber);\">Read first \u2014 legal disclaimer</div><div class=\"i-body\">These five templates were reviewed by an entertainment attorney and cover the most common UGC scenarios \u2014 but they are starting points, not legal advice. Every <span class=\"hl\">[BRACKET]</span> is a placeholder you fill in before sending. For deals over $5,000, exclusivity, or anything in an unfamiliar jurisdiction, have your own lawyer review before you sign.</div></div>\n\n      <style>\n        .ct-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:.75rem;overflow:hidden;}\n        .ct-head{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:1.1rem 1.25rem;display:flex;align-items:center;gap:13px;font-family:'Inter',sans-serif;}\n        .ct-head:hover{background:var(--surface2);}\n        .ct-icon{font-size:18px;flex-shrink:0;line-height:1;}\n        .ct-titles{flex:1;min-width:0;}\n        .ct-name{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:9px;flex-wrap:wrap;}\n        .ct-sub{font-size:11.5px;color:var(--text3);margin-top:3px;}\n        .ct-chev{font-size:18px;color:var(--text3);transition:transform .2s;flex-shrink:0;}\n        .ct-head.open .ct-chev{transform:rotate(90deg);}\n        .ct-full{display:none;border-top:1px solid var(--border);padding:1.1rem 1.25rem;}\n        .ct-full.open{display:block;}\n        .ct-desc{font-size:12.5px;color:var(--text2);line-height:1.65;font-weight:300;margin-bottom:1rem;}\n        .ct-doc{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:1.4rem;max-height:520px;overflow-y:auto;}\n        .ct-sec{border-left:2px solid var(--pink-border);padding-left:15px;margin-bottom:20px;}\n        .ct-sec:last-child{margin-bottom:0;}\n        .ct-h{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--pink);font-weight:700;margin-bottom:8px;}\n        .ct-b{font-size:12.5px;color:var(--text2);line-height:1.72;font-weight:300;white-space:pre-wrap;font-family:'Inter',sans-serif;}\n        .ct-foot{display:flex;justify-content:flex-end;margin-top:14px;}\n      </style>\n\n      <div class=\"ct-card\">\n        <button class=\"ct-head\" onclick=\"toggleContract(this)\">\n          <span class=\"ct-icon\">\ud83d\udcc4</span>\n          <span class=\"ct-titles\">\n            <span class=\"ct-name\">Standard UGC Agreement <span class=\"tag tag-mint\">Most Used</span></span>\n            <span class=\"ct-sub\">Your go-to for most brand deals \u2014 deliverables, usage rights, payment, timelines.</span>\n          </span>\n          <span class=\"ct-chev\">\u203a</span>\n        </button>\n        <div class=\"ct-full\">\n          <div class=\"ct-desc\">Covers deliverables, usage rights, payment terms, and timelines. Perfect for one-off UGC campaigns \u2014 your default for ~80% of deals.</div>\n          <div class=\"ct-doc\" id=\"ct1\">\n<div class=\"ct-sec\"><div class=\"ct-h\">I. Introduction</div><div class=\"ct-b\">This contract was made on [DATE]. This contract is between [CREATOR LEGAL NAME] (UGC Creator) and [BRAND NAME] (Brand/Advertiser).</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">II. Acknowledgment</div><div class=\"ct-b\">The Brand/Advertiser and the UGC Creator acknowledge the terms of this Contract and will comply.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">III. Terms</div><div class=\"ct-b\">This contract will begin on [START DATE] and will end on [END DATE]. A new contract will be created for renewal of term.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">IV. Payment Fees</div><div class=\"ct-b\">The total payment for services will be $[AMOUNT].\nThe payment will be made by [DATE] and in the amount of $[AMOUNT].\nThe payment will be made prior to the UGC Creator services.\nAll payments should be paid via [Stripe / PayPal / Bank Transfer] invoice, to [BRAND EMAIL].\nThe UGC Creator is liable for any taxes on said payment.\nThe Brand/Advertiser is responsible for any and all expenses to ship and deliver necessary products for the UGC Creator to execute agreed upon services. If the UGC Creator is required to purchase necessary items, the Brand/Advertiser will reimburse the creator for agreed upon items.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">V. Content Requirements</div><div class=\"ct-b\">A. The UGC Creator is to create [#] video(s) ranging from [30\u201360] seconds.\nB. The video concepts are as follows:\n   \u2022 [Concept 1 \u2014 e.g. Day In The Life Style Testimonial Video]\n   \u2022 [Concept 2 \u2014 e.g. Aesthetic Style Benefits Listing Video]\nC. The UGC Creator agrees to deliver content to the brand within [7] days of receiving the product, as long as the initial payment has been made and video concepts have been confirmed.\nD. The UGC Creator should create original content which is decent, honest, and factual.\nE. The content should not contain any vulgar language and should be suited for everyone.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">VI. Revisions</div><div class=\"ct-b\">The UGC Creator will confirm written video concepts/scripts via email prior to filming. The Brand/Advertiser will have [3] days to submit any written revisions on the video concepts/scripts via email.\n\nThe UGC Creator will submit deliverables to the brand via Google Drive link. The deliverables will have a watermark which will be removed once the deliverables are confirmed and any unpaid invoices are completed.\n\nThe Brand/Advertiser will be allowed one revision per video. The Brand/Advertiser will have [3] days from final delivery to submit a revision request. These revisions are limited to basic video edits, music, voiceover, text on screen, and cropping. Any revisions outside of those listed will cost $[50] per hour.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">VII. Raw Footage</div><div class=\"ct-b\">If raw footage is requested there will be an additional fee of $[AMOUNT] per 30\u201360 second clip. This is to be paid to the UGC Creator prior to sending the footage to the Brand/Advertiser.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">VIII. Usage Rights</div><div class=\"ct-b\">The Brand/Advertiser is purchasing content to be used both organically across social media platforms AND for paid advertising.\n\nIf the Brand/Advertiser is purchasing content to be used for advertising purposes, they will have [90] day paid advertising usage rights which will begin on the date of final content delivery/approval. Both parties can re-evaluate these terms and discuss a renewal contract after this [90] day period.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">IX. Copyright</div><div class=\"ct-b\">The UGC Creator will own the copyright of the uploaded media. However, both parties are allowed to share it on their own respective channels.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">X. Confidentiality</div><div class=\"ct-b\">This contract is strictly confidential and only authorized persons are allowed to see it.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">XI. Amendment</div><div class=\"ct-b\">This contract can only be changed or modified through the written consent of both parties (Brand/Advertiser and UGC Creator).</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">XII. Governing Law</div><div class=\"ct-b\">This contract shall be governed under the laws of [STATE] (United States).</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">XIII. Term</div><div class=\"ct-b\">The term of this contract shall commence on the Effective Date as stated above, and continue until content has been delivered, unless otherwise specified or terminated per the terms of this agreement.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">XIV. Mutual Indemnification</div><div class=\"ct-b\">Both the Brand/Advertiser and the UGC Creator agree to indemnify, defend, and hold each other harmless from any and all claims, demands, costs, liabilities, losses, expenses and damages (including reasonable attorneys' fees, costs, and expert witnesses' fees) in the event that a third party or an individual sues the Brand/Advertiser, or a third party or an individual is harmed in any way because of the content delivered to the Brand/Advertiser by the UGC Creator. At no point in time will the UGC Creator be held liable for any expenses or cost that result from a third party or individual in regards to the UGC Content that was delivered and uploaded to the internet and social platforms. The UGC Creator cannot be sued or deemed responsible or at fault to any person or business that may claim so due to the UGC Creator's content that was purchased or received by the Brand/Advertiser.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">XV. Termination</div><div class=\"ct-b\">Either party may terminate the Agreement at any time upon [3] days prior written notice to the other party. In the event the Brand/Advertiser terminates the Agreement, the Brand/Advertiser shall still remain obligated to pay the UGC Creator for any Services performed up to the date of termination and any expenses approved. In the event the UGC Creator terminates the Agreement, the UGC Creator shall reimburse the Brand/Advertiser any amounts previously paid to the UGC Creator for which the UGC Creator has not yet performed the services.\n\nThis Agreement will automatically terminate when both Parties have performed all of their obligations under the Agreement and payments have been received.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">XVI. Relationship of the Parties</div><div class=\"ct-b\">No Exclusivity. The Parties understand this Agreement is not an exclusive arrangement. The Parties agree they are free to enter into other similar agreements with other parties. The UGC Creator agrees the UGC Creator will not enter into any agreements that conflict with the UGC Creator's obligations under this Agreement.\n\nIndependent Contractor. The UGC Creator is an independent contractor. Neither Party is an agent, representative, partner, or employee of the other Brand/Advertiser.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">XVII. Dispute Resolution</div><div class=\"ct-b\">Choice of Law. The Parties agree that this Agreement shall be governed by the State and/or Country in which the duties of this Agreement are expected to take place. In the event that the duties of this Agreement are to take place in multiple States and/or Countries, this Agreement shall be governed by [California] law.\n\nNegotiation. In the event of a dispute, the Parties agree to work towards a resolution through good faith negotiation. In the event that a dispute cannot be resolved through good faith negotiation, the Parties agree to submit to binding mediation or arbitration.\n\nAttorney's Fees. In the event of arbitration and/or mediation, the prevailing Party will be entitled to its legal fees, including, but not limited to, its attorney's fees.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">XVIII. General</div><div class=\"ct-b\">Assignment. The Parties may not assign their rights and/or obligations under this Agreement.\n\nComplete Contract. This Agreement constitutes the Parties' entire understanding of their rights and obligations. This Agreement supersedes any other written or spoken communications between the Parties. Any subsequent changes to this Agreement must be made in writing and signed by both Parties.\n\nSeverability. If any section of this Agreement is found to be invalid, illegal, or unenforceable, the rest of this Agreement will still be enforceable.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">XIX. Signatures</div><div class=\"ct-b\">By signing below, the Parties agree to be bound by the terms of this Agreement.\n\n__________________________\nBrand/Advertiser Signature\n\n__________________________\nDate\n\n__________________________\nUGC Creator Signature\n\n__________________________\nDate</div></div>\n          </div>\n          <div class=\"ct-foot\"><button class=\"copy-btn\" onclick=\"copyE('ct1',this)\">Copy Full Contract</button></div>\n        </div>\n      </div>\n\n      <div class=\"ct-card\">\n        <button class=\"ct-head\" onclick=\"toggleContract(this)\">\n          <span class=\"ct-icon\">\ud83d\udd12</span>\n          <span class=\"ct-titles\">\n            <span class=\"ct-name\">Exclusivity Agreement <span class=\"tag tag-purple\">High Value</span></span>\n            <span class=\"ct-sub\">When brands want you all to themselves \u2014 always charge a premium.</span>\n          </span>\n          <span class=\"ct-chev\">\u203a</span>\n        </button>\n        <div class=\"ct-full\">\n          <div class=\"ct-desc\">Protects your income when a brand restricts you from working with competitors. Never agree to exclusivity without additional compensation.</div>\n          <div class=\"ct-doc\" id=\"ct2\">\n<div class=\"ct-sec\"><div class=\"ct-h\">UGC Exclusivity Agreement</div><div class=\"ct-b\">This Exclusivity Agreement (\"Agreement\") supplements and amends any prior UGC Content Creation Agreement between [BRAND NAME] (\"Brand\") and [CREATOR LEGAL NAME] (\"Creator\"), or stands independently where no such prior agreement exists.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">1. Exclusivity Scope</div><div class=\"ct-b\">Creator agrees not to create content for, promote, or accept compensation from the following competing brands or product categories during the Exclusivity Period:\n\n\u2022 Competing brands: [LIST SPECIFIC BRAND NAMES]\n\u2022 Product category: [e.g., \"skincare products containing retinol\" / \"direct-to-consumer mattress brands\"]\n\u2022 Exclusivity level: [Full category / Specific competitors only]\n\nIMPORTANT: Creator and Brand must agree on a precise, written definition of \"competitor.\" Vague language such as \"similar brands\" is not enforceable and will not be honored by Creator.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">2. Exclusivity Period</div><div class=\"ct-b\">\u2022 Start date: [DATE]\n\u2022 End date: [DATE]\n\u2022 Maximum exclusivity period: Creator will not agree to exclusivity exceeding [90 days] without a corresponding exclusivity premium.\n\nAfter the Exclusivity Period, Creator is free to work with any brand without restriction, unless a new written agreement is executed.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">3. Exclusivity Fee</div><div class=\"ct-b\">In consideration of the restrictions imposed, Brand shall pay Creator an exclusivity premium in addition to any content creation fees:\n\n\u2022 Exclusivity fee: $[AMOUNT] per [month / campaign period]\n\u2022 Calculation basis: Exclusivity fees should reflect Creator's estimated lost income from competing brands. Creator's recommended formula: Average monthly competing brand revenue \u00d7 [1.5\u20132x] multiplier\n\u2022 Payment: Due in full upon execution of this Agreement, non-refundable\n\nCREATOR NOTE: Never agree to exclusivity without additional compensation. Base rate covers content creation only.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">4. Brand Obligations</div><div class=\"ct-b\">In exchange for exclusivity, Brand commits to:\n\n\u2022 Providing [MINIMUM NUMBER] of content opportunities per [month / quarter]\n\u2022 Minimum guaranteed payment of $[AMOUNT] regardless of content volume\n\u2022 Priority review of Creator's pitches for new campaigns\n\u2022 Written notification of any intent to terminate exclusivity at least [30] days in advance</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">5. Carve-Outs</div><div class=\"ct-b\">The following are expressly excluded from this exclusivity arrangement and Creator may continue working with:\n\n\u2022 Existing contracts signed before [DATE]: [LIST ANY ACTIVE BRANDS]\n\u2022 Non-competing categories: [List permitted product categories]\n\u2022 Creator's own products or affiliate programs\n\nCreator shall disclose all active brand partnerships to Brand upon execution.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">6. Early Termination</div><div class=\"ct-b\">\u2022 Creator may terminate this Agreement with [30] days written notice if Brand fails to provide the minimum guaranteed opportunities or payment.\n\u2022 Brand may terminate early by paying Creator [100%] of the remaining exclusivity fees owed for the unexpired period.\n\u2022 Upon termination, all exclusivity restrictions immediately cease.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">7. Signatures</div><div class=\"ct-b\">BRAND: _________________________ Date: _________\n[Brand Representative Name &amp; Title]\n\nCREATOR: _______________________ Date: _________\n[Creator Legal Name]</div></div>\n          </div>\n          <div class=\"ct-foot\"><button class=\"copy-btn\" onclick=\"copyE('ct2',this)\">Copy Full Contract</button></div>\n        </div>\n      </div>\n\n      <div class=\"ct-card\">\n        <button class=\"ct-head\" onclick=\"toggleContract(this)\">\n          <span class=\"ct-icon\">\ud83d\udce1</span>\n          <span class=\"ct-titles\">\n            <span class=\"ct-name\">Whitelisting &amp; Spark Ads Agreement <span class=\"tag tag-cyan\">Ad Rights</span></span>\n            <span class=\"ct-sub\">Running your content as paid ads \u2014 this is ad-spend territory, price it high.</span>\n          </span>\n          <span class=\"ct-chev\">\u203a</span>\n        </button>\n        <div class=\"ct-full\">\n          <div class=\"ct-desc\">Grants brands access to run paid ads through your social account. Requires premium pricing \u2014 brands spend far more on ads than your creation fee.</div>\n          <div class=\"ct-doc\" id=\"ct3\">\n<div class=\"ct-sec\"><div class=\"ct-h\">Creator Whitelisting &amp; Paid Amplification Agreement</div><div class=\"ct-b\">This Whitelisting Agreement (\"Agreement\") is entered into between [BRAND NAME] (\"Brand\") and [CREATOR LEGAL NAME] (\"Creator\") and governs Brand's use of Creator's social media account(s) for paid advertising purposes.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">1. What Whitelisting Means</div><div class=\"ct-b\">Whitelisting (also known as Creator Licensing or Spark Ads on TikTok) allows Brand to:\n\n\u2022 Run paid advertisements using Creator's posts, boosting them to audiences beyond Creator's organic followers\n\u2022 Access Creator's account identity (profile photo, handle, follower count) within ad placements\n\u2022 Test multiple versions of Creator's content in A/B ad campaigns\n\u2022 Access Creator's engagement metrics for ad reporting purposes\n\nCreator does NOT grant Brand the ability to: post new content on Creator's behalf, send messages from Creator's account, view Creator's private messages, or access Creator's personal account data beyond what is specified herein.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">2. Platform Authorization</div><div class=\"ct-b\">Creator authorizes whitelisting on the following platform(s):\n\n\u2022 [TikTok via Spark Ads / Meta (Instagram + Facebook) / YouTube / Pinterest]\n\u2022 Authorization method: Creator will grant access via the platform's official creator/business tools dashboard\n\u2022 Creator shall revoke authorization through platform settings upon Agreement expiration\n\nCreator may revoke platform access at any time if Brand violates the terms of this Agreement.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">3. Whitelisting Fee</div><div class=\"ct-b\">Brand shall pay Creator the following fees for whitelisting authorization:\n\n\u2022 Whitelisting fee: $[AMOUNT] per [month / campaign]\n\u2022 Basis: Separate from and in addition to content creation fees\n\u2022 Recommended pricing: Creator's whitelisting fee should be no less than [50\u2013100%] of content creation fee per month of use\n\n\u2022 Ad spend threshold: If Brand's monthly ad spend on Creator's content exceeds $[AMOUNT], an additional revenue share of [5\u201310%] of excess ad spend is owed to Creator.\n\nCREATOR NOTE: Brands spend significantly more running ads than your creation fee. Price whitelisting accordingly.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">4. Content Approved for Amplification</div><div class=\"ct-b\">Only the following specific pieces of Content are authorized for paid amplification:\n\n\u2022 [Content ID / Description #1]\n\u2022 [Content ID / Description #2]\n\u2022 [Add all approved pieces]\n\nBrand may NOT boost, promote, or amplify any content not listed above without Creator's separate written consent and additional compensation.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">5. Whitelisting Period</div><div class=\"ct-b\">\u2022 Authorization start: [DATE]\n\u2022 Authorization end: [DATE]\n\u2022 Maximum term: [30 / 60 / 90] days per authorization\n\nCreator shall revoke platform access within [3] business days of Agreement expiration. Brand shall not continue running ads beyond the authorized period. Any ads running past expiration constitute unauthorized use and Brand shall owe Creator [2x] the daily whitelisting rate for each day of overrun.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">6. Brand Use Restrictions</div><div class=\"ct-b\">Brand agrees that during the whitelisting period, it will NOT:\n\n\u2022 Alter, edit, or modify Creator's original content without written approval\n\u2022 Use Creator's likeness or identity in any ad context outside the approved platforms\n\u2022 Share, transfer, or sublicense whitelisting access to any third-party agency without written consent\n\u2022 Use Creator's account access to comment, post, or engage as Creator\n\nViolation of any restriction grants Creator the right to immediately revoke access and seek damages.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">7. Reporting</div><div class=\"ct-b\">Brand shall provide Creator with ad performance reports [monthly / upon request], including: impressions, reach, click-through rate, and total ad spend against Creator's content. This data remains confidential.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">8. Signatures</div><div class=\"ct-b\">BRAND: _________________________ Date: _________\n[Brand Representative Name &amp; Title]\n\nCREATOR: _______________________ Date: _________\n[Creator Legal Name]</div></div>\n          </div>\n          <div class=\"ct-foot\"><button class=\"copy-btn\" onclick=\"copyE('ct3',this)\">Copy Full Contract</button></div>\n        </div>\n      </div>\n\n      <div class=\"ct-card\">\n        <button class=\"ct-head\" onclick=\"toggleContract(this)\">\n          <span class=\"ct-icon\">\u270f\ufe0f</span>\n          <span class=\"ct-titles\">\n            <span class=\"ct-name\">Revisions &amp; Scope Creep Addendum <span class=\"tag tag-amber\">Protect Your Time</span></span>\n            <span class=\"ct-sub\">For when brands keep changing the brief \u2014 defines limits and charges for creep.</span>\n          </span>\n          <span class=\"ct-chev\">\u203a</span>\n        </button>\n        <div class=\"ct-full\">\n          <div class=\"ct-desc\">Attach this to any agreement to define revision limits and charge for scope creep. Saves you from endless back-and-forth.</div>\n          <div class=\"ct-doc\" id=\"ct4\">\n<div class=\"ct-sec\"><div class=\"ct-h\">Revisions &amp; Scope Change Addendum</div><div class=\"ct-b\">This Addendum (\"Addendum\") supplements the primary UGC Content Creation Agreement between [BRAND NAME] (\"Brand\") and [CREATOR LEGAL NAME] (\"Creator\") dated [DATE]. In the event of any conflict, this Addendum controls.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">1. Defining a Revision</div><div class=\"ct-b\">A \"Revision\" means any Brand-requested change to Content after Creator delivers an initial draft. Revisions include:\n\n\u2022 Editing video/audio cuts, timing, or pacing\n\u2022 Changing on-screen text, captions, or overlays\n\u2022 Replacing, adding, or removing music or sound effects\n\u2022 Re-recording voiceover due to script changes initiated by Brand\n\u2022 Adjusting color grading, brightness, or visual style\n\nA Revision does NOT include: Creator correcting their own errors, fixing technical encoding issues, or delivering content in an alternate format requested at the time of the original brief.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">2. Included Revisions</div><div class=\"ct-b\">The base contract fee includes the following revision rounds:\n\n\u2022 [2] rounds of revisions, each consisting of consolidated Brand feedback\n\u2022 \"Consolidated\" means: all feedback for one round submitted in a single communication (email, shared document, or video comment)\n\u2022 Creator is NOT obligated to implement feedback submitted in multiple rounds, installments, or across different team members as separate revision requests\n\nRevision feedback must be submitted within [5] business days of Creator delivering a draft. Failure to provide feedback within this window waives the revision for that round.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">3. Additional Revision Fees</div><div class=\"ct-b\">Additional revisions beyond the included rounds will be billed as follows:\n\n\u2022 Per additional revision round: $[AMOUNT]\n\u2022 Per additional hour of work: $[AMOUNT]/hour (billed in 30-minute increments)\n\u2022 Rush revision (under 24 hours): $[AMOUNT] flat fee per piece\n\nCreator will invoice additional revision fees before delivering revised content. Brand must pay within [5] business days. Failure to pay pauses all project work.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">4. Scope Changes</div><div class=\"ct-b\">A \"Scope Change\" occurs when Brand requests work outside the original brief after the Agreement is signed. Scope Changes include:\n\n\u2022 Adding deliverables not in the original scope\n\u2022 Changing platforms, formats, or aspect ratios after production begins\n\u2022 Requesting significant concept changes after draft delivery\n\u2022 Adding product variants, scenes, or characters not in original brief\n\nScope Changes require a written Change Order signed by both parties before Creator begins additional work. Scope Changes will be priced at Creator's current rate plus a [25%] complexity premium.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">5. Brief Change Policy</div><div class=\"ct-b\">If Brand changes the creative brief after Creator begins production:\n\n\u2022 Minor changes (tone, wording, CTA): $[AMOUNT] flat fee, no timeline extension\n\u2022 Major changes (concept overhaul, new product, new talent): $[AMOUNT] + [3\u20135] business day timeline extension\n\u2022 Complete brief restart: Creator is owed [50%] of original fee for abandoned work, plus a new agreement for the revised scope\n\nCreator is under no obligation to honor a brand-new brief under original pricing.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">6. Communication Protocol</div><div class=\"ct-b\">All revision requests must be submitted:\n\n\u2022 Via: [Email / Shared feedback document / Frame.io / Loom]\n\u2022 Format: Timestamped notes for video, annotated files for images\n\u2022 Point of contact: One designated Brand contact. Creator is not obligated to implement conflicting feedback from multiple stakeholders.\n\nCreator's turnaround for revisions: [2\u20133] business days from receipt of consolidated feedback.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">7. Final Approval &amp; Delivery</div><div class=\"ct-b\">Content is considered \"Final and Approved\" upon Brand's written confirmation OR [3] business days of silence following Creator's submission of final draft.\n\nOnce final approval is given, no further revisions are permitted under this Agreement. Any subsequent changes require a new agreement.\n\nCREATOR: _______________________ Date: _________\nBRAND: _________________________ Date: _________</div></div>\n          </div>\n          <div class=\"ct-foot\"><button class=\"copy-btn\" onclick=\"copyE('ct4',this)\">Copy Full Contract</button></div>\n        </div>\n      </div>\n\n      <div class=\"ct-card\">\n        <button class=\"ct-head\" onclick=\"toggleContract(this)\">\n          <span class=\"ct-icon\">\ud83d\uded1</span>\n          <span class=\"ct-titles\">\n            <span class=\"ct-name\">Kill Fee Agreement <span class=\"tag tag-pink\">Get Paid Anyway</span></span>\n            <span class=\"ct-sub\">When brands cancel after you've started \u2014 your time has value at every stage.</span>\n          </span>\n          <span class=\"ct-chev\">\u203a</span>\n        </button>\n        <div class=\"ct-full\">\n          <div class=\"ct-desc\">Ensures you're compensated if a brand cancels mid-project. Non-negotiable once the applicable stage is reached.</div>\n          <div class=\"ct-doc\" id=\"ct5\">\n<div class=\"ct-sec\"><div class=\"ct-h\">Kill Fee &amp; Project Cancellation Agreement</div><div class=\"ct-b\">This Kill Fee Agreement (\"Agreement\") is entered into between [BRAND NAME] (\"Brand\") and [CREATOR LEGAL NAME] (\"Creator\") and governs compensation owed to Creator in the event of project cancellation, indefinite delay, or material modification by Brand after Agreement execution.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">1. What Triggers a Kill Fee</div><div class=\"ct-b\">A kill fee is owed to Creator whenever Brand:\n\n\u2022 Cancels the project for any reason after Agreement execution\n\u2022 Indefinitely delays the project by more than [30] days without Creator's written consent\n\u2022 Reduces the agreed deliverable count by more than [25%] after production begins\n\u2022 Materially changes the project scope in a way that requires Creator to redo completed work\n\u2022 Fails to deliver required assets (products, briefs, approvals) within [14] business days of the agreed schedule, causing project failure\n\nKill fees are owed regardless of the reason for cancellation, including internal brand decisions, budget cuts, leadership changes, or campaign pivots.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">2. Kill Fee Schedule</div><div class=\"ct-b\">Kill fees are calculated based on the stage of completion at which Brand cancels:\n\nSTAGE 1 \u2014 Pre-production (Agreement signed, brief received, no filming begun):\n\u2022 Kill fee: [25\u201335%] of total project fee\n\nSTAGE 2 \u2014 Production underway (filming begun, raw footage captured):\n\u2022 Kill fee: [50%] of total project fee\n\nSTAGE 3 \u2014 Post-production (editing, revisions, or final delivery in progress):\n\u2022 Kill fee: [75%] of total project fee\n\nSTAGE 4 \u2014 Content delivered and approved:\n\u2022 Kill fee: [100%] of total project fee (full payment owed regardless of whether Brand uses the content)\n\nCreator shall determine the applicable stage at the time Brand communicates cancellation.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">3. Kill Fee Payment Terms</div><div class=\"ct-b\">\u2022 Kill fee invoice will be issued within [3] business days of Brand's cancellation notice\n\u2022 Payment due: Within [10] business days of invoice\n\u2022 Late payment: 1.5% per month interest on outstanding balance\n\u2022 Collections: Creator may engage a collections agency or pursue legal action for unpaid kill fees after [30] days of non-payment, with Brand responsible for all associated costs\n\nKill fees are non-negotiable once the applicable stage is reached.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">4. Content Ownership Upon Cancellation</div><div class=\"ct-b\">Upon payment of the applicable kill fee:\n\n\u2022 STAGE 1 kill fee paid: Brand receives no content; Creator retains all rights\n\u2022 STAGE 2 kill fee paid: Creator retains all footage; Brand receives no content\n\u2022 STAGE 3 kill fee (75%) paid: Brand receives completed Content for internal review only; no usage rights are granted\n\u2022 FULL (100%) kill fee paid: Brand receives the Content and the usage rights specified in the original Agreement\n\nIf Brand wishes to acquire usage rights when only a partial kill fee applies, additional licensing fees are required.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">5. Notice Requirements</div><div class=\"ct-b\">Brand must notify Creator of cancellation in writing (email is sufficient) to:\n\n\u2022 [CREATOR EMAIL ADDRESS]\n\u2022 Subject line: \"Project Cancellation \u2014 [PROJECT NAME]\"\n\nCancellation is effective on the date Creator receives written notice. Verbal notice does not trigger the kill fee schedule and does not constitute cancellation under this Agreement.\n\nCreator shall confirm receipt within [1] business day.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">6. Creator's Obligations Upon Cancellation</div><div class=\"ct-b\">Upon Brand's valid cancellation notice and kill fee payment:\n\n\u2022 Creator will cease all work on the project\n\u2022 Creator will preserve (but not deliver) all captured footage and files for [60] days\n\u2022 Creator will not use or publish any project-specific content featuring Brand's products without separate written permission\n\u2022 Creator is immediately free to engage with competing brands unless a separate exclusivity agreement remains in effect (and its associated fees are paid)</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">7. Non-Cancellation by Creator</div><div class=\"ct-b\">If Creator cancels the project without cause:\n\n\u2022 Creator shall refund any prepaid fees on a pro-rata basis for undelivered work\n\u2022 Creator forfeits any unpaid portion of the project fee\n\u2022 No kill fee is owed to Creator\n\n\"Without cause\" means cancellation unrelated to Brand's failure to perform, pay, or comply with Agreement terms.</div></div>\n<div class=\"ct-sec\"><div class=\"ct-h\">8. Signatures</div><div class=\"ct-b\">BRAND: _________________________ Date: _________\n[Brand Representative Name &amp; Title]\n\nCREATOR: _______________________ Date: _________\n[Creator Legal Name]</div></div>\n          </div>\n          <div class=\"ct-foot\"><button class=\"copy-btn\" onclick=\"copyE('ct5',this)\">Copy Full Contract</button></div>\n        </div>\n      </div>\n\n      <div class=\"divider\"></div>\n\n      <div class=\"card\" style=\"border-color:var(--pink-border);\">\n        <div class=\"card-title\" style=\"color:var(--pink);\">Contract Vault</div>\n        <div class=\"card-body\">Five contract templates reviewed by a real entertainment lawyer. Standard UGC, exclusivity, whitelisting, revisions, and kill-fee.</div>\n      </div>\n\n      <div class=\"insight\"><div class=\"i-head\">The contract conversation
