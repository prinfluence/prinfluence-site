 IS the relationship</div><div class=\"i-body\">How a brand negotiates your contract tells you exactly how they'll treat you for the rest of the partnership. Brands who push back on every protective clause, drag out negotiations, or ask you to lower your rate \"just for this one\" are showing you the future. Trust the signal. Great brand partners make contracts fast and fair \u2014 because they want to work with you again.</div></div>\n    </div>\n\n    <!-- \u2550\u2550\u2550 CHECKLIST \u2550\u2550\u2550 -->\n    <div id=\"checklist\" class=\"page\">\n      <div class=\"mod-header\">\n        <div class=\"mod-num\">11</div>\n        <div class=\"mod-title-wrap\">\n          <div class=\"mod-label\">Module</div>\n          <div class=\"mod-name\">Launch Checklist \u2014 Go Dealworthy</div>\n        </div>\n      </div>\n      <div class=\"page-intro\">Every item here is a signal to brands \u2014 and to yourself \u2014 that you're operating as a professional. Work through it once. Then keep it as your standard.</div>\n\n      <div style=\"margin-bottom:1.25rem;\">\n        <div style=\"display:flex;justify-content:space-between;margin-bottom:5px;\">\n          <span style=\"font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.1em;\">Completion</span>\n          <span style=\"font-size:11px;font-weight:600;color:var(--pink);\" id=\"cl-count\">0 / 18 complete</span>\n        </div>\n        <div class=\"prog-wrap\"><div class=\"prog-fill\" id=\"cl-bar\" style=\"width:0%;\"></div></div>\n      </div>\n\n      <div class=\"card\">\n        <span class=\"cl-section-label\">Foundation</span>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>Positioning statement written.</strong> You can describe who you are, what you create, and who you serve in 2 sentences \u2014 clearly and confidently.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>3 content pillars defined.</strong> The 3 consistent themes that run through your content, specific enough that a brand can immediately see your lane.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>Engagement rate calculated.</strong> You know your current rate and can state it confidently in a pitch. Anything above 4% leads with this number.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>AVV calculated.</strong> Average views from your last 10\u201315 videos. The foundation of all brand deal pricing.</div></div>\n\n        <span class=\"cl-section-label\">Portfolio</span>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>3 portfolio pieces created.</strong> At least one testimonial, one tutorial or B&amp;A, one lifestyle integration \u2014 filmed intentionally for brand use.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>Performance data documented.</strong> Screenshots of views, engagement, saves, and relevant comments from each piece. This is your proof.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>Portfolio link ready.</strong> A link where brands can see your work \u2014 even a Google Drive folder or Linktree works. It just needs to exist.</div></div>\n\n        <span class=\"cl-section-label\">Business</span>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>Rate card built.</strong> Single UGC video, 3-video package, brand deal post, usage rights tiers, and add-ons. Use the calculator in this kit.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>Rate floor set.</strong> You know the minimum you will accept. You've written it down. You've committed to it.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>Basic media kit created.</strong> Name, niche, platform, metrics, 3 portfolio samples, contact info. A Canva one-pager works.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>Professional email set up.</strong> Your@yourname.com or a clean Gmail. Creator handles are not professional email addresses.</div></div>\n\n        <span class=\"cl-section-label\">Outreach</span>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>10-brand outreach list built.</strong> 10 brands that align with your pillars. Contact name and email found for each. Logged in a tracker.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>First 3 pitches sent.</strong> Using the templates in this kit, customized with a specific opener for each brand. Follow-up dates set.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>Follow-up system in place.</strong> You know when you'll follow up and you have the template ready. Deals go to the persistent.</div></div>\n\n        <span class=\"cl-section-label\">Mindset</span>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>You've stated your rate out loud.</strong> Say it: \"My rate for a 3-video UGC package is $[X].\" If it makes you uncomfortable, say it again. Confidence lives in repetition.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>You understand usage rights.</strong> You can explain base use, paid ad rights, duration extensions, and exclusivity. You won't give this away for free again.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>You've committed to 5 days.</strong> The 5-Day Strategy is locked into your calendar. Not \"when you feel ready.\" Starting today.</div></div>\n        <div class=\"cl-item\"><div class=\"cl-box\" onclick=\"chk(this)\"></div><div class=\"cl-text\"><strong>You've upgraded to the Pitch Vault.</strong> [Pitch] Paid, Period. is your next step \u2014 the 10 advanced templates, the P.A.I.D. Framework, and the full brand negotiation system.</div></div>\n      </div>\n\n      <div class=\"closing\">\n        <div style=\"display:inline-block;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:4px 14px;border-radius:20px;background:var(--pink-dim);color:var(--pink);border:1px solid var(--pink-border);margin-bottom:1rem;position:relative;\">You're Dealworthy</div>\n        <h2>Momentum comes from clarity.<br><em>Now let's go.</em></h2>\n        <p>You have the mindset, positioning, strategy, vocabulary, rates, and outreach system to start landing paid brand deals. The only thing left is the work. Do it today.</p>\n        <div class=\"cta-row\">\n          <button class=\"btn-primary\" onclick=\"showPage('pitchvault', document.querySelector(&quot;.sb-item[onclick*='pitchvault']&quot;))\">Get [Pitch] Paid, Period. \u2192</button>\n          <button class=\"btn-ghost\" onclick=\"showPage('outreach', document.querySelector(&quot;.sb-item[onclick*='outreach']&quot;))\">Get the Outreach Tracker</button>\n        </div>\n      </div>\n    </div>\n\n    <!-- \u2550\u2550\u2550 UPSELL PAGE STYLES \u2550\u2550\u2550 -->\n    <style>\n      .up-hero{position:relative;border-radius:18px;overflow:hidden;background:linear-gradient(160deg,#1e1030 0%,#241a36 45%,#1a1535 100%);border:1px solid var(--border2);padd an class=\"up-feat-icon\">\ud83d\udce8</span><div class=\"up-feat-title\">50+ Advanced Pitch Scripts</div><div class=\"up-feat-desc\">Cold, warm, inbound, re-engagement, agency, and high-ticket \u2014 every scenario the starter kit's 12 don't cover.</div></div>\n        <div class=\"up-feat\"><span class=\"up-feat-icon\">\ud83e\udde9</span><div class=\"up-feat-title\">The Full P.A.I.D. Framework</div><div class=\"up-feat-desc\">Position \u00b7 Ask \u00b7 Itemize \u00b7 Defend. The complete negotiation system, broken into copy-paste language for every stage.</div></div>\n        <div class=\"up-feat\"><span class=\"up-feat-icon\">\ud83d\udee1\ufe0f</span><div class=\"up-feat-title\">Objection-Handling Vault</div><div class=\"up-feat-desc\">Word-for-word responses to \"that's out of budget,\" \"can you do it for product,\" and every rate pushback you'll hear.</div></div>\n        <div class=\"up-feat\"><span class=\"up-feat-icon\">\ud83d\udd01</span><div class=\"up-feat-title\">7-Touch Follow-Up Sequences</div><div class=\"up-feat-desc\">The exact cadence and copy that books deals from silence. Most money is made in follow-up four through seven.</div></div>\n        <div class=\"up-feat\"><span class=\"up-feat-icon\">\ud83d\udc8e</span><div class=\"up-feat-title\">High-Ticket &amp; Retainer Scripts</div><div class=\"up-feat-desc\">Language for pitching $5K+ packages and monthly retainers without flinching at the number.</div></div>\n        <div class=\"up-feat\"><span class=\"up-feat-icon\">\ud83c\udfaf</span><div class=\"up-feat-title\">Rate-Defense Playbook</div><div class=\"up-feat-desc\">Hold your number with grace. Scripts that protect your floor while keeping the relationship warm.</div></div>\n      </div>\n\n      <div class=\"up-section-label\">Starter Kit vs. Pitch Vault</div>\n      <div class=\"up-compare\">\n        <div class=\"up-compare-row\">\n          <div class=\"up-compare-col\">\n            <div class=\"up-compare-h\" style=\"color:var(--text3);\">\u25c7 This Kit (Module 09)</div>\n            <div class=\"up-compare-li\"><span class=\"x\">\u2014</span> 12 foundational pitch templates</div>\n            <div class=\"up-compare-li\"><span class=\"x\">\u2014</span> First-contact + basic follow-up</div>\n            <div class=\"up-compare-li\"><span class=\"x\">\u2014</span> Single negotiation example</div>\n            <div class=\"up-compare-li\"><span class=\"x\">\u2014</span> Gets your first deals in motion</div>\n          </div>\n          <div class=\"up-compare-col\">\n            <div class=\"up-compare-h\" style=\"color:var(--pink);\">\u25b2 Pitch Vault</div>\n            <div class=\"up-compare-li\"><span class=\"c\">\u2726</span> 50+ scripts across every scenario</div>\n            <div class=\"up-compare-li\"><span class=\"c\">\u2726</span> Full 7-touch follow-up sequences</div>\n            <div class=\"up-compare-li\"><span class=\"c\">\u2726</span> Complete P.A.I.D. negotiation system</div>\n            <div class=\"up-compare-li\"><span class=\"c\">\u2726</span> Closes bigger deals, faster, at higher rates</div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"up-testi\">\n        <div class=\"up-testi-quote\">\"Most money in creator deals isn't made in the first pitch \u2014 it's made in the reply after the reply. That's the exact moment the Vault is built for.\"</div>\n        <div class=\"up-testi-by\">\n          <div class=\"up-testi-av\">\u2726</div>\n          <div><div class=\"up-testi-name\">The Deal Worthy principle</div><div class=\"up-testi-role\">Why the Vault exists</div></div>\n        </div>\n      </div>\n\n      <div class=\"up-buybox\">\n        <div class=\"up-eyebrow\" style=\"margin-bottom:1.2rem;\">Founding member price</div>\n        <div class=\"up-price-row\">\n          <span class=\"up-price\">$29</span>\n          <span class=\"up-price-old\">$129</span>\n          <span class=\"up-price-save\">Save 78%</span>\n        </div>\n        <div class=\"up-price-note\">One-time payment \u00b7 Lifetime access \u00b7 All future updates included</div>\n        <a class=\"up-buy-btn\" href=\"https://buy.stripe.com/cNibJ21HybRZ5Jq2gL2go05\" target=\"_blank\" rel=\"noopener\">Unlock the Pitch Vault \u2192</a>\n        <div class=\"up-buy-sub\">\ud83d\udd12 Secure checkout via Stripe \u00b7 Instant access</div>\n        <div class=\"up-guarantee\"><span>\u2713</span> 14-day money-back guarantee \u2014 close a deal or it's free.</div>\n      </div>\n\n      <div class=\"up-faq\">\n        <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">How is this different from the 12 pitches I already have? <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">The starter kit gets you in the door. The Vault gets you the signature. It's built for everything that happens after first contact \u2014 negotiation, objections, follow-up, and high-ticket pricing \u2014 with 50+ scripts versus the kit's 12 foundational templates.</div></div>\n        <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">Will these work if I'm brand new? <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">Yes. Every script is plug-and-play with bracketed placeholders. If you've completed the Deal Worthy modules, you have everything you need to use the Vault on day one.</div></div>\n        <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">Is it really a one-time payment? <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">Yes \u2014 pay once, keep it forever, including every future script we add. No subscription.</div></div>\n      </div>\n    </div>\n\n    <!-- \u2550\u2550\u2550 OUTREACH TRACKER (UPSELL) \u2550\u2550\u2550 -->\n    <div id=\"outreach\" class=\"page\">\n      <div class=\"up-hero\">\n        <div class=\"up-eyebrow\">Upgrade \u00b7 The Outreach Tracker</div>\n        <div class=\"up-title\">Your 200-brand list deserves<br><em>a system, not a spreadsheet.</em></div>\n        <div class=\"up-sub\">The Outreach Tracker turns the Brand Hit List from Module 08 into a living pipeline \u2014 every pitch, follow-up, and signed deal tracked automatically, so no opportunity ever slips through the cracks again.</div>\n      </div>\n\n      <div class=\"up-bridge\">\n        <span class=\"up-bridge-icon\">\ud83d\udd17</span>\n        <div class=\"up-bridge-text\">Module 08 gave you <strong>200 brands and their contacts</strong>. The Tracker is where you <em>work</em> that list \u2014 a plug-and-play Notion + Google Sheets system pre-loaded with all 200 brands, so you go from \"I have a list\" to \"I have a pipeline\" in one click.</div>\n      </div>\n\n      <div class=\"up-section-label\">What's inside</div>\n      <div class=\"up-inside\">\n        <div class=\"up-feat\"><span class=\"up-feat-icon\">\ud83d\udcc7</span><div class=\"up-feat-title\">All 200 Brands, Pre-Loaded</div><div class=\"up-feat-desc\">The entire Hit List already entered \u2014 niche, contact role, and email format ready to filter and sort.</div></div>\n        <div class=\"up-feat\"><span class=\"up-feat-icon\">\ud83d\udcca</span><div class=\"up-feat-title\">Live Pipeline Dashboard</div><div class=\"up-feat-desc\">See every deal by stage at a glance: To Pitch \u00b7 Pitched \u00b7 In Talks \u00b7 Negotiating \u00b7 Signed \u00b7 Paid.</div></div>\n        <div class=\"up-feat\"><span class=\"up-feat-icon\">\u23f0</span><div class=\"up-feat-title\">Auto Follow-Up Reminders</div><div class=\"up-feat-desc\">Set a follow-up date and the system flags it. The fortune is in the follow-up \u2014 never miss one.</div></div>\n        <div class=\"up-feat\"><span class=\"up-feat-icon\">\ud83d\udcb0</span><div class=\"up-feat-title\">Revenue &amp; Rate Tracker</div><div class=\"up-feat-desc\">Track what you quoted, what you closed, and your running income. Watch your average rate climb.</div></div>\n        <div class=\"up-feat\"><span class=\"up-feat-icon\">\ud83d\udcdd</span><div class=\"up-feat-title\">Per-Brand Notes &amp; History</div><div class=\"up-feat-desc\">Every conversation, every contact, every deliverable logged against each brand. Total recall.</div></div>\n        <div class=\"up-feat\"><span class=\"up-feat-icon\">\ud83d\udcc8</span><div class=\"up-feat-title\">Conversion Analytics</div><div class=\"up-feat-desc\">Know your pitch-to-reply and reply-to-close rates so you can sharpen what's actually working.</div></div>\n      </div>\n\n      <div class=\"up-section-label\">Spreadsheet chaos vs. the Tracker</div>\n      <div class=\"up-compare\">\n        <div class=\"up-compare-row\">\n          <div class=\"up-compare-col\">\n            <div class=\"up-compare-h\" style=\"color:var(--text3);\">\u25c7 Doing it manually</div>\n            <div class=\"up-compare-li\"><span class=\"x\">\u2014</span> Pitches scattered across your inbox</div>\n            <div class=\"up-compare-li\"><span class=\"x\">\u2014</span> Forgotten follow-ups = lost deals</div>\n            <div class=\"up-compare-li\"><span class=\"x\">\u2014</span> No idea what you've quoted whom</div>\n            <div class=\"up-compare-li\"><span class=\"x\">\u2014</span> Re-typing the 200 brands yourself</div>\n          </div>\n          <div class=\"up-compare-col\">\n            <div class=\"up-compare-h\" style=\"color:var(--pink);\">\u25eb Outreach Tracker</div>\n            <div class=\"up-compare-li\"><span class=\"c\">\u2726</span> One dashboard for your whole pipeline</div>\n            <div class=\"up-compare-li\"><span class=\"c\">\u2726</span> Automatic follow-up flags</div>\n            <div class=\"up-compare-li\"><span class=\"c\">\u2726</span> Live revenue + conversion tracking</div>\n            <div class=\"up-compare-li\"><span class=\"c\">\u2726</span> All 200 brands loaded, ready to go</div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"up-testi\">\n        <div class=\"up-testi-quote\">\"A list of 200 brands is only worth something if you actually work it. The Tracker is the difference between a list you saved and a pipeline that pays.\"</div>\n        <div class=\"up-testi-by\">\n          <div class=\"up-testi-av\">\u25ab</div>\n          <div><div class=\"up-testi-name\">The Deal Worthy principle</div><div class=\"up-testi-role\">Why the Tracker exists</div></div>\n        </div>\n      </div>\n\n      <div class=\"up-buybox\">\n        <div class=\"up-eyebrow\" style=\"margin-bottom:1.2rem;\">Bundle-ready price</div>\n        <div class=\"up-price-row\">\n          <span class=\"up-price\">$29</span>\n          <span class=\"up-price-old\">$89</span>\n          <span class=\"up-price-save\">Save 67%</span>\n        </div>\n        <div class=\"up-price-note\">One-time payment \u00b7 Notion + Google Sheets \u00b7 Lifetime updates</div>\n        <a class=\"up-buy-btn\" href=\"https://buy.stripe.com/5kQ8wQcmc1dl7RyaNh2go06\" target=\"_blank\" rel=\"noopener\">Get the Outreach Tracker \u2192</a>\n        <div class=\"up-buy-sub\">\ud83d\udd12 Secure checkout via Stripe \u00b7 Instant access</div>\n        <div class=\"up-guarantee\"><span>\u2713</span> 14-day money-back guarantee \u2014 no questions asked.</div>\n      </div>\n\n      <div class=\"up-faq\">\n        <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">Do I need Notion to use it? <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">No \u2014 it ships in both Notion and Google Sheets, so you can use whichever you already love. Both come pre-loaded with all 200 brands from the Hit List.</div></div>\n        <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">Is this just the Brand Hit List again? <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">No. Module 08 is the <em>list</em>. The Tracker is the <em>system</em> that works the list \u2014 pipeline stages, follow-up reminders, revenue tracking, and analytics, with the 200 brands already entered so you skip the setup.</div></div>\n        <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">Can I get both the Vault and the Tracker? <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">Absolutely \u2014 they're designed to work together. The Pitch Vault gives you the scripts; the Tracker gives you the system to run them at scale.</div></div>\n      </div>\n    </div>\n\n  </main>\n</div>\n\n<!-- FOOTER -->\n<footer class=\"footer\">\n  <div class=\"footer-logo\">\n    <div class=\"footer-logo-dot\">Pr</div>\n    <span class=\"footer-name\">Prinfluence Studios</span>\n  </div>\n  <span class=\"footer-copy\">\u00a9 2026 Prinfluence \u00b7 Dealworthy Starter Kit</span>\n</footer>\n\n</div><!-- end app -->\n\n<script>\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n/* \u2550\u2550\u2550 HOLOGRAPHIC HERO \u2014 tilt + shimmer + particles */\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n(function(){\n  const wrap = document.getElementById('holo-wrap');\n  const card = document.getElementById('holo-hero');\n  const shimmer = document.getElementById('holo-shimmer');\n  const cursor = document.getElementById('holo-cursor');\n  const pulse = document.getElementById('holo-pulse');\n  const orb1 = document.getElementById('holo-orb1');\n  const orb2 = document.getElementById('holo-orb2');\n  const orb3 = document.getElementById('holo-orb3');\n  const parallaxEl = document.getElementById('holo-parallax');\n  const logo = document.getElementById('holo-logo');\n  const particlesEl = document.getElementById('holo-particles');\n  if(!wrap || !card) return;\n\n  /* \u2500\u2500 spawn particles \u2500\u2500 */\n  const PARTICLES = [\n    {x:8,  y:10, size:3, c:'rgba(226,116,160,0.9)', d:0,   du:3.2},\n    {x:85, y:8,  size:2, c:'rgba(196,176,255,0.9)', d:0.5, du:2.8},\n    {x:15, y:80, size:4, c:'rgba(226,116,160,0.7)', d:1,   du:3.5},\n    {x:90, y:75, size:2, c:'rgba(100,200,255,0.8)', d:0.3, du:2.5},\n    {x:50, y:5,  size:3, c:'rgba(160,255,200,0.7)', d:0.8, du:4  },\n    {x:5,  y:45, size:2, c:'rgba(255,220,100,0.8)', d:1.2, du:3  },\n    {x:92, y:40, size:3, c:'rgba(226,116,160,0.8)', d:0.2, du:2.7},\n    {x:45, y:92, size:2, c:'rgba(196,176,255,0.8)', d:0.7, du:3.3},\n    {x:72, y:20, size:2, c:'rgba(100,200,255,0.7)', d:1.5, du:2.9},\n    {x:28, y:60, size:3, c:'rgba(255,180,220,0.7)', d:0.4, du:3.8},\n    {x:60, y:85, size:2, c:'rgba(196,176,255,0.6)', d:0.9, du:2.6},\n    {x:35, y:15, size:4, c:'rgba(226,116,160,0.5)', d:1.3, du:4.2},\n  ];\n  PARTICLES.forEach(p=>{\n    const el=document.createElement('div');\n    el.className='holo-particle';\n    el.style.left=p.x+'%';\n    el.style.top=p.y+'%';\n    el.style.width=p.size+'px';\n    el.style.height=p.size+'px';\n    el.style.background=p.c;\n    el.style.boxShadow=`0 0 ${p.size*3}px ${p.c}`;\n    el.style.animation=`floatParticle ${p.du}s ${p.d}s ease-in-out infinite alternate`;\n    particlesEl.appendChild(el);\n  });\n\n  /* \u2500\u2500 smooth tilt + shimmer follow \u2500\u2500 */\n  let target = {x:0.5, y:0.5};\n  let smooth = {x:0.5, y:0.5};\n  let raf;\n\n  function tick(){\n    smooth.x += (target.x - smooth.x) * 0.08;\n    smooth.y += (target.y - smooth.y) * 0.08;\n\n    const rx = (smooth.y - 0.5) * 22;\n    const ry = (smooth.x - 0.5) * -22;\n    card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;\n\n    const gx = (smooth.x * 100).toFixed(1);\n    const gy = (smooth.y * 100).toFixed(1);\n    shimmer.style.background = `radial-gradient(ellipse at ${gx}% ${gy}%,\n      rgba(226,116,160,0.45) 0%,\n      rgba(196,176,255,0.35) 18%,\n      rgba(100,200,255,0.22) 36%,\n      rgba(160,255,200,0.15) 54%,\n      rgba(255,220,100,0.10) 70%,\n      transparent 85%)`;\n\n    /* parallax layers */\n    const p1x = (smooth.x - 0.5) * -18;\n    const p1y = (smooth.y - 0.5) * -18;\n    const p2x = (smooth.x - 0.5) * -10;\n    const p2y = (smooth.y - 0.5) * -10;\n    const p3x = (smooth.x - 0.5) * -5;\n    const p3y = (smooth.y - 0.5) * -5;\n    if(orb1) orb1.style.transform = `translate(${p1x}px,${p1y}px)`;\n    if(orb2) orb2.style.transform = `translate(${p1x*-0.5}px,${p1y*-0.5}px)`;\n    if(orb3) orb3.style.transform = `translate(${p1x*0.7}px,${p1y*0.7}px)`;\n    if(parallaxEl) parallaxEl.style.transform = `translate(${p2x}px,${p2y}px)`;\n    if(logo) logo.style.transform = `translate(${p3x}px,${p3y}px)`;\n\n    raf = requestAnimationFrame(tick);\n  }\n  raf = requestAnimationFrame(tick);\n\n  wrap.addEventListener('mousemove', e=>{\n    const r = wrap.getBoundingClientRect();\n    target.x = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));\n    target.y = Math.max(0, Math.min(1, (e.clientY - r.top) / r.height));\n    cursor.style.left = (target.x*100)+'%';\n    cursor.style.top = (target.y*100)+'%';\n  });\n  wrap.addEventListener('mouseleave', ()=>{\n    target.x = 0.5; target.y = 0.5;\n  });\n  wrap.addEventListener('click', ()=>{\n    card.classList.add('clicked');\n    pulse.classList.remove('show');\n    void pulse.offsetWidth;\n    pulse.classList.add('show');\n    setTimeout(()=>card.classList.remove('clicked'), 300);\n    setTimeout(()=>pulse.classList.remove('show'), 800);\n  });\n})();\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n/* \u2550\u2550\u2550 NAV + INTERACTIONS                              */\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\nfunction showPage(id, el){\n  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));\n  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));\n  const pg = document.getElementById(id);\n  if(pg) pg.classList.add('active');\n  if(el) el.classList.add('active');\n  document.querySelector('.main').scrollTo({top:0,behavior:'smooth'});\n  window.scrollTo({top:0,behavior:'smooth'});\n}\nfunction startKit(){\n  /* navigate to Mindset (Module 01) \u2014 find the 2nd sb-item (first is Welcome) */\n  const items = document.querySelectorAll('.sidebar .sb-item');\n  /* item index 1 is the Mindset entry */\n  showPage('mindset', items[1]);\n}\nfunction toggleContract(btn){\n  const full = btn.nextElementSibling;\n  const open = btn.classList.contains('open');\n  if(open){ btn.classList.remove('open'); full.classList.remove('open'); }\n  else{ btn.classList.add('open'); full.classList.add('open'); }\n}\nfunction toggleAcc(btn){\n  const body = btn.nextElementSibling;\n  const open = btn.classList.contains('open');\n  /* close siblings within same parent */\n  const parent = btn.closest('.page') || document;\n  parent.querySelectorAll('.acc-btn').forEach(b=>b.classList.remove('open'));\n  parent.querySelectorAll('.acc-body').forEach(b=>b.classList.remove('open'));\n  if(!open){ btn.classList.add('open'); body.classList.add('open'); }\n}\nfunction showDay(id, btn){\n  document.querySelectorAll('.day-pg').forEach(d=>d.classList.remove('active'));\n  document.querySelectorAll('.day-pill').forEach(b=>b.classList.remove('active'));\n  document.getElementById(id).classList.add('active');\n  btn.classList.add('active');\n}\nfunction toggleFmt(id, card){\n  const d = document.getElementById(id);\n  const showing = d.classList.contains('show');\n  document.querySelectorAll('.fmt-detail').forEach(x=>x.classList.remove('show'));\n  document.querySelectorAll('.fmt-card').forEach(x=>x.classList.remove('active'));\n  if(!showing){ d.classList.add('show'); card.classList.add('active'); }\n}\nfunction expandV(card){\n  const was = card.classList.contains('expanded');\n  document.querySelectorAll('.v-card').forEach(c=>c.classList.remove('expanded'));\n  if(!was) card.classList.add('expanded');\n}\nfunction filterVocab(q){\n  const cards = document.querySelectorAll('.v-card');\n  let any = false;\n  cards.forEach(c=>{\n    const t = (c.dataset.term||'')+(c.innerText||'');\n    const match = t.toLowerCase().includes(q.toLowerCase());\n    c.style.display = match ? '' : 'none';\n    if(match) any = true;\n  });\n  document.getElementById('vocab-none').style.display = any ? 'none' : 'block';\n}\nfunction calcBrand(){\n  const avv = parseFloat(document.getElementById('avv').value)||0;\n  if(!avv){ alert('Please enter your AVV.'); return; }\n  const rate = parseFloat(document.getElementById('ct').value);\n  const dur = parseFloat(document.getElementById('dur').value);\n  const ads = parseFloat(document.getElementById('ads').value);\n  const excl = parseFloat(document.getElementById('excl').value);\n  const base = avv * rate;\n  const total = base * (1+dur+ads+excl);\n  const lo = Math.round(total*0.9/50)*50;\n  const hi = Math.round(total*1.1/50)*50;\n  document.getElementById('br-num').innerHTML = `<em>$${lo.toLocaleString()} \u2014 $${hi.toLocaleString()}</em>`;\n  document.getElementById('br-lines').innerHTML =\n    `Base (${avv.toLocaleString()} AVV \u00d7 $${rate}/view): $${Math.round(base).toLocaleString()}` +\n    (dur>0?`<br>Duration: +$${Math.round(base*dur).toLocaleString()}`:``) +\n    (ads>0?`<br>Ad rights: +$${Math.round(base*ads).toLocaleString()}`:``) +\n    (excl>0?`<br>Exclusivity: +$${Math.round(base*excl).toLocaleString()}`:``) +\n    `<br><br>State this number with confidence. It's what your work is worth.`;\n  document.getElementById('br').classList.add('show');\n}\nfunction calcUGC(){\n  const base = parseFloat(document.getElementById('ul').value);\n  const vids = parseFloat(document.getElementById('uv').value)||1;\n  const rights = parseFloat(document.getElementById('ur').value);\n  const addons = parseFloat(document.getElementById('ua').value);\n  const perVid = base + rights + (base*addons);\n  const total = perVid * vids;\n  const lo = Math.round(total*0.9/25)*25;\n  const hi = Math.round(total*1.1/25)*25;\n  document.getElementById('ur-num').innerHTML = `<em>$${lo.toLocaleString()} \u2014 $${hi.toLocaleString()}</em>`;\n  document.getElementById('ur-lines').innerHTML =\n    `Base per video: $${base.toLocaleString()}` +\n    (rights>0?`<br>Usage rights: +$${rights}/video`:``) +\n    (addons>0?`<br>Add-ons: +${(addons*100).toFixed(0)}% of base`:``) +\n    `<br>${vids} video${vids>1?'s':''} total` +\n    `<br><br>Raw footage, extra hooks, and rush delivery are upsells \u2014 don't include them in your base.`;\n  document.getElementById('ur-res').classList.add('show');\n}\nfunction copyE(id, btn){\n  const el = document.getElementById(id);\n  navigator.clipboard.writeText(el?el.innerText:'').then(()=>{\n    btn.textContent = 'Copied \u2713';\n    btn.classList.add('copied');\n    setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('copied'); }, 2200);\n  }).catch(()=>{ btn.textContent='Ctrl+C'; setTimeout(()=>{btn.textContent='Copy';}, 2000); });\n}\nfunction chk(box){\n  box.classList.toggle('checked');\n  const total = document.querySelectorAll('.cl-box').length;\n  const done = document.querySelectorAll('.cl-box.checked').length;\n  const pct = Math.round((done/total)*100);\n  document.getElementById('cl-bar').style.width = pct+'%';\n  document.getElementById('cl-count').textContent = `${done} / ${total} complete`;\n  document.getElementById('pp-fill').style.width = pct+'%';\n  document.getElementById('pp-count').textContent = pct+'%';\n}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n/* \u2550\u2550\u2550 200 BRAND HIT LIST                              */\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n/* email-format codes: f = first@domain \u00b7 fl = first.last@domain \u00b7 p = partnerships@domain \u00b7 m = marketing@domain \u00b7 pr = press@domain */\nconst BRANDS = [\n  /* BEAUTY (35) */\n  ['Glossier','beauty','fl','glossier.com','Senior Influencer Marketing Manager'],\n  ['Drunk Elephant','beauty','f','drunkelephant.com','Influencer Marketing Manager'],\n  ['The Ordinary','beauty','fl','deciem.com','Creator Partnerships Manager'],\n  ['Tatcha','beauty','f','tatcha.com','Influencer & Partnerships Manager'],\n  ['Summer Fridays','beauty','f','summerfridays.com','Influencer Marketing Manager'],\n  ['Youth To The People','beauty','f','youthtothepeople.com','Influencer Manager'],\n  ['Kosas','beauty','f','kosas.com','Influencer Marketing Manager'],\n  ['Ilia Beauty','beauty','f','iliabeauty.com','Influencer Partnerships Manager'],\n  ['Saie','beauty','f','saiehello.com','Influencer Marketing Manager'],\n  ['Merit','beauty','f','meritbeauty.com','Influencer Partnerships Manager'],\n  ['Tower 28','beauty','f','tower28beauty.com','Influencer Marketing Manager'],\n  ['Rare Beauty','beauty','
