  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error overlay disabled for production — errors are logged to console only.
  window.addEventListener('error', function(e) {
    console.error('[bundle]', e.message || e.type, e.filename, e.lineno);
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

/\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"06621fd1-3af0-4f50-a654-4c29d63e9bfe\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"31a05239-f955-4bb2-ac73-8dde224ef943\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n</style>\n\n<style>\n*{box-sizing:border-box;margin:0;padding:0;}\n:root{\n  --bg:#080610;--bg1:#0f0c1a;--bg2:#16122a;--bg3:#1e1835;\n  --surface:#1a1530;--surface2:#221e3a;--surface3:#2a2548;\n  --pink:#e274a0;--pink-light:#f5adce;--pink-dim:rgba(226,116,160,0.15);--pink-border:rgba(226,116,160,0.25);\n  --purple:#c8a0f0;--purple-dim:rgba(200,160,240,0.12);\n  --cyan:#7eb8ff;--cyan-dim:rgba(126,184,255,0.1);\n  --mint:#7ee8b8;--mint-dim:rgba(126,232,184,0.1);\n  --amber:#f0c060;--amber-dim:rgba(240,192,96,0.1);\n  --text:#f0ecff;--text2:rgba(240,236,255,0.6);--text3:rgba(240,236,255,0.32);\n  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);\n  --glow-pink:0 0 40px rgba(226,116,160,0.12);\n  --glow-purple:0 0 40px rgba(200,160,240,0.1);\n}\nbody{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}\n\n/* \u2500\u2500 NOISE TEXTURE OVERLAY \u2500\u2500 */\nbody::before{content:'';position:fixed;inset:0;background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E\");opacity:.4;pointer-events:none;z-index:0;}\n\n/* \u2500\u2500 ANIMATED BG ORBS \u2500\u2500 */\n.bg-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}\n.orb1{width:600px;height:600px;top:-200px;right:-200px;background:radial-gradient(circle,rgba(226,116,160,0.08) 0%,transparent 70%);}\n.orb2{width:500px;height:500px;bottom:-150px;left:-150px;background:radial-gradient(circle,rgba(200,160,240,0.07) 0%,transparent 70%);}\n.orb3{width:300px;height:300px;top:40%;left:30%;background:radial-gradient(circle,rgba(126,184,255,0.05) 0%,transparent 70%);}\n\n/* \u2500\u2500 LAYOUT \u2500\u2500 */\n.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;}\n\n/* \u2500\u2500 TOP BAR \u2500\u2500 */\n.topbar{\n  display:flex;align-items:center;justify-content:space-between;\n  padding:0 2rem;height:56px;\n  border-bottom:1px solid var(--border);\n  background:rgba(8,6,16,0.85);backdrop-filter:blur(20px);\n  position:sticky;top:0;z-index:100;\n}\n.topbar-left{display:flex;align-items:center;gap:16px;}\n.logo-pill{\n  display:flex;align-items:center;gap:8px;\n  background:var(--surface);border:1px solid var(--border2);\n  border-radius:20px;padding:5px 12px 5px 6px;\n}\n.logo-dot{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:11px;font-weight:700;color:#fff;}\n.logo-name{font-size:13px;font-weight:600;color:var(--text);}\n.topbar-badge{font-size:10px;font-weight:600;letter-spacing:.08em;padding:3px 10px;border-radius:20px;background:var(--pink-dim);color:var(--pink);border:1px solid var(--pink-border);}\n.topbar-right{display:flex;align-items:center;gap:8px;}\n.progress-pill{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;}\n.progress-pill span{font-size:11px;color:var(--text3);}\n.pp-track{width:60px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}\n.pp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .4s;}\n.pp-count{font-size:11px;font-weight:600;color:var(--pink);}\n\n/* \u2500\u2500 SIDEBAR + MAIN \u2500\u2500 */\n.layout{display:flex;flex:1;}\n.sidebar{\n  width:220px;flex-shrink:0;\n  border-right:1px solid var(--border);\n  padding:1.5rem 0;\n  background:rgba(10,8,20,0.6);\n  position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;\n}\n.sidebar::-webkit-scrollbar{width:0;}\n.sb-section{padding:0 1rem 1rem;}\n.sb-label{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);padding:0 .75rem;margin-bottom:.5rem;}\n.sb-item{\n  display:flex;align-items:center;gap:10px;\n  padding:7px 12px;border-radius:8px;cursor:pointer;\n  font-size:12.5px;font-weight:500;color:var(--text2);\n  transition:all .15s;margin-bottom:2px;\n  border:1px solid transparent;\n}\n.sb-item:hover{background:var(--surface);color:var(--text);}\n.sb-item.active{background:var(--pink-dim);color:var(--pink);border-color:var(--pink-border);}\n.sb-num{font-size:10px;font-weight:600;color:var(--text3);margin-left:auto;}\n.sb-item.active .sb-num{color:var(--pink);}\n.sb-icon{font-size:14px;opacity:.7;}\n.sb-divider{height:1px;background:var(--border);margin:.75rem 1rem;}\n\n/* \u2500\u2500 MAIN CONTENT \u2500\u2500 */\n.main{flex:1;overflow-y:auto;padding:2.5rem;max-width:760px;margin:0 auto;display:flex;flex-direction:column;align-items:center;}\n.main>.page{width:100%;}\n.page{display:none;}\n.page.active{display:block;}\n\n/* \u2500\u2500 PAGE HEADER \u2500\u2500 */\n.page-eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--pink);font-weight:600;margin-bottom:.5rem;}\n.page-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;line-height:1.15;margin-bottom:.6rem;}\n.page-title em{color:var(--pink);font-style:italic;}\n.page-intro{font-size:13.5px;color:var(--text2);line-height:1.75;margin-bottom:2rem;font-weight:300;}\n\n/* \u2500\u2500 CARDS \u2500\u2500 */\n.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:.75rem;}\n.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;}\n.card-glow{box-shadow:var(--glow-pink);}\n.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:.4rem;}\n.card-body{font-size:13px;color:var(--text2);line-height:1.75;font-weight:300;}\n\n/* \u2500\u2500 GRID \u2500\u2500 */\n.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem;}\n.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.25rem;}\n\n/* \u2500\u2500 STAT CHIPS \u2500\u2500 */\n.stat-chip{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;}\n.sc-label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);font-weight:600;margin-bottom:5px;}\n.sc-val{font-size:1.4rem;font-weight:600;color:var(--text);}\n.sc-sub{font-size:11px;color:var(--text3);margin-top:3px;}\n\n/* \u2500\u2500 STEP ROWS \u2500\u2500 */\n.step-row{display:flex;gap:14px;align-items:flex-start;padding:1.25rem 0;border-bottom:1px solid var(--border);}\n.step-row:last-child{border-bottom:none;}\n.step-badge{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px;}\n.step-body h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;}\n.step-body p{font-size:13px;color:var(--text2);line-height:1.7;font-weight:300;}\n.step-quote{margin-top:10px;padding:10px 14px;background:var(--bg2);border-left:2px solid var(--pink);border-radius:0 8px 8px 0;font-size:12.5px;font-style:italic;color:var(--text2);line-height:1.55;}\n\n/* \u2500\u2500 TAGS \u2500\u2500 */\n.tag{display:inline-block;font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.04em;}\n.tag-pink{background:var(--pink-dim);color:var(--pink);border:1px solid var(--pink-border);}\n.tag-purple{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(200,160,240,0.25);}\n.tag-cyan{background:var(--cyan-dim);color:var(--cyan);border:1px solid rgba(126,184,255,0.2);}\n.tag-mint{background:var(--mint-dim);color:var(--mint);border:1px solid rgba(126,232,184,0.2);}\n.tag-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(240,192,96,0.2);}\n\n/* \u2500\u2500 ACCORDION \u2500\u2500 */\n.acc{border:1px solid var(--border);border-radius:10px;margin-bottom:6px;background:var(--surface);overflow:hidden;}\n.acc-btn{width:100%;text-align:left;background:none;border:none;padding:.9rem 1.1rem;font-size:13.5px;font-weight:500;color:var(--text);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:'Inter',sans-serif;}\n.acc-btn:hover{color:var(--pink);}\n.acc-chev{font-size:16px;color:var(--text3);transition:transform .2s;}\n.acc-btn.open .acc-chev{transform:rotate(90deg);}\n.acc-body{display:none;padding:.1rem 1.1rem 1rem;font-size:13px;color:var(--text2);line-height:1.8;font-weight:300;border-top:1px solid var(--border);}\n.acc-body.open{display:block;}\n\n/* \u2500\u2500 DIVIDER \u2500\u2500 */\n.divider{height:1px;background:var(--border);margin:1.75rem 0;}\n\n/* \u2500\u2500 DO/DONT \u2500\u2500 */\n.do-dont{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem;}\n.do-box{background:rgba(126,232,184,0.06);border:1px solid rgba(126,232,184,0.15);border-radius:12px;padding:1rem;}\n.dont-box{background:rgba(240,96,96,0.06);border:1px solid rgba(240,96,96,0.15);border-radius:12px;padding:1rem;}\n.do-box .lbl{font-size:9.5px;font-weight:700;color:var(--mint);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}\n.dont-box .lbl{font-size:9.5px;font-weight:700;color:#f08080;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}\n.do-box p{font-size:12.5px;color:rgba(126,232,184,0.8);line-height:1.65;font-weight:300;}\n.dont-box p{font-size:12.5px;color:rgba(240,160,160,0.8);line-height:1.65;font-weight:300;}\n\n/* \u2500\u2500 VOCAB \u2500\u2500 */\n.vocab-search{\n  width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;\n  padding:9px 14px 9px 36px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);\n  outline:none;transition:border-color .18s;margin-bottom:1rem;\n}\n.vocab-search:focus{border-color:var(--pink-border);}\n.vocab-search-wrap{position:relative;}\n.vocab-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);}\n.vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}\n.v-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;cursor:pointer;transition:all .15s;}\n.v-card:hover{border-color:var(--pink-border);background:var(--surface2);}\n.v-card.expanded{border-color:var(--pink);grid-column:1/-1;background:var(--surface2);}\n.v-cat{font-size:9px;text-transform:uppercase;letter-spacing:.14em;font-weight:700;margin-bottom:4px;}\n.v-term{font-size:13px;font-weight:600;color:var(--text);display:flex;justify-content:space-between;align-items:center;}\n.v-term span{font-size:12px;color:var(--text3);transition:transform .18s;}\n.v-card.expanded .v-term span{transform:rotate(90deg);}\n.v-def{display:none;font-size:12.5px;color:var(--text2);line-height:1.7;font-weight:300;margin-top:.6rem;padding-top:.6rem;border-top:1px solid var(--border);}\n.v-card.expanded .v-def{display:block;}\n.vocab-none{display:none;text-align:center;padding:2rem;font-size:13px;color:var(--text3);}\n\n/* \u2500\u2500 RATE CALCULATOR \u2500\u2500 */\n.calc-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1rem;}\n.calc-title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:1.1rem;display:flex;align-items:center;gap:8px;}\n.calc-title .tag{margin-left:auto;}\n.form-row{margin-bottom:12px;}\n.form-row label{display:block;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:5px;}\n.form-row input,.form-row select{\n  width:100%;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);\n  background:var(--bg2);border:1px solid var(--border2);border-radius:8px;\n  padding:8px 12px;outline:none;transition:border-color .18s;\n}\n.form-row input:focus,.form-row select:focus{border-color:var(--pink-border);}\n.form-row select option{background:var(--bg1);}\n.calc-btn{\n  width:100%;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;\n  background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;\n  border:none;border-radius:10px;padding:11px;cursor:pointer;\n  margin-top:4px;letter-spacing:.04em;transition:opacity .18s;\n}\n.calc-btn:hover{opacity:.9;}\n.calc-result{background:var(--bg1);border:1px solid var(--pink-border);border-radius:12px;padding:1.25rem;margin-top:.75rem;display:none;}\n.calc-result.show{display:block;}\n.cr-label{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:6px;}\n.cr-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--text);margin-bottom:6px;}\n.cr-num em{color:var(--pink);}\n.cr-lines{font-size:11.5px;color:var(--text3);line-height:1.9;border-top:1px solid var(--border);padding-top:10px;margin-top:8px;}\n\n/* \u2500\u2500 EMAIL TEMPLATES \u2500\u2500 */\n.email-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:.75rem;}\n.email-head{padding:.85rem 1.1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}\n.email-name{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}\n.email-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}\n.email-subj-wrap{padding:.75rem 1.1rem .5rem;border-bottom:1px dashed var(--border);}\n.email-subj-lbl{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:3px;}\n.email-subj-val{font-size:13px;font-weight:600;color:var(--text);}\n.email-body-text{padding:1.1rem;font-size:13px;line-height:1.85;color:var(--text2);white-space:pre-line;font-weight:300;}\n.hl{background:rgba(240,192,96,0.18);border:1px solid rgba(240,192,96,0.2);padding:1px 5px;border-radius:4px;font-weight:500;color:var(--amber);font-style:normal;font-size:12px;}\n.email-foot{padding:.5rem 1.1rem .85rem;display:flex;justify-content:flex-end;}\n.copy-btn{font-family:'Inter',sans-serif;font-size:11.5px;font-weight:500;padding:5px 14px;border:1px solid var(--border2);border-radius:20px;background:transparent;cursor:pointer;color:var(--text3);transition:all .18s;}\n.copy-btn:hover{background:var(--pink-dim);color:var(--pink);border-color:var(--pink-border);}\n.copy-btn.copied{background:rgba(126,232,184,0.1);color:var(--mint);border-color:rgba(126,232,184,0.25);}\n\n/* \u2500\u2500 DAY SELECTOR \u2500\u2500 */\n.day-pills{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}\n.day-pill{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text3);transition:all .18s;}\n.day-pill:hover{border-color:var(--border2);color:var(--text2);}\n.day-pill.active{background:var(--pink-dim);color:var(--pink);border-color:var(--pink-border);}\n.day-pg{display:none;}\n.day-pg.active{display:block;}\n.day-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;}\n.dc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.9rem;}\n.dc-num{width:32px;height:32px;border-radius:8px;background:var(--pink-dim);border:1px solid var(--pink-border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--pink);}\n.dc-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin-bottom:.5rem;}\n.dc-body{font-size:13px;color:var(--text2);line-height:1.75;font-weight:300;}\n.dc-task{margin-top:1rem;background:var(--bg2);border:1px solid var(--border);border-left:2px solid var(--pink);border-radius:0 8px 8px 0;padding:.9rem 1rem;}\n.dc-task-lbl{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);font-weight:600;margin-bottom:5px;}\n.dc-task-text{font-size:12.5px;color:var(--text2);line-height:1.6;}\n\n/* \u2500\u2500 FORMAT CARDS \u2500\u2500 */\n.fmt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}\n.fmt-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;cursor:pointer;transition:all .15s;}\n.fmt-card:hover{border-color:var(--border2);background:var(--surface2);}\n.fmt-card.active{border-color:var(--pink-border);background:var(--pink-dim);}\n.fmt-icon{font-size:18px;margin-bottom:7px;}\n.fmt-name{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:3px;}\n.fmt-sub{font-size:11.5px;color:var(--text3);}\n.fmt-detail{display:none;background:var(--surface2);border:1px solid var(--pink-border);border-radius:12px;padding:1.25rem;margin-bottom:8px;}\n.fmt-detail.show{display:block;}\n\n/* \u2500\u2500 CHECKLIST \u2500\u2500 */\n.cl-item{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border);}\n.cl-item:last-child{border-bottom:none;}\n.cl-box{width:20px;height:20px;border-radius:6px;border:1px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;margin-top:1px;}\n.cl-box.checked{background:var(--pink);border-color:var(--pink);}\n.cl-box.checked::after{content:'\u2713';color:#fff;font-size:11px;font-weight:700;}\n.cl-text{font-size:13px;color:var(--text2);line-height:1.65;font-weight:300;}\n.cl-text strong{color:var(--text);font-weight:600;}\n.cl-section-label{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);font-weight:600;padding:.75rem 0 .25rem;display:block;}\n\n/* \u2500\u2500 PROGRESS BAR \u2500\u2500 */\n.prog-wrap{background:rgba(255,255,255,0.05);border-radius:4px;height:4px;overflow:hidden;margin-bottom:4px;}\n.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .4s;}\n\n/* \u2500\u2500 FEATURE LIST \u2500\u2500 */\n.feat-list{list-style:none;}\n.feat-list li{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);font-weight:300;line-height:1.6;}\n.feat-list li:last-child{border-bottom:none;}\n.feat-dot{width:5px;height:5px;border-radius:50%;background:var(--pink);flex-shrink:0;margin-top:7px;}\n\n/* \u2500\u2500 CLOSING \u2500\u2500 */\n.closing{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:2.5rem;text-align:center;margin-top:2rem;position:relative;overflow:hidden;}\n.closing::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(226,116,160,0.1) 0%,transparent 70%);pointer-events:none;}\n.closing h2{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;margin-bottom:.6rem;position:relative;}\n.closing h2 em{color:var(--pink);}\n.closing p{font-size:13px;color:var(--text2);line-height:1.75;font-weight:300;max-width:440px;margin:0 auto 1.5rem;position:relative;}\n.cta-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;position:relative;}\n.btn-primary{font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:22px;padding:10px 22px;cursor:pointer;letter-spacing:.04em;}\n.btn-ghost{font-family:'Inter',sans-serif;font-size:12.5px;font-weight:500;background:transparent;color:var(--text3);border:1px solid var(--border2);border-radius:22px;padding:10px 22px;cursor:pointer;}\n\n/* \u2500\u2500 FOOTER \u2500\u2500 */\n.footer{border-top:1px solid var(--border);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(8,6,16,0.8);}\n.footer-logo{display:flex;align-items:center;gap:8px;}\n.footer-logo-dot{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:9px;font-weight:700;color:#fff;}\n.footer-name{font-size:12px;font-weight:600;color:var(--text2);}\n.footer-copy{font-size:11px;color:var(--text3);}\n\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n/* \u2550\u2550\u2550 HOLOGRAPHIC HERO CARD \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n@keyframes floatParticle{\n  from{transform:translateY(0px) scale(1);opacity:.55;}\n  to{transform:translateY(-12px) scale(1.35);opacity:1;}\n}\n@keyframes pulseRing{\n  0%{transform:translate(-50%,-50%) scale(0.8);opacity:.8;}\n  100%{transform:translate(-50%,-50%) scale(2.5);opacity:0;}\n}\n@keyframes shimmerSweep{\n  0%{background-position:-200% center;}\n  100%{background-position:200% center;}\n}\n@keyframes rotateSlow{\n  from{transform:rotate(0deg);}\n  to{transform:rotate(360deg);}\n}\n@keyframes breathe{\n  0%,100%{opacity:.18;}\n  50%{opacity:.32;}\n}\n@keyframes badgePop{\n  0%{transform:rotate(var(--r)) scale(1);}\n  50%{transform:rotate(var(--r)) scale(1.08);}\n  100%{transform:rotate(var(--r)) scale(1);}\n}\n\n.holo-stage{\n  position:relative;\n  width:100%;\n  display:flex;justify-content:center;\n  padding:1.25rem 0 2.5rem;\n  margin-bottom:1.25rem;\n}\n.holo-wrap{\n  position:relative;\n  perspective:1200px;\n  cursor:crosshair;\n  user-select:none;\n  width:min(100%,560px);\n}\n.holo-pulse{\n  position:absolute;left:50%;top:50%;z-index:30;pointer-events:none;\n  width:110px;height:110px;border-radius:50%;\n  border:2px solid var(--pink);\n  opacity:0;\n}\n.holo-pulse.show{animation:pulseRing .8s ease-out forwards;}\n.holo-cursor{\n  position:absolute;z-index:25;pointer-events:none;\n  width:80px;height:80px;border-radius:50%;\n  background:radial-gradient(circle,rgba(226,116,160,0.55) 0%,transparent 70%);\n  filter:blur(10px);\n  transform:translate(-50%,-50%);\n  left:50%;top:50%;\n  opacity:0;transition:opacity .25s;\n}\n.holo-wrap:hover .holo-cursor{opacity:1;}\n\n.holo-card{\n  position:relative;\n  width:100%;\n  border-radius:28px;\n  overflow:hidden;\n  transform-style:preserve-3d;\n  transition:transform .08s ease-out;\n  background:linear-gradient(145deg,#1e1030 0%,#2a1f2e 40%,#1a1535 70%,#0f0c1e 100%);\n  box-shadow:\n    0 40px 100px rgba(0,0,0,0.7),\n    0 0 0 1px rgba(255,255,255,0.06),\n    0 0 60px rgba(226,116,160,0.15),\n    0 0 120px rgba(196,176,255,0.08);\n  will-change:transform;\n}\n.holo-card.clicked{transform:scale(.97) !important;}\n\n/* L0 \u2014 deep bg orbs */\n.holo-orb{position:absolute;border-radius:50%;pointer-events:none;z-index:0;}\n.holo-orb-a{top:-80px;left:-80px;width:320px;height:320px;background:radial-gradient(circle,rgba(226,116,160,0.22) 0%,transparent 70%);animation:breathe 4s ease-in-out infinite;}\n.holo-orb-b{bottom:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(196,176,255,0.18) 0%,transparent 70%);animation:breathe 5s 1s ease-in-out infinite;}\n.holo-orb-c{top:40%;left:30%;width:220px;height:220px;background:radial-gradient(circle,rgba(100,200,255,0.08) 0%,transparent 70%);}\n\n/* L1 \u2014 grid */\n.holo-grid{\n  position:absolute;inset:0;z-index:1;pointer-events:none;\n  background-image:\n    linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),\n    linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);\n  background-size:40px 40px;\n}\n\n/* L2 \u2014 foil */\n.holo-foil{\n  position:absolute;inset:0;z-index:2;pointer-events:none;\n  background:repeating-linear-gradient(105deg,\n    transparent 0px,transparent 2px,\n    rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 3px);\n}\n\n/* L3 \u2014 holographic shimmer (cursor-driven) */\n.holo-shimmer{\n  position:absolute;inset:0;z-index:3;pointer-events:none;border-radius:28px;\n  mix-blend-mode:screen;\n  background:radial-gradient(ellipse at 50% 50%,\n    rgba(226,116,160,0.45) 0%,\n    rgba(196,176,255,0.35) 18%,\n    rgba(100,200,255,0.22) 36%,\n    rgba(160,255,200,0.15) 54%,\n    rgba(255,220,100,0.10) 70%,\n    transparent 85%);\n}\n\n/* L4 \u2014 sweep */\n.holo-sweep{\n  position:absolute;inset:0;z-index:4;pointer-events:none;border-radius:28px;\n  background:linear-gradient(105deg,\n    transparent 30%,\n    rgba(255,255,255,0.04) 45%,\n    rgba(255,255,255,0.10) 50%,\n    rgba(255,255,255,0.04) 55%,\n    transparent 70%);\n  background-size:200% 100%;\n  animation:shimmerSweep 4s linear infinite;\n}\n\n/* L5 \u2014 particles */\n.holo-particles{position:absolute;inset:0;z-index:5;pointer-events:none;overflow:hidden;}\n.holo-particle{position:absolute;border-radius:50%;}\n\n/* L6 \u2014 rotating ring */\n.holo-ring{\n  position:absolute;top:50%;left:50%;z-index:6;pointer-events:none;\n  width:620px;height:620px;margin-top:-310px;margin-left:-310px;\n  border:1px solid rgba(226,116,160,0.06);\n  border-radius:50%;\n  animation:rotateSlow 22s linear infinite;\n}\n.holo-ring-dot{\n  position:absolute;top:-2px;left:50%;width:5px;height:5px;\n  background:var(--pink);border-radius:50%;margin-left:-2.5px;\n  box-shadow:0 0 10px var(--pink),0 0 22px rgba(226,116,160,0.5);\n}\n\n/* edge glows */\n.holo-edge{\n  position:absolute;inset:0;z-index:11;pointer-events:none;border-radius:28px;\n  box-shadow:\n    inset 0 0 60px rgba(226,116,160,0.08),\n    inset 0 0 1px rgba(255,255,255,0.12),\n    inset 0 1px 0 rgba(255,255,255,0.15);\n}\n.holo-top-shine{\n  position:absolute;top:0;left:0;right:0;height:1px;z-index:12;pointer-events:none;\n  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);\n}\n\n/* CONTENT */\n.holo-content{\n  position:relative;z-index:10;\n  padding:38px 38px 32px;\n  font-family:'DM Sans','Inter',sans-serif;\n}\n.holo-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:30px;}\n.holo-brand{display:flex;align-items:center;gap:10px;}\n.holo-brand-logo{\n  width:40px;height:40px;border-radius:50%;\n  background:linear-gradient(135deg,var(--pink) 0%,#c8a0f0 100%);\n  display:flex;align-items:center;justify-content:center;\n  font-size:14px;font-weight:700;color:#fff;font-family:'Playfair Display',serif;\n  box-shadow:0 0 22px rgba(226,116,160,0.6),0 0 44px rgba(196,176,255,0.3);\n}\n.holo-brand-name{font-size:12px;font-weight:700;color:rgba(255,255,255,0.92);letter-spacing:.04em;}\n.holo-brand-sub{font-size:8.5px;color:rgba(255,255,255,0.36);letter-spacing:.16em;text-transform:uppercase;margin-top:1px;}\n.holo-badge-pill{\n  background:rgba(226,116,160,0.15);\n  border:1px solid rgba(226,116,160,0.3);\n  border-radius:20px;padding:5px 13px;\n  font-size:9.5px;font-weight:700;color:var(--pink-light);\n  letter-spacing:.08em;\n}\n\n.holo-headline{margin-bottom:26px;}\n.holo-eyebrow{\n  font-size:10px;letter-spacing:.24em;text-transform:uppercase;\n  color:rgba(245,173,206,0.65);font-weight:600;margin-bottom:14px;\n  display:flex;align-items:center;gap:8px;\n}\n.holo-eyebrow::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--pink);box-shadow:0 0 10px var(--pink);}\n.holo-title{font-family:'Playfair Display',serif;line-height:.98;margin-bottom:14px;letter-spacing:-1px;}\n.holo-title-1,.holo-title-2{\n  font-size:5.2rem;font-weight:700;\n  background-clip:text;-webkit-background-clip:text;\n  -webkit-text-fill-color:transparent;color:transparent;\n}\n.holo-title-1{\n  background-image:linear-gradient(135deg,#ffffff 0%,#f5adce 35%,#d4bbff 65%,#ffffff 100%);\n}\n.holo-title-2{\n  background-image:linear-gradient(135deg,#f5adce 0%,#d4bbff 40%,#7eb8ff 70%,#f5adce 100%);\n  font-style:italic;\n}\n.holo-desc{\n  font-size:12.5px;color:rgba(255,255,255,0.5);line-height:1.7;\n  font-weight:300;max-width:420px;\n}\n\n.holo-divider{\n  height:1px;\n  background:linear-gradient(90deg,rgba(226,116,160,0.4),rgba(196,176,255,0.3),transparent);\n  margin-bottom:22px;\n}\n\n.holo-steps{display:flex;gap:8px;margin-bottom:22px;}\n.holo-step{\n  flex:1;background:rgba(255,255,255,0.04);\n  border:1px solid rgba(255,255,255,0.07);\n  border-radius:12px;padding:11px 8px;text-align:center;\n  transition:all .25s;\n}\n.holo-step:hover{background:rgba(255,255,255,0.07);border-color:rgba(226,116,160,0.3);transform:translateY(-2px);}\n.holo-step-letter{\n  width:26px;height:26px;border-radius:50%;\n  font-size:11px;font-weight:700;\n  display:flex;align-items:center;justify-content:center;\n  margin:0 auto 6px;font-family:'Playfair Display',serif;\n}\n.holo-step-label{font-size:9px;color:rgba(255,255,255,0.6);font-weight:500;letter-spacing:.06em;text-transform:uppercase;}\n\n.holo-features{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:26px;}\n.holo-feature{\n  background:rgba(255,255,255,0.04);\n  border:1px solid rgba(255,255,255,0.07);\n  border-radius:12px;padding:13px 14px;\n  display:flex;align-items:center;gap:11px;\n  transition:all .2s;\n}\n.holo-feature:hover{background:rgba(255,255,255,0.07);border-color:rgba(226,116,160,0.25);}\n.holo-feat-icon{font-size:17px;color:var(--pink-light);text-shadow:0 0 14px var(--pink);flex-shrink:0;}\n.holo-feat-label{font-size:11.5px;font-weight:600;color:rgba(255,255,255,0.85);}\n.holo-feat-sub{font-size:9.5px;color:rgba(255,255,255,0.35);margin-top:1px;}\n\n.holo-cta-row{display:flex;gap:10px;align-items:center;}\n.holo-cta-primary{\n  flex:1;\n  background:linear-gradient(135deg,var(--pink) 0%,#c8a0f0 100%);\n  border-radius:26px;padding:14px 0;text-align:center;\n  font-size:12.5px;font-weight:700;color:#fff;letter-spacing:.06em;\n  box-shadow:0 4px 26px rgba(226,116,160,0.45),0 0 44px rgba(226,116,160,0.2);\n  cursor:pointer;border:none;font-family:'DM Sans','Inter',sans-serif;\n  transition:transform .2s,box-shadow .2s;\n}\n.holo-cta-primary:hover{transform:translateY(-1px);box-shadow:0 6px 32px rgba(226,116,160,0.6),0 0 50px rgba(226,116,160,0.3);}\n.holo-cta-secondary{\n  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);\n  border-radius:26px;padding:14px 20px;\n  font-size:10.5px;color:rgba(255,255,255,0.55);\n  font-weight:500;white-space:nowrap;letter-spacing:.04em;\n}\n\n/* floating badges outside card */\n.holo-float-badge{\n  position:absolute;z-index:20;font-size:10px;font-weight:700;\n  padding:7px 14px;border-radius:20px;letter-spacing:.06em;\n  white-space:nowrap;\n}\n.holo-float-1{\n  top:-14px;right:-18px;--r:6deg;transform:rotate(var(--r));\n  animation:badgePop 3s .5s ease-in-out infinite;\n  background:linear-gradient(135deg,var(--pink),#c8a0f0);color:#fff;\n  box-shadow:0 4px 22px rgba(226,116,160,0.55);\n}\n.holo-float-2{\n  bottom:-12px;left:-16px;--r:-5deg;transform:rotate(var(--r));\n  animation:badgePop 3.5s 1s ease-in-out infinite;\n  background:linear-gradient(135deg,#3d2850,#2a1f2e);\n  border:1px solid rgba(196,176,255,0.3);color:#d4bbff;\n  box-shadow:0 4px 22px rgba(0,0,0,0.45);\n}\n.holo-float-3{\n  bottom:120px;right:-22px;--r:4deg;transform:rotate(var(--r));\n  animation:badgePop 2.8s .2s ease-in-out infinite;\n  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);\n  color:rgba(255,255,255,0.7);backdrop-filter:blur(10px);\n}\n\n.holo-hint{\n  text-align:center;margin-top:30px;\n  font-size:10px;color:rgba(255,255,255,0.18);letter-spacing:.16em;\n  text-transform:uppercase;font-weight:500;\n}\n.holo-hint span{color:var(--pink-light);opacity:.55;}\n\n/* \u2500\u2500 MODULE HEADER \u2500\u2500 */\n.mod-header{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}\n.mod-num{width:30px;height:30px;border-radius:8px;background:var(--pink-dim);border:1px solid var(--pink-border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--pink);}\n.mod-title-wrap .mod-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--pink);font-weight:600;}\n.mod-title-wrap .mod-name{font-size:1.1rem;font-weight:600;color:var(--text);}\n\n/* INSIGHT */\n.insight{background:var(--bg2);border:1px solid var(--border);border-left:2px solid var(--purple);border-radius:0 10px 10px 0;padding:1rem 1.1rem;margin-bottom:.75rem;}\n.insight .i-head{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}\n.insight .i-body{font-size:12.5px;color:var(--text2);line-height:1.7;font-weight:300;}\n\n@media (max-width:560px){\n  .holo-title-1,.holo-title-2{font-size:3.6rem;}\n  .holo-content{padding:28px 22px 24px;}\n  .holo-float-badge{display:none;}\n}\n</style>\n</head>\n<body>\n<div class=\"bg-orb orb1\"></div>\n<div class=\"bg-orb orb2\"></div>\n<div class=\"bg-orb orb3\"></div>\n\n<div class=\"app\">\n\n<!-- TOPBAR -->\n<div class=\"topbar\">\n  <div class=\"topbar-left\">\n    <div class=\"logo-pill\">\n      <div class=\"logo-dot\">Pr</div>\n      <span class=\"logo-name\">Prinfluence</span>\n    </div>\n    <span class=\"topbar-badge\">DEALWORTHY</span>\n  </div>\n  <div class=\"topbar-right\">\n    <div class=\"progress-pill\">\n      <span>Progress</span>\n      <div class=\"pp-track\"><div class=\"pp-fill\" id=\"pp-fill\" style=\"width:0%\"></div></div>\n      <span class=\"pp-count\" id=\"pp-count\">0%</span>\n    </div>\n  </div>\n</div>\n\n<!-- LAYOUT -->\n<div class=\"layout\">\n\n  <!-- SIDEBAR -->\n  <nav class=\"sidebar\">\n    <div class=\"sb-section\">\n      <div class=\"sb-label\">Getting Started</div>\n      <div class=\"sb-item active\" onclick=\"showPage('welcome',this)\">\n        <span class=\"sb-icon\">\u25c8</span> Welcome\n      </div>\n    </div>\n    <div class=\"sb-divider\"></div>\n    <div class=\"sb-section\">\n      <div class=\"sb-label\">Foundations</div>\n      <div class=\"sb-item\" onclick=\"showPage('mindset',this)\">\n        <span class=\"sb-icon\">\u25c9</span> Mindset First <span class=\"sb-num\">01</span>\n      </div>\n      <div class=\"sb-item\" onclick=\"showPage('positioning',this)\">\n        <span class=\"sb-icon\">\u25c7</span> Your Positioning <span class=\"sb-num\">02</span>\n      </div>\n    </div>\n    <div class=\"sb-divider\"></div>\n    <div class=\"sb-section\">\n      <div class=\"sb-label\">Strategy</div>\n      <div class=\"sb-item\" onclick=\"showPage('strategy',this)\">\n        <span class=\"sb-icon\">\u25b7</span> 5-Day Strategy <span class=\"sb-num\">03</span>\n      </div>\n      <div class=\"sb-item\" onclick=\"showPage('formats',this)\">\n        <span class=\"sb-icon\">\u2b21</span> Content Formats <span class=\"sb-num\">04</span>\n      </div>\n      <div class=\"sb-item\" onclick=\"showPage('portfolio',this)\">\n        <span class=\"sb-icon\">\u25d0</span> Portfolio Site <span class=\"sb-num\">05</span>\n      </div>\n    </div>\n    <div class=\"sb-divider\"></div>\n    <div class=\"sb-section\">\n      <div class=\"sb-label\">Tools</div>\n      <div class=\"sb-item\" onclick=\"showPage('vocab',this)\">\n        <span class=\"sb-icon\">\u221e</span> Vocabulary <span class=\"sb-num\">06</span>\n      </div>\n      <div class=\"sb-item\" onclick=\"showPage('rates',this)\">\n        <span class=\"sb-icon\">$</span> Rate Calculator <span class=\"sb-num\">07</span>\n      </div>\n      <div class=\"sb-item\" onclick=\"showPage('brandlist',this)\">\n        <span class=\"sb-icon\">\u229e</span> Brand Hit List <span class=\"sb-num\">08</span>\n      </div>\n    </div>\n    <div class=\"sb-divider\"></div>\n    <div class=\"sb-section\">\n      <div class=\"sb-label\">Outreach</div>\n      <div class=\"sb-item\" onclick=\"showPage('emails',this)\">\n        <span class=\"sb-icon\">\u2192</span> Pitch Templates <span class=\"sb-num\">09</span>\n      </div>\n      <div class=\"sb-item\" onclick=\"showPage('contracts',this)\">\n        <span class=\"sb-icon\">\u00a7</span> Contracts <span class=\"sb-num\">10</span>\n      </div>\n    </div>\n    <div class=\"sb-divider\"></div>\n    <div class=\"sb-section\">\n      <div class=\"sb-label\">Launch</div>\n      <div class=\"sb-item\" onclick=\"showPage('checklist',this)\">\n        <span class=\"sb-icon\">\u2726</span> Launch Checklist <span class=\"sb-num\">11</span>\n      </div>\n    </div>\n    <div class=\"sb-divider\"></div>\n    <div class=\"sb-section\">\n      <div class=\"sb-label\">Upgrade</div>\n      <div class=\"sb-item\" onclick=\"showPage('pitchvault',this)\">\n        <span class=\"sb-icon\">\u25b2</span> Pitch Vault\n      </div>\n      <div class=\"sb-item\" onclick=\"showPage('outreach',this)\">\n        <span class=\"sb-icon\">\u25eb</span> Outreach Tracker\n      </div>\n    </div>\n  </nav>\n\n  <!-- MAIN -->\n  <main class=\"main\" style=\"margin:0 auto;\">\n\n    <!-- \u2550\u2550\u2550 WELCOME \u2550\u2550\u2550 -->\n    <div id=\"welcome\" class=\"page active\">\n\n      <!-- HOLOGRAPHIC HERO CARD -->\n      <div class=\"holo-stage\">\n        <div class=\"holo-wrap\" id=\"holo-wrap\">\n          <div class=\"holo-pulse\" id=\"holo-pulse\"></div>\n          <div class=\"holo-cursor\" id=\"holo-cursor\"></div>\n\n          <div class=\"holo-card\" id=\"holo-hero\">\n            <!-- L0: deep bg orbs (parallax) -->\n            <div class=\"holo-orb holo-orb-a\" id=\"holo-orb1\"></div>\n            <div class=\"holo-orb holo-orb-b\" id=\"holo-orb2\"></div>\n            <div class=\"holo-orb holo-orb-c\" id=\"holo-orb3\"></div>\n            <!-- L1: grid -->\n            <div class=\"holo-grid\"></div>\n            <!-- L2: foil -->\n            <div class=\"holo-foil\"></div>\n            <!-- L3: cursor-driven shimmer -->\n            <div class=\"holo-shimmer\" id=\"holo-shimmer\"></div>\n            <!-- L4: sweep -->\n            <div class=\"holo-sweep\"></div>\n            <!-- L5: particles -->\n            <div class=\"holo-particles\" id=\"holo-particles\"></div>\n            <!-- L6: rotating ring -->\n            <div class=\"holo-ring\"><div class=\"holo-ring-dot\"></div></div>\n\n            <div class=\"holo-content\">\n              <div class=\"holo-top\">\n                <div class=\"holo-brand\">\n                  <div class=\"holo-brand-logo\" id=\"holo-logo\">Pr</div>\n                  <div>\n                    <div class=\"holo-brand-name\">Prinfluence</div>\n                    <div class=\"holo-brand-sub\">Digital Products</div>\n                  </div>\n                </div>\n                <div class=\"holo-badge-pill\">INSTANT ACCESS</div>\n              </div>\n\n              <div class=\"holo-headline\" id=\"holo-parallax\">\n                <div class=\"holo-eyebrow\">Creator Starter Kit \u00b7 11 Modules</div>\n                <div class=\"holo-title\">\n                  <div class=\"holo-title-1\">Deal</div>\n                  <div class=\"holo-title-2\">Worthy</div>\n                </div>\n                <div class=\"holo-desc\">Everything you need to go from zero to deal-ready. Mindset, positioning, content strategy, vocabulary, rates, and your first outreach \u2014 all in one system built for creators who are serious about getting paid.</div>\n              </div>\n\n              <div class=\"holo-divider\"></div>\n\n              <div class=\"holo-steps\">\n                <div class=\"holo-step\"><div class=\"holo-step-letter\" style=\"background:#fdf0f6;color:#e274a0;\">R</div><div class=\"holo-step-label\">Research</div></div>\n                <div class=\"holo-step\"><div class=\"holo-step-letter\" style=\"background:#f0e8ff;color:#8b66c0;\">A</div><div class=\"holo-step-label\">Audit</div></div>\n                <div class=\"holo-step\"><div class=\"holo-step-letter\" style=\"background:#e8f8d8;color:#3a7d44;\">T</div><div class=\"holo-step-label\">Triple</div></div>\n                <div class=\"holo-step\"><div class=\"holo-step-letter\" style=\"background:#fff4c2;color:#7a6200;\">E</div><div class=\"holo-step-label\">Execute</div></div>\n              </div>\n\n              <div class=\"holo-features\">\n                <div class=\"holo-feature\"><span class=\"holo-feat-icon\">\u2726</span><div><div class=\"holo-feat-label\">11 Modules</div><div class=\"holo-feat-sub\">Mindset to launch</div></div></div>\n                <div class=\"holo-feature\"><span class=\"holo-feat-icon\">\u25c8</span><div><div class=\"holo-feat-label\">5-Day Strategy</div><div class=\"holo-feat-sub\">Portfolio to pitch</div></div></div>\n                <div class=\"holo-feature\"><span class=\"holo-feat-icon\">\u25c9</span><div><div class=\"holo-feat-label\">Rate Calculator</div><div class=\"holo-feat-sub\">Know your number</div></div></div>\n                <div class=\"holo-feature\"><span class=\"holo-feat-icon\">\u25c7</span><div><div class=\"holo-feat-label\">Email Templates</div><div class=\"holo-feat-sub\">Copy-ready</div></div></div>\n              </div>\n\n              <div class=\"holo-cta-row\">\n                <button class=\"holo-cta-primary\" onclick=\"startKit()\">Start Module 01 \u2726</button>\n                <div class=\"holo-cta-secondary\">prinfluence.com</div>\n              </div>\n            </div>\n\n            <!-- edge glows -->\n            <div class=\"holo-edge\"></div>\n            <div class=\"holo-top-shine\"></div>\n          </div>\n\n          <!-- floating badges outside card -->\n          <div class=\"holo-float-badge holo-float-1\">\u2726 11 Modules</div>\n          <div class=\"holo-float-badge holo-float-2\">R.A.T.E. Method</div>\n          <div class=\"holo-float-badge holo-float-3\">5-Day Plan</div>\n        </div>\n      </div>\n\n      <div class=\"holo-hint\">Move your cursor across the card \u00b7 <span>click to pulse</span></div>\n      <div class=\"holo-hint\" style=\"margin-top:8px;\">Are you ready? \u00b7 <span>your gonna do great. <span style=\"font-size:14px;display:inline-block;vertical-align:middle;line-height:1;\">\u2193</span></span></div>\n\n      <div class=\"divider\"></div>\n\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">How to work through this kit <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">Work left-to-right through the sidebar. Each module builds on the last \u2014 don't skip to the email templates before you've built your positioning. The order is intentional and the results compound. Goal: one module per day minimum.</div></div>\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">This is a system, not a shortcut <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">Everything in this kit works \u2014 but only if you do. The creators who win implement on the same day they learn. Your competitive advantage is speed of action, not perfection of preparation.</div></div>\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">Your product upgrade path <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">This kit is your foundation. When you're ready to go deeper: [Pitch] Paid, Period. gives you 10 advanced pitch templates and the full P.A.I.D. Framework. The Outreach Tracker gives you the system to manage everything once the deals start flowing.</div></div>\n    </div>\n\n    <!-- \u2550\u2550\u2550 MINDSET \u2550\u2550\u2550 -->\n    <div id=\"mindset\" class=\"page\">\n      <div class=\"mod-header\">\n        <div class=\"mod-num\">01</div>\n        <div class=\"mod-title-wrap\">\n          <div class=\"mod-label\">Module</div>\n          <div class=\"mod-name\">Mindset First \u2014 The Confidence Wound</div>\n        </div>\n      </div>\n\n      <div class=\"page-intro\">Before strategy, content, or rates \u2014 we need to talk about why most UGC creators stay stuck. It's not followers. It's not the algorithm. It's not their content. It's this: they don't believe they deserve to be paid.</div>\n\n      <div class=\"do-dont\">\n        <div class=\"do-box\"><div class=\"lbl\">\u2713 The truth</div><p>Brands have large budgets. They're not withholding money \u2014 they're testing whether you'll ask for it. The creator who asks professionally and confidently gets the check. Every time.</p></div>\n        <div class=\"dont-box\"><div class=\"lbl\">\u2717 The myth</div><p>\"I need more followers first.\" \"I need to be bigger.\" These are stories. Brands pay for quality, engagement, and professionalism \u2014 not follower counts.</p></div>\n      </div>\n\n      <div style=\"font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--pink);font-weight:600;margin-bottom:.9rem;\">The R.A.T.E. Method</div>\n\n      <div class=\"card\">\n        <div class=\"step-row\">\n          <div class=\"step-badge\" style=\"background:var(--pink-dim);color:var(--pink);border:1px solid var(--pink-border);\">R</div>\n          <div class=\"step-body\">\n            <h3>Research Your Worth</h3>\n            <p>Spend 20 minutes researching what creators in your niche and at your engagement level actually charge. Data removes doubt. You cannot feel confident about a number you pulled from thin air \u2014 so don't.</p>\n            <div class=\"step-quote\">Search: \"[your niche] UGC creator rates 2025\" \u2014 screenshot what you find and keep it as a reference before every pitch.</div>\n          </div>\n        </div>\n        <div class=\"step-row\">\n          <div class=\"step-badge\" style=\"background:var(--purple-dim);color:var(--purple);border:1px solid rgba(200,160,240,0.25);\">A</div>\n          <div class=\"step-body\">\n            <h3>Audit Your Value</h3>\n            <p>Pull your last 10 posts. Write down engagement rate, saves, and any comments where someone asked about a product. Those are your receipts. Your negotiation leverage lives in existing content \u2014 most creators never look for it.</p>\n            <div class=\"step-quote\">Engagement rate = (likes + comments + saves) \u00f7 followers \u00d7 100. Above 3% is strong. Above 6% is exceptional. Lead with this number in every pitch.</div>\n          </div>\n        </div>\n        <div class=\"step-row\">\n          <div class=\"step-badge\" style=\"background:var(--mint-dim);color:var(--mint);border:1px solid rgba(126,232,184,0.2);\">T</div>\n          <div class=\"step-body\">\n            <h3>Triple Your First Number</h3>\n            <p>Whatever rate you first think of \u2014 triple it. Your first instinct is always filtered through fear, not worth. Brands expect negotiation. Starting low means landing even lower. Start high, land fair.</p>\n            <div class=\"step-quote\">If you thought \"$100\" \u2014 your rate is $300. Work backwards from your actual worth, not your fear of rejection.</div>\n          </div>\n        </div>\n        <div class=\"step-row\">\n          <div class=\"step-badge\" style=\"background:var(--amber-dim);color:var(--amber);border:1px solid rgba(240,192,96,0.2);\">E</div>\n          <div class=\"step-body\">\n            <h3>Execute With Energy</h3>\n            <p>State your rate like it's a fact \u2014 because it is. No apology. No \"I was thinking maybe...\" Professional energy is one of the most underrated assets in creator business. How you communicate your rate tells brands everything about what it'll be like to work with you.</p>\n            <div class=\"step-quote\">\"My rate for this deliverable is $[X]. This includes [deliverables]. Usage rights are discussed separately.\"</div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"insight\"><div class=\"i-head\">The confidence equation</div><div class=\"i-body\">Confidence doesn't come before the ask. It comes because you asked anyway. You will feel nervous the first time you send a rate. Send it anyway. The discomfort of asking is temporary. The regret of undercharging compounds for months. Every creator who is consistently well-paid has one thing in common: they got comfortable being uncomfortable.</div></div>\n    </div>\n\n    <!-- \u2550\u2550\u2550 POSITIONING \u2550\u2550\u2550 -->\n    <div id=\"positioning\" class=\"page\">\n      <div class=\"mod-header\">\n        <div class=\"mod-num\">02</div>\n        <div class=\"mod-title-wrap\">\n          <div class=\"mod-label\">Module</div>\n          <div class=\"mod-name\">Your Positioning \u2014 The 3-Pillar Map</div>\n        </div>\n      </div>\n      <div class=\"page-intro\">You don't need to create a brand position \u2014 you already have one. You just need to own it and package it so clearly that brands immediately understand who you serve, what you create, and why you're the obvious choice.</div>\n\n      <div class=\"grid3\">\n        <div class=\"card-sm\">\n          <div class=\"sc-label\">Pillar 1</div>\n          <div style=\"font-size:14px;font-weight:600;color:var(--pink);margin-bottom:4px;\">Your Expertise</div>\n          <div style=\"font-size:12px;color:var(--text2);line-height:1.55;font-weight:300;\">What you know better than most. The thing you'd talk about for hours without being asked.</div>\n        </div>\n        <div class=\"card-sm\">\n          <div class=\"sc-label\">Pillar 2</div>\n          <div style=\"font-size:14px;font-weight:600;color:var(--purple);margin-bottom:4px;\">Your Lifestyle</div>\n          <div style=\"font-size:12px;color:var(--text2);line-height:1.55;font-weight:300;\">The world your audience enters when they follow you. Aesthetic, energy, values, routines.</div>\n        </div>\n        <div class=\"card-sm\">\n          <div class=\"sc-label\">Pillar 3</div>\n          <div style=\"font-size:14px;font-weight:600;color:var(--cyan);margin-bottom:4px;\">Your Audience</div>\n          <div style=\"font-size:12px;color:var(--text2);line-height:1.55;font-weight:300;\">Who specifically you speak to. The more specific, the more valuable \u2014 niche audiences convert better.</div>\n        </div>\n      </div>\n\n      <div class=\"card\" style=\"border-color:var(--pink-border);\">\n        <div class=\"card-title\" style=\"color:var(--pink);\">The Positioning Statement Formula</div>\n        <div class=\"card-body\" style=\"margin-bottom:.75rem;\">\"I create <span class=\"hl\">[content type]</span> for <span class=\"hl\">[specific audience]</span> who want <span class=\"hl\">[outcome]</span>. I specialize in <span class=\"hl\">[your pillars]</span> and my content is built for <span class=\"hl\">[platform + purpose]</span>.\"</div>\n        <div style=\"font-size:12px;font-style:italic;color:var(--text3);line-height:1.6;\">\"I create lifestyle UGC for women 25\u201335 building intentional routines. I specialize in skincare, wellness, and home \u2014 and my content is built for DTC brands running paid campaigns on TikTok.\"</div>\n      </div>\n\n      <div class=\"divider\"></div>\n      <div style=\"font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:.75rem;\">The Brand Value Test \u2014 Run every deal through this</div>\n\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">Does this brand align with at least 2 of my 3 pillars? <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">If the brand has nothing to do with what you create, your audience will feel the disconnect instantly. One off-brand deal can erode months of trust. The answer must be yes before you proceed.</div></div>\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">Would I be proud to put this on my portfolio? <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">Your portfolio is a direct signal to every future brand about your standards. If you'd be embarrassed to include this work, your instincts are telling you something. Every deal you accept shapes what deals come next.</div></div>\n      <div class=\"acc\"><button class=\"acc-btn\" onclick=\"toggleAcc(this)\">Is this partnership energy or charity energy? <span class=\"acc-chev\">\u203a</span></button><div class=\"acc-body\">Partnership: mutual value, fair exchange, professional respect. Charity: they want free work, exposure is payment, they can't define success. Know the difference. Charity deals cost more than they pay.</div></div>\n    </div>\n\n    <!-- \u2550\u2550\u2550 5-DAY STRATEGY \u2550\u2550\u2550 -->\n    <div id=\"strategy\" class=\"page\">\n      <div class=\"mod-header\">\n        <div class=\"mod-num\">03</div>\n        <div class=\"mod-title-wrap\">\n          <div class=\"mod-label\">Module</div>\n          <div class=\"mod-name\">The 5-Day Paid Brand Deals Content Strategy</div>\n        </div>\n      </div>\n      <div class=\"page-intro\">This isn't about going viral. It's about building a portfolio that proves your value to paying brands in 5 days. Each day has one focus, one task, one piece of content. Do the work. The deals follow.</div>\n\n      <div class=\"day-pills\">\n        <button class=\"day-pill active\" onclick=\"showDay('d1',this)\">Day 1</button>\n        <button class=\"day-pill\" onclick=\"showDay('d2',this)\">Day 2</button>\n        <button class=\"day-pill\" onclick=\"showDay('d3',this)\">Day 3</button>\n        <button class=\"day-pill\" onclick=\"showDay('d4',this)\">Day 4</button>\n        <button class=\"day-pill\" onclick=\"showDay('d5',this)\">Day 5</button>\n      </div>\n\n      <div id=\"d1\" class=\"day-pg active\"><div class=\"day-card\">\n        <div class=\"dc-top\"><div class=\"tag tag-pink\">Foundation</div><div class=\"dc-num\">01</div></div>\n        <div class=\"dc-title\">Know Your Worth Before You Post Anything</div>\n        <div class=\"dc-body\">Most creators start by creating. The smart ones start by positioning. Before you film a single frame, you need to know exactly who you are, what you offer, and what you're worth. Today is entirely about that foundation.<br><br>Complete your 3-Pillar Positioning Map. Write your creator positioning statement. Research average rates in your niche. Calculate your engagement rate on your last 10 posts. Set your baseline rates: single video, 3-video package, gifted-to-paid conversion.<br><br>This groundwork means everything you create from today is strategic \u2014 not random.</div>\n        <div class=\"dc-task\"><div class=\"dc-task-lbl\">Today's task</div><div class=\"dc-task-text\">Write your positioning statement. Set 3 rates: single UGC video, 3-video package, brand deal post. Save them where you'll see them before every pitch.</div></div>\n      </div></div>\n\n      <div id=\"d2\" class=\"day-pg\"><div class=\"day-card\">\n        <div class=\"dc-top\"><div class=\"tag tag-purple\">Attraction</div><div class=\"dc-num\">02</div></div>\n        <div class=\"dc-title\">Create Your First Portfolio Piece</div>\n        <div class=\"dc-body\">Pick a product you genuinely use and love. Film 3 angles: honest first impression, how-to or integration shot, and results/testimonial close. Don't wait for a brand to give you something \u2014 your portfolio is built before you have permission.<br><br>Focus on clean visuals, natural product placement, and your authentic voice. Edit for brands, not just views. Post with a natural tag and relevant hashtags. Document every engagement metric within 24 hours \u2014 saves, comments asking where to buy, DMs. These become your leverage.</div>\n        <div class=\"dc-task\"><div class=\"dc-task-lbl\">Today's task</div><div class=\"dc-task-text\">Film 3 angles of one product you already own. Edit, post, and screenshot all engagement data within 24 hours.</div></div>\n      </div></div>\n\n      <div id=\"d3\" class=\"day-pg\"><div class=\"day-card\">\n        <div class=\"dc-top\"><div class=\"tag tag-mint\">Proof</div><div class=\"dc-num\">03</div></div>\n        <div class=\"dc-title\">Build Social Proof Brands Actually Care About</div>\n        <div class=\"dc-body\">Today: a Before &amp; After or Problem \u2192 Solution piece. This format generates the highest engagement and clearest proof of your ability to drive results \u2014 which is exactly what brands are buying.<br><br>Choose a real transformation. Skincare that changed your skin. An organization system that changed your space. Film both sides. Make the contrast undeniable.<br><br>While this posts, start building your outreach list. Find the influencer marketing contact at 5 brands that align with your pillars. You're not pitching yet \u2014 you're building infrastructure.</div>\n        <div class=\"dc-task\"><div class=\"dc-task-lbl\">Today's task</div><div class=\"dc-task-text\">Post a Before/After or Problem\u2192Solution video. Find and save contact details for 5 target brands.</div></div>\n      </div></div>\n\n      <div id=\"d4\" class=\"day-pg\"><div class=\"day-card\">\n        <div class=\"dc-top\"><div class=\"tag tag-cyan\">Authority</div><div class=\"dc-num\">04</div></div>\n        <div class=\"dc-title\">Demonstrate Expertise, Not Just Lifestyle</div>\n        <div class=\"dc-body\">Most UGC creators only show lifestyle. Creators who charge premium rates also show expertise. Today's content demonstrates that you understand your niche at a deeper level \u2014 which makes you more valuable because you educate while selling.<br><br>Create a tutorial, a myth-busting piece, a \"what brands won't tell you\" angle, or a comparison that shows genuine knowledge. This format gets saved more than any other \u2014 and saves are the highest purchase-intent signal on any platform.</div>\n        <div class=\"dc-task\"><div class=\"dc-task-lbl\">Today's task</div><div class=\"dc-task-text\">Post an educational piece that demonstrates your expertise. Review engagement from Days 2\u20133 and update your rate card if the data warrants it.</div></div>\n      </div></div>\n\n      <div id=\"d5\" class=\"day-pg\"><div class=\"day-card\">\n        <div class=\"dc-top\"><div class=\"tag tag-amber\">Activation</div><div class=\"dc-num\">05</div></div>\n        <div class=\"dc-title\">Send Your First Pitch</div>\n        <div class=\"dc-body\">Today is the day. You have positioning, portfolio pieces, proof, and demonstrated expertise. You are ready. The creator who waits for perfect is still waiting \u2014 you are not that creator.<br><br>Use the email templates in this kit to pitch 3 brands from your outreach list. Customize every opener. Reference something specific about each brand. Include your best performing content piece as a link. State your deliverables and rate clearly.<br><br>Your goal today is not a yes. Your goal is 3 sends. The yes comes from the send.</div>\n        <div class=\"dc-task\"><div class=\"dc-task-lbl\">Today's task</div><div class=\"dc-task-text\">Send 3 personalized pitches. Log each one with contact, date, and follow-up date set 7 days out.</div></div>\n      </div></div>\n    </div>\n\n    <!-- \u2550\u2550\u2550 FORMATS \u2550\u2550\u2550 -->\n    <div id=\"formats\" class=\"page\">\n      <div class=\"mod-header\">\n        <div class=\"mod-num\">04</div>\n        <div class=\"mod-title-wrap\">\n          <div class=\"mod-label\">Module</div>\n          <div class=\"mod-name\">The 5 Formats That Get You Paid</div>\n        </div>\n      </div>\n      <div class=\"page-intro\">You don't need to reinvent content. Master 5 proven formats that brands consistently pay for \u2014 each serving a different purpose in a brand's marketing funnel.</div>\n\n      <div class=\"fmt-grid\">\n        <div class=\"fmt-card\" onclick=\"toggleFmt('f1',this)\"><div class=\"fmt-icon\">\ud83c\udf99\ufe0f</div><div class=\"fmt-name\">Testimonial</div><div class=\"fmt-sub\">Real talk. Real results.</div></div>\n        <div class=\"fmt-card\" onclick=\"toggleFmt('f2',this)\"><div class=\"fmt-icon\">\ud83d\udcd6</div><div class=\"fmt-name\">Tutorial</div><div class=\"fmt-sub\">Highest save rate.</div></div>\n        <div class=\"fmt-card\" onclick=\"toggleFmt('f3',this)\"><div class=\"fmt-icon\">\ud83c\udf3f</div><div class=\"fmt-name\">Lifestyle Integration</div><div class=\"fmt-sub\">Highest rates paid.</div></div>\n        <div class=\"fmt-card\" onclick=\"toggleFmt('f4',this)\"><div class=\"fmt-icon\">\u26a1</div><div class=\"fmt-name\">Before &amp; After</div><div class=\"fmt-sub\">Undeniable proof.</div></div>\n        <div class=\"fmt-card\" onclick=\"toggleFmt('f5',this)\"><div class=\"fmt-icon\">\ud83d\udcac</div><div class=\"fmt-name\">Storytelling</div><div class=\"fmt-sub\">Series money.</div></div>\n      </div>\n\n      <div id=\"f1\" class=\"fmt-detail\"><div class=\"card-title\" style=\"margin-bottom:.5rem;color:var(--pink);\">Testimonial \u2014 Why it converts</div><div class=\"card-body\" style=\"margin-bottom:.75rem;\">People trust people. A genuine testimonial cuts through every level of skepticism polished advertising can't. Brands pay premium for testimonials that don't feel like ads \u2014 which is exactly what a skilled UGC creator delivers.</div><div class=\"do-dont\"><div class=\"do-box\"><div class=\"lbl\">\u2713 Works</div><p>Be specific. \"Cleared my skin in 3 weeks\" beats \"I love this\" every time. Specificity is credibility. Film yourself actually using the product, not just talking about it.</p></div><div class=\"dont-box\"><div class=\"lbl\">\u2717 Kills it</div><p>Reading a script verbatim. Over-enthusiastic openers. Generic claims that could apply to any product. Brands and audiences can smell inauthenticity immediately.</p></div></div></div>\n\n      <div id=\"f2\" class=\"fmt-detail\"><div class=\"card-title\" style=\"margin-bottom:.5rem;color:var(--purple);\">Tutorial \u2014 Why it converts</div><div class=\"card-body\" style=\"margin-bottom:.75rem;\">Tutorials generate the highest save rates of any format \u2014 and saves are the clearest purchase-intent signal on any platform. When someone saves your tutorial, they're saying \"I want to come back and do this.\" Brands know this. Tutorial creators charge more.</div><div class=\"do-dont\"><div class=\"do-box\"><div class=\"lbl\">\u2713 Works</div><p>Teach something real. Show a genuine skill that happens to feature the product. The value is in the teaching \u2014 the product is the tool that makes it possible.</p></div><div class=\"dont-box\"><div class=\"lbl\">\u2717 Kills it</div><p>Tutorials that are just ads in disguise. If the \"tutorial\" has no standalone educational value, audiences skip and saves tank.</p></div></div></div>\n\n      <div id=\"f3\" class=\"fmt-detail\"><div class=\"card-title\" style=\"margin-bottom:.5rem;color:var(--cyan);\">Lifestyle Integration \u2014 Why it converts</div><div class=\"card-body\" style=\"margin-bottom:.75rem;\">These pay the highest rates. Brands are paying for influence, not an infomercial. When a product is seamlessly woven into your actual life, it creates desire without triggering ad-blindness. This is the pinnacle of UGC \u2014 and it commands 30\u201350% higher rates than standard deliverables.</div><div class=\"do-dont\"><div class=\"do-box\"><div class=\"lbl\">\u2713 Works</div><p>The product belongs in your world. Film your actual morning routine with skincare visible. The goal is \"I want her life\" \u2014 not \"she's talking about a product.\"</p></div><div class=\"dont-box\"><div class=\"lbl\">\u2717 Kills it</div><p>Forced placement. Awkward camera angles that obviously show the product. A lifestyle video that pauses for what is clearly an ad moment.</p></div></div></div>\n\n      <div id=\"f4\" class=\"fmt-detail\"><div class=\"card-title\" style=\"margin-bottom:.5rem;color:var(--amber);\">Before &amp; After \u2014 Why it converts</div><div class=\"card-body\" style=\"margin-bottom:.75rem;\">Visual proof is the most powerful selling tool in existence. A before &amp; after removes every objection a potential customer could have because it shows \u2014 not tells \u2014 that the product works. Brands running conversion campaigns rely heavily on this format.</div><div class=\"do-dont\"><div class=\"do-box\"><div class=\"lbl\">\u2713 Works</div><p>Make the contrast undeniable. Same lighting, same angle. Honest starting point \u2014 don't undersell the before because that undersells the after.</p></div><div class=\"dont-box\"><div class=\"lbl\">\u2717 Kills it</div><p>Staging the before. Using a deliberately bad photo for before and perfect lighting for after. Audiences know. When trust breaks, conversion stops.</p></div></div></div>\n\n      <div id=\"f5\" class=\"fmt-detail\"><div class=\"card-title\" style=\"margin-bottom:.5rem;color:var(--mint);\">Storytelling \u2014 Why it converts</div><div class=\"card-body\" style=\"margin-bottom:.75rem;\">People buy stories, not products. When you weave a product into a narrative your audience connects with emotionally, you're not selling \u2014 you're sharing. Sharing creates the kind of trust that drives purchase decisions days or weeks later.</div><div class=\"do-dont\"><div class=\"do-box\"><div class=\"lbl\">\u2713 Works</div><p>Anchor the story in a universal emotion. The product enters as a solution. Pitch Part 1/Part 2 series to brands \u2014 multiple deliverables equals multiple paychecks.</p></div><div class=\"dont-box\"><div class=\"lbl\">\u2717 Kills it</div><p>Manufactured drama. A story that clearly exists only to sell a product. Audiences have a finely tuned radar for this and disengage immediately.</p></div></div></div>\n    </div>\n\n    <!-- \u2550\u2550\u2550 VOCABULARY \u2550\u2550\u2550 -->\n    <div id=\"vocab\" class=\"page\">\n      <div class=\"mod-header\">\n        <div class=\"mod-num\">05</div>\n        <div class=\"mod-title-wrap\">\n          <div class=\"mod-label\">Module</div>\n          <div class=\"mod-name\">Speak Fluent Brand \u2014 The Dealworthy Vocabulary</div>\n        </div>\n      </div>\n      <div class=\"page-intro\">The fastest way to signal professionalism is to use the right language. Brands filter creators in the first 30 seconds of a pitch \u2014 how you communicate tells them everything about what it'll be like to work with you.</div>\n\n      <div class=\"vocab-search-wrap\">\n        <span class=\"vocab-search-icon\">\ud83d\udd0d</span>\n        <input type=\"text\" class=\"vocab-search\" placeholder=\"Search terms...\" oninput=\"filterVocab(this.value)\">\n      </div>\n\n      <div class=\"vocab-grid\" id=\"vocab-grid\">\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"ugc user-generated content\"><div class=\"v-cat\" style=\"color:var(--pink);\">Foundation</div><div class=\"v-term\">UGC (User-Generated Content) <span>\u203a</span></div><div class=\"v-def\">Content created by individuals \u2014 not brands \u2014 that brands use on their own channels for marketing. As a UGC creator, you're not posting to your audience. You're creating professional video assets the brand runs in their ads, website, and social. No follower count required. You're selling the asset, not your audience.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"rate card pricing\"><div class=\"v-cat\" style=\"color:var(--pink);\">Foundation</div><div class=\"v-term\">Rate Card <span>\u203a</span></div><div class=\"v-def\">A document listing your pricing for all services \u2014 single video, packages, usage rights, exclusivity fees, rush delivery. Creators without one look like they'll accept whatever is offered. Creators with one look like business owners. Build yours before your first pitch.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"usage rights license perpetuity\"><div class=\"v-cat\" style=\"color:var(--purple);\">Money Terms</div><div class=\"v-term\">Usage Rights <span>\u203a</span></div><div class=\"v-def\">The permission you give a brand to use your content, for how long, on which platforms. Your base rate covers 30\u201390 days of organic social. Anything beyond \u2014 paid ads, website, email, unlimited duration \u2014 is a separate fee. Most beginners give unlimited rights for free. This is one of the fastest ways to leave thousands on the table.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"exclusivity compete restrict\"><div class=\"v-cat\" style=\"color:var(--purple);\">Money Terms</div><div class=\"v-term\">Exclusivity <span>\u203a</span></div><div class=\"v-def\">A clause restricting you from working with competing brands for a set period. 30-day category exclusivity is standard. Anything longer requires additional compensation \u2014 typically 10% of base rate per 30 days. Never agree to broad exclusivity without significant premium pricing.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"roas return ad spend revenue\"><div class=\"v-cat\" style=\"color:var(--mint);\">Performance</div><div class=\"v-term\">ROAS (Return on Ad Spend) <span>\u203a</span></div><div class=\"v-def\">How much revenue a brand earns per dollar spent on advertising. If a brand spends $1,000 on ads featuring your content and generates $3,000 in sales, their ROAS is 3x. If your content drives strong ROAS, you have direct leverage for higher rates \u2014 always ask brands for performance data.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"engagement rate likes comments saves\"><div class=\"v-cat\" style=\"color:var(--mint);\">Performance</div><div class=\"v-term\">Engagement Rate <span>\u203a</span></div><div class=\"v-def\">The percentage of your audience that interacts with your content. Formula: (total interactions \u00f7 followers) \u00d7 100. Average is 1\u20133%. Strong is 4\u20136%. Exceptional is 6%+. A creator with 5K followers and 8% engagement often outperforms one with 50K and 1.5%.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"avv average video views\"><div class=\"v-cat\" style=\"color:var(--mint);\">Performance</div><div class=\"v-term\">AVV (Average Video Views) <span>\u203a</span></div><div class=\"v-def\">Your average views across recent videos \u2014 typically your last 10\u201320 posts. This is the primary metric for pricing brand deals. Calculate it regularly and include it in all pitches. It's your most honest performance signal and the foundation of every rate you'll calculate.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"hook attention scroll stop\"><div class=\"v-cat\" style=\"color:var(--cyan);\">Content</div><div class=\"v-term\">Hook <span>\u203a</span></div><div class=\"v-def\">The first 1\u20133 seconds of your video. The hook is the most important creative decision you make on any piece of content. A weak hook on a brilliant video means no one sees the brilliant part. Brands often request multiple hook variations (3\u20135) for A/B testing. Charging for hook variations is a legitimate, common upsell.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"dark posting whitelisting spark ads\"><div class=\"v-cat\" style=\"color:var(--cyan);\">Content</div><div class=\"v-term\">Dark Posting / Whitelisting <span>\u203a</span></div><div class=\"v-def\">When a brand runs your content as a paid ad through your social account \u2014 appearing to audiences as coming from you, but the brand controls targeting and spend. On TikTok this is called Spark Ads. Uses your authentic creator identity in paid distribution. Commands a premium rate \u2014 typically 20\u201340% above standard UGC pricing.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"dtc direct consumer brand\"><div class=\"v-cat\" style=\"color:var(--pink);\">Foundation</div><div class=\"v-term\">DTC (Direct-to-Consumer) <span>\u203a</span></div><div class=\"v-def\">Brands that sell directly to customers without retailers. Most brands you discover on TikTok or Instagram are DTC. They have dedicated influencer marketing budgets, move fast, and are the biggest buyers of UGC. These are your primary target market.</div></div>\n\n        <div class=\"v-card\" onclick=\"expandV(this)\" data-term=\"media kit portfolio presentation\"><div class=\"v-cat\" style=\"color:var(--purple);\">Business</div><div class=\"v-term\">Media Kit <span>\u203a</span></div><div class=\"v-def\">Your professional portfolio document \u2014 a visual resume showing brands who you are, what you create, your audience demographics, key metrics, past collabs, and rates. A media kit signals professionalism before the brand has seen a single piece of your content. Keep it updated monthly
