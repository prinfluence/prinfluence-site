  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error overlay disabled for production — errors are logged to console only.
  window.addEventListener('error', function(e) {
    console.error('[bundle]', e.message || e.type, e.filename, e.lineno);
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

a(226,116,160,0.12);\n  --lav:#c8a0f0;--lav-pale:#f0e8ff;--mint:#e8f8d8;--yellow:#fff4c2;--peach:#ffe8d0;\n  --bg:#1a1722;--bg-elev:#221e2c;--surface:#221e2c;--surface2:#2a2535;\n  --border:rgba(255,255,255,0.07);--border-pink:rgba(226,116,160,0.3);\n  --text:#f0eaf5;--text-mid:rgba(240,234,245,0.65);--text-muted:rgba(240,234,245,0.38);\n}\nbody{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse 1200px 600px at 50% -200px,rgba(226,116,160,0.05),transparent 60%),radial-gradient(ellipse 900px 500px at 50% 110%,rgba(196,176,255,0.04),transparent 60%);background-attachment:fixed}\n\n/* SITE HEADER — HOLOGRAPHIC */\n.site-header-stage{perspective:1800px;position:relative}\n.site-header{position:relative;border-bottom:1px solid rgba(255,255,255,0.06);padding:0;overflow:hidden;background:linear-gradient(145deg,#1e1030 0%,#2a1f2e 40%,#1a1535 70%,#0f0c1e 100%);transform-style:preserve-3d;transition:transform 0.08s ease-out;will-change:transform;cursor:crosshair}\n/* layer base */\n.holo-layer{position:absolute;inset:0;pointer-events:none}\n/* L0 — deep bg orbs */\n.holo-orbs{z-index:0}\n.holo-orb{position:absolute;border-radius:50%;will-change:transform,opacity}\n.holo-orb-1{top:-140px;left:-100px;width:460px;height:460px;background:radial-gradient(circle,rgba(226,116,160,0.26) 0%,transparent 70%);animation:breatheOrb 4s ease-in-out infinite}\n.holo-orb-2{bottom:-160px;right:-100px;width:440px;height:440px;background:radial-gradient(circle,rgba(196,176,255,0.22) 0%,transparent 70%);animation:breatheOrb 5s 1s ease-in-out infinite}\n.holo-orb-3{top:25%;left:38%;width:280px;height:280px;background:radial-gradient(circle,rgba(100,200,255,0.12) 0%,transparent 70%)}\n@keyframes breatheOrb{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}\n/* L1 — grid */\n.holo-grid{z-index:1;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:48px 48px}\n/* L2 — foil texture */\n.holo-foil{z-index:2;background:repeating-linear-gradient(105deg,transparent 0px,transparent 2px,rgba(255,255,255,0.018) 2px,rgba(255,255,255,0.018) 3px)}\n/* L3 — holographic shimmer (mouse-driven) */\n.holo-shimmer{z-index:3;mix-blend-mode:screen;background:radial-gradient(ellipse 700px 480px at var(--shine,50% 50%),rgba(226,116,160,0.42) 0%,rgba(196,176,255,0.32) 18%,rgba(100,200,255,0.22) 36%,rgba(160,255,200,0.14) 54%,rgba(255,220,100,0.09) 70%,transparent 88%)}\n/* L4 — sweep */\n.holo-sweep{z-index:4;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.035) 45%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.035) 55%,transparent 70%);background-size:200% 100%;animation:shimmerSweep 4s linear infinite}\n@keyframes shimmerSweep{0%{background-position:-200% center}100%{background-position:200% center}}\n/* L5 — particles */\n.holo-particles{z-index:5}\n.holo-particle{position:absolute;border-radius:50%;will-change:transform,opacity;animation:floatParticle 3s ease-in-out infinite alternate}\n@keyframes floatParticle{from{transform:translateY(0) scale(1);opacity:.55}to{transform:translateY(-14px) scale(1.4);opacity:1}}\n/* L6 — rotating ring */\n.holo-ring{position:absolute;top:50%;left:50%;width:1600px;height:1600px;margin-top:-800px;margin-left:-800px;border:1px solid rgba(226,116,160,0.07);border-radius:50%;animation:rotateSlow 30s linear infinite;z-index:6;pointer-events:none}\n.holo-ring::before{content:'';position:absolute;top:-4px;left:50%;width:7px;height:7px;background:var(--pink);border-radius:50%;margin-left:-3.5px;box-shadow:0 0 14px var(--pink),0 0 28px rgba(226,116,160,0.6)}\n@keyframes rotateSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}\n/* cursor glow */\n.holo-cursor-glow{position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(226,116,160,0.45) 0%,transparent 70%);filter:blur(18px);pointer-events:none;z-index:7;transform:translate(-50%,-50%);left:var(--mx,50%);top:var(--my,50%);opacity:0;transition:opacity 0.3s}\n.site-header:hover .holo-cursor-glow{opacity:1}\n/* edge glow + top shine */\n.holo-edge-glow{position:absolute;inset:0;z-index:11;pointer-events:none;box-shadow:inset 0 0 100px rgba(226,116,160,0.09),inset 0 0 1px rgba(255,255,255,0.12),inset 0 1px 0 rgba(255,255,255,0.18)}\n.holo-top-shine{position:absolute;top:0;left:0;right:0;height:1px;z-index:12;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.28),transparent);pointer-events:none}\n\n.header-inner{max-width:1200px;margin:0 auto;padding:2.5rem 2rem 2rem;display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;position:relative;z-index:10}\n.header-left{position:relative}\n.header-eyebrow{font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:rgba(245,173,206,0.75);font-weight:600;margin-bottom:0.85rem;display:flex;align-items:center;gap:10px}\n.header-eyebrow-pill{display:inline-flex;align-items:center;gap:8px;padding:4px 4px 4px 5px;border-radius:100px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(8px)}\n.header-eyebrow-mark{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--pink) 0%,#c8a0f0 100%);display:inline-flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:10px;font-weight:700;color:#fff;box-shadow:0 0 16px rgba(226,116,160,0.55),0 0 32px rgba(196,176,255,0.25)}\n.header-eyebrow-pill-text{font-size:9px;letter-spacing:0.16em;color:rgba(255,255,255,0.78);font-weight:700;padding-right:10px}\n.header-eyebrow-dot{width:5px;height:5px;border-radius:50%;background:var(--pink);animation:pulse 2s ease-in-out infinite;box-shadow:0 0 8px var(--pink)}\n@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}\n.header-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:700;line-height:1.05;margin-bottom:0.7rem;letter-spacing:-0.01em}\n.header-title .word-1{background:linear-gradient(135deg,#ffffff 0%,var(--pink-light) 35%,#d4bbff 65%,#ffffff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 16px rgba(245,173,206,0.25))}\n.header-title em{font-style:italic;background:linear-gradient(135deg,var(--pink-light) 0%,#d4bbff 40%,#7eb8ff 70%,var(--pink-light) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 20px rgba(196,176,255,0.3))}\n.header-sub{font-size:14px;color:rgba(255,255,255,0.55);font-weight:300;line-height:1.65;max-width:480px}\n.header-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:1.25rem}\n.h-badge{font-size:10px;font-weight:600;letter-spacing:0.06em;padding:5px 13px;border-radius:100px;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.55);background:rgba(255,255,255,0.04);backdrop-filter:blur(6px)}\n.h-badge.pink{border-color:rgba(226,116,160,0.4);color:var(--pink-light);background:rgba(226,116,160,0.1)}\n.h-badge.lav{border-color:rgba(200,160,240,0.35);color:#d4bbff;background:rgba(200,160,240,0.08)}\n.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:14px;flex-shrink:0}\n.header-instant{display:inline-flex;align-items:center;gap:6px;background:rgba(226,116,160,0.15);border:1px solid rgba(226,116,160,0.35);border-radius:20px;padding:5px 13px;font-size:9px;font-weight:700;color:var(--pink-light);letter-spacing:0.12em;backdrop-filter:blur(8px)}\n.header-instant::before{content:'✦';font-size:10px;color:var(--pink-light)}\n.header-cta{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--pink) 0%,#c8a0f0 100%);color:white;font-size:13px;font-weight:700;padding:11px 22px;border-radius:100px;text-decoration:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;letter-spacing:0.03em;box-shadow:0 4px 24px rgba(226,116,160,0.45),0 0 40px rgba(226,116,160,0.2)}\n.header-cta:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(226,116,160,0.55),0 0 50px rgba(226,116,160,0.3)}\n.header-stat-mini{display:flex;gap:20px}\n.hsm{text-align:center}\n.hsm-val{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#ffffff 0%,var(--pink-light) 50%,#d4bbff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}\n.hsm-label{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.12em;margin-top:3px}\n@media(prefers-reduced-motion:reduce){.site-header{transform:none!important}.holo-orb,.holo-particle,.holo-sweep,.holo-ring{animation:none!important}}\n\n/* TOPBAR NAV */\n.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:rgba(26,23,34,0.92);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(14px)}\n.nav-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}\n.nav-tabs::-webkit-scrollbar{display:none}\n.nav-tab{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:1rem 1.25rem;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.18s;white-space:nowrap}\n.nav-tab:hover{color:var(--text)}\n.nav-tab.active{color:var(--pink);border-bottom-color:var(--pink)}\n.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}\n.add-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:7px 16px;border-radius:20px;border:none;background:var(--pink);color:white;cursor:pointer;transition:all 0.18s;white-space:nowrap}\n.add-btn:hover{background:#d4608e}\n\n/* MAIN */\n.main{max-width:1200px;margin:0 auto;padding:2rem;display:flex;flex-direction:column;align-items:stretch}\n.page{display:none;width:100%;max-width:1140px;margin:0 auto}\n.page.active{display:block}\n\n/* STAT CARDS */\n.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:2rem}\n.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;position:relative;overflow:hidden}\n.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--pink),transparent);opacity:0;transition:opacity 0.3s}\n.stat-card:hover::after{opacity:1}\n.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);margin-bottom:8px;font-weight:600}\n.stat-value{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;line-height:1}\n.stat-sub{font-size:12px;color:var(--text-muted);margin-top:4px;font-weight:300}\n.stat-pink .stat-value{background:linear-gradient(135deg,var(--pink),var(--lav));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.stat-conversion{background:linear-gradient(135deg,rgba(226,116,160,0.08),rgba(200,160,240,0.08));border-color:var(--border-pink)}\n.conversion-ring{position:relative;width:56px;height:56px;margin-bottom:8px}\n.conversion-ring svg{transform:rotate(-90deg)}\n.conversion-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:13px;font-weight:700;background:linear-gradient(135deg,var(--pink),var(--lav));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n\n/* SEC HEADERS */\n.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}\n.sec-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700}\n.sec-title em{font-style:italic;color:var(--pink)}\n.sec-label{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--pink);font-weight:600;margin-bottom:4px}\n\n/* BUTTON {display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}\n.filter-select,.search-input{font-family:'DM Sans',sans-serif;font-size:12px;background:var(--surface);border:1px solid var(--border);color:var(--text-mid);padding:7px 12px;border-radius:10px;cursor:pointer;outline:none;transition:border-color 0.18s}\n.filter-select:focus,.search-input:focus{border-color:var(--border-pink)}\n.search-input{color:var(--text);width:200px}\n.search-input::placeholder{color:var(--text-muted)}\n\n/* FORM */\n.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}\n.form-group{display:flex;flex-direction:column;gap:6px}\n.form-group.full{grid-column:span 3}\n.form-group.half{grid-column:span 2}\nlabel{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-muted);font-weight:600}\ninput,select,textarea{font-family:'DM Sans',sans-serif;font-size:13px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 13px;border-radius:10px;outline:none;transition:border-color 0.18s;width:100%}\ninput:focus,select:focus,textarea:focus{border-color:var(--border-pink)}\ntextarea{resize:vertical;min-height:80px}\nselect option{background:#1a1620}\n\n/* PRICE CALC */\n.calc-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;margin-bottom:1.5rem}\n.calc-section{margin-bottom:1.75rem}\n.calc-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:1rem}\n.calc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}\n.calc-row:last-child{border-bottom:none}\n.calc-row label{font-size:13px;color:var(--text-mid);font-weight:300;cursor:pointer;display:flex;align-items:center;gap:10px}\n.calc-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--pink);flex-shrink:0}\n.calc-row input[type=number]{width:90px;text-align:right;background:var(--surface2);border:1px solid var(--border);padding:6px 10px;border-radius:8px;font-size:13px;color:var(--text)}\n.calc-total{background:linear-gradient(135deg,rgba(226,116,160,0.1),rgba(200,160,240,0.1));border:1px solid var(--border-pink);border-radius:12px;padding:1.5rem;display:flex;align-items:center;justify-content:space-between;margin-top:1.5rem}\n.calc-total-label{font-size:13px;color:var(--text-mid);font-weight:300}\n.calc-total-price{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;background:linear-gradient(135deg,var(--pink),var(--lav));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}\n.calc-pitch{margin-top:1rem;padding:1rem;background:var(--surface2);border-left:3px solid var(--pink);border-radius:0 10px 10px 0;font-size:13px;color:var(--text-mid);font-style:italic;line-height:1.7}\n\n/* KANBAN */\n.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}\n.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:14px;min-height:300px;padding:1rem}\n.kanban-col-header{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}\n.kanban-count{background:var(--surface2);border:1px solid var(--border);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-muted)}\n.kanban-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}\n.kanban-card:hover{border-color:var(--border-pink);transform:translateY(-1px)}\n.kanban-card-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}\n.kanban-card-meta{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}\n.kanban-card-price{font-size:12px;color:var(--pink);font-weight:600;margin-top:6px}\n\n/* FOLLOW-UP */\n.followup-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1rem;cursor:pointer;transition:border-color 0.2s}\n.followup-card:hover{border-color:var(--border-pink)}\n.followup-brand{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px}\n.followup-meta{font-size:12px;color:var(--text-muted);margin-bottom:12px;font-weight:300}\n.followup-timeline{display:flex;gap:0;position:relative}\n.followup-timeline::before{content:'';position:absolute;top:12px;left:12px;right:12px;height:1px;background:var(--border);z-index:0}\n.followup-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1}\n.followup-dot{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;transition:all 0.2s}\n.followup-dot.done{background:var(--pink);border-color:var(--pink);color:white}\n.followup-dot.next{background:var(--surface);border-color:var(--pink);color:var(--pink);box-shadow:0 0 0 3px rgba(226,116,160,0.2)}\n.followup-step-label{font-size:10px;color:var(--text-muted);text-align:center;line-height:1.3}\n\n/* REVENUE */\n.revenue-section{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:2rem}\n.chart-card,.revenue-breakdown{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem}\n.rev-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}\n.rev-item:last-child{border-bottom:none}\n.rev-niche{color:var(--text-mid);font-weight:300}\n\n/* AI ANALYZER */\n.ai-card{background:var(--surface);border:1px solid var(--border-pink);border-radius:14px;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden}\n.ai-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--lav));opacity:0.06;pointer-events:none}\n.ai-glow-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(226,116,160,0.15),rgba(200,160,240,0.15));border:1px solid var(--border-pink);border-radius:100px;padding:5px 14px;font-size:11px;font-weight:600;color:var(--pink);margin-bottom:1rem}\n.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);animation:pulse 1.5s ease-in-out infinite}\n.ai-textarea{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem;font-size:13px;color:var(--text);width:100%;min-height:140px;resize:vertical;outline:none;font-family:'DM Sans',sans-serif;line-height:1.7;transition:border-color 0.2s}\n.ai-textarea:focus{border-color:var(--border-pink)}\n.ai-textarea::placeholder{color:var(--text-muted)}\n.ai-result{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-top:1.25rem;display:none}\n.ai-result.show{display:block}\n.ai-score-row{display:flex;align-items:center;gap:16px;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}\n.ai-score-circle{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--lav));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:white;flex-shrink:0}\n.ai-score-label{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px}\n.ai-score-sub{font-size:12px;color:var(--text-muted);font-weight:300}\n.ai-feedback{font-size:13px;color:var(--text-mid);line-height:1.8;font-weight:300}\n.ai-feedback strong{color:var(--text);font-weight:500}\n.ai-loading{display:none;padding:1.5rem;text-align:center;color:var(--text-muted);font-size:13px}\n.ai-loading.show{display:block}\n.ai-loading-dots span{animation:blink 1.4s infinite both}\n.ai-loading-dots span:nth-child(2){animation-delay:0.2s}\n.ai-loading-dots span:nth-child(3){animation-delay:0.4s}\n@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}\n.ai-tips-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1rem}\n.ai-tip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}\n.ai-tip-label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--pink);font-weight:600;margin-bottom:6px}\n.ai-tip-text{font-size:12px;color:var(--text-muted);line-height:1.6;font-weight:300}\n\n/* MODAL */\n.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1rem}\n.modal-bg.open{display:flex}\n.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:2rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;position:relative}\n.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}\n.modal-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700}\n.modal-close{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}\n.modal-close:hover{border-color:var(--border-pink);color:var(--pink)}\n.modal-detail-row{display:flex;gap:10px;margin-bottom:10px;font-size:13px}\n.modal-detail-label{color:var(--text-muted);width:120px;flex-shrink:0;font-weight:300}\n.modal-detail-val{color:var(--text)}\n.modal-notes{background:var(--surface2);border-radius:10px;padding:1rem;font-size:13px;color:var(--text-mid);line-height:1.7;font-weight:300;margin-top:1rem}\n\n/* TOAST */\n.toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface);border:1px solid var(--border-pink);border-radius:12px;padding:12px 20px;font-size:13px;color:var(--text);z-index:999;transform:translateY(100px);opacity:0;transition:all 0.3s;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}\n.toast.show{transform:translateY(0);opacity:1}\n.toast-dot{width:8px;height:8px;border-radius:50%;background:var(--pink)}\n.empty{text-align:center;padding:3rem;color:var(--text-muted)}\n.empty-icon{font-size:2rem;margin-bottom:1rem;opacity:0.4}\n.empty p{font-size:14px;font-weight:300}\n\n@media(max-width:900px){\n  .stat-row{grid-template-columns:repeat(2,1fr)}\n  .header-inner{flex-direction:column;align-items:flex-start}\n  .header-right{align-items:flex-start;flex-direction:row;flex-wrap:wrap}\n  .kanban{grid-template-columns:1fr 1fr}\n  .revenue-section{grid-template-columns:1fr}\n  .form-grid{grid-template-columns:1fr}\n  .form-group.full,.form-group.half{grid-column:span 1}\n  .ai-tips-grid{grid-template-columns:1fr}\n  .main{padding:1rem}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- SITE HEADER — HOLOGRAPHIC -->\n<div class=\"site-header-stage\">\n<div class=\"site-header\" id=\"holo-header\">\n  <!-- L0 orbs -->\n  <div class=\"holo-layer holo-orbs\">\n    <div class=\"holo-orb holo-orb-1\"><\u002Fdiv>\n    <div class=\"holo-orb holo-orb-2\"><\u002Fdiv>\n    <div class=\"holo-orb holo-orb-3\"><\u002Fdiv>\n  <\u002Fdiv>\n  <!-- L1 grid -->\n  <div class=\"holo-layer holo-grid\"><\u002Fdiv>\n  <!-- L2 foil -->\n  <div class=\"holo-layer holo-foil\"><\u002Fdiv>\n  <!-- L3 shimmer (mouse-driven) -->\n  <div class=\"holo-layer holo-shimmer\"><\u002Fdiv>\n  <!-- L4 sweep -->\n  <div class=\"holo-layer holo-sweep\"><\u002Fdiv>\n  <!-- L5 particles -->\n  <div class=\"holo-layer holo-particles\" id=\"holo-particles\"><\u002Fdiv>\n  <!-- L6 ring with pink dot -->\n  <div class=\"holo-ring\"><\u002Fdiv>\n  <!-- cursor glow -->\n  <div class=\"holo-cursor-glow\"><\u002Fdiv>\n\n  <div class=\"header-inner\">\n    <div class=\"header-left\">\n      <div class=\"header-eyebrow\">\n        <span class=\"header-eyebrow-pill\"><span class=\"header-eyebrow-mark\">Pr<\u002Fspan><span class=\"header-eyebrow-pill-text\">PRINFLUENCE<\u002Fspan><\u002Fspan>\n        <span class=\"header-eyebrow-dot\"><\u002Fspan>Creator Toolkit\n      <\u002Fdiv>\n      <div class=\"header-title\"><span class=\"word-1\">UGC Outreach<\u002Fspan><br><em>Tracker<\u002Fem><\u002Fdiv>\n      <div class=\"header-sub\">Your all-in-one system for tracking every pitch, follow-up, and deal — with an AI pitch analyzer built in.<\u002Fdiv>\n      <div class=\"header-badges\">\n        <span class=\"h-badge pink\">Pipeline Tracker<\u002Fspan>\n        <span class=\"h-badge lav\">AI Pitch Analyzer<\u002Fspan>\n        <span class=\"h-badge\">Price Calculator<\u002Fspan>\n        <span class=\"h-badge\">Revenue Dashboard<\u002Fspan>\n        <span class=\"h-badge\">Follow-up System<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"header-right\">\n      <span class=\"header-instant\">INSTANT ACCESS<\u002Fspan>\n      <div class=\"header-stat-mini\" id=\"header-stats\">\n        <div class=\"hsm\"><div class=\"hsm-val\" id=\"hs-brands\">0<\u002Fdiv><div class=\"hsm-label\">Brands<\u002Fdiv><\u002Fdiv>\n        <div class=\"hsm\"><div class=\"hsm-val\" id=\"hs-pipeline\">$0<\u002Fdiv><div class=\"hsm-label\">Pipeline<\u002Fdiv><\u002Fdiv>\n        <div class=\"hsm\"><div class=\"hsm-val\" id=\"hs-rate\">0%<\u002Fdiv><div class=\"hsm-label\">Close Rate<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"header-cta\" onclick=\"openAddModal()\">+ Add Brand<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"holo-edge-glow\"><\u002Fdiv>\n  <div class=\"holo-top-shine\"><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- STICKY NAV -->\n<div class=\"topbar\">\n  <div class=\"nav-tabs\">\n    <button class=\"nav-tab active\" onclick=\"showPage('dashboard',this)\">Dashboard<\u002Fbutton>\n    <button class=\"nav-tab\" onclick=\"showPage('pipeline',this)\">Pipeline<\u002Fbutton>\n    <button class=\"nav-tab\" onclick=\"showPage('ai',this)\">✦ AI Analyzer<\u002Fbutton>\n    <button class=\"nav-tab\" onclick=\"showPage('calculator',this)\">Price Calculator<\u002Fbutton>\n    <button class=\"nav-tab\" onclick=\"showPage('followups',this)\">Follow-ups<\u002Fbutton>\n    <button class=\"nav-tab\" onclick=\"showPage('revenue',this)\">Revenue<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"nav-right\">\n    <button class=\"add-btn\" onclick=\"openAddModal()\">+ Add Brand<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"main\">\n\n<!-- ── DASHBOARD ── -->\n<div id=\"dashboard\" class=\"page active\">\n  <div style=\"margin-bottom:1.75rem\">\n    <div class=\"sec-label\">Overview<\u002Fdiv>\n    <div class=\"sec-title\">Your pitch <em>command center<\u002Fem><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stat-row\" id=\"stat-row\"><\u002Fdiv>\n  <div class=\"sec-header\">\n    <div><div class=\"sec-label\">Needs Attention<\u002Fdiv><div class=\"sec-title\" style=\"font-size:1.1rem\">Due for follow-up<\u002Fdiv><\u002Fdiv>\n    <button class=\"btn btn-sm\" onclick=\"showPage('pipeline',document.querySelectorAll('.nav-tab')[1])\">View all →<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"table-wrap\" style=\"margin-bottom:2rem\">\n    <table><thead><tr><th>Brand<\u002Fth><th>Status<\u002Fth><th>Last Contacted<\u002Fth><th>Follow-up Due<\u002Fth><th>Price<\u002Fth><th>Action<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody id=\"dashboard-table\"><\u002Ftbody><\u002Ftable>\n  <\u002Fdiv>\n  <div>\n    <div class=\"sec-label\" style=\"margin-bottom:1rem\">Pipeline at a glance<\u002Fdiv>\n    <div class=\"kanban\" id=\"mini-kanban\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── PIPELINE ── -->\n<div id=\"pipeline\" class=\"page\">\n  <div class=\"sec-header\">\n    <div><div class=\"sec-label\">All Brands<\u002Fdiv><div class=\"sec-title\">Outreach <em>pipeline<\u002Fem><\u002Fdiv><\u002Fdiv>\n    <button class=\"btn btn-primary\" onclick=\"openAddModal()\">+ Add Brand<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"filter-row\">\n    <input class=\"search-input\" type=\"text\" placeholder=\"Search brands...\" oninput=\"filterTable()\" id=\"search-input\">\n    <select class=\"filter-select\" onchange=\"filterTable()\" id=\"status-filter\">\n      <option value=\"\">All Statuses<\u002Foption>\n      <option>Reach Out<\u002Foption><option>Initial Message Sent<\u002Foption><option>Waiting for Response<\u002Foption>\n      <option>Need to Follow-up<\u002Foption><option>Follow-up 1<\u002Foption><option>Follow-up 2<\u002Foption>\n      <option>Final Follow-up<\u002Foption><option>Email Received<\u002Foption><option>Deal Closed<\u002Foption><option>NOT INTERESTED<\u002Foption>\n    <\u002Fselect>\n    <select class=\"filter-select\" onchange=\"filterTable()\" id=\"niche-filter\">\n      <option value=\"\">All Niches<\u002Foption>\n      <option>Skincare &amp; Beauty<\u002Foption><option>Health &amp; Supplements<\u002Foption><option>Fragrances<\u002Foption>\n      <option>Fashion &amp; Apparel<\u002Foption><option>Fitness &amp; Wellness<\u002Foption><option>Food &amp; Beverage<\u002Foption>\n      <option>Creator Tech<\u002Foption><option>Home &amp; Lifestyle<\u002Foption>\n    <\u002Fselect>\n    <select class=\"filter-select\" onchange=\"filterTable()\" id=\"platform-filter\">\n      <option value=\"\">All Platforms<\u002Foption>\n      <option>Email<\u002Foption><option>Instagram DM<\u002Foption><option>TikTok DM<\u002Foption><option>Amazon<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n  <div class=\"table-wrap\">\n    <table><thead><tr><th>Brand<\u002Fth><th>Status<\u002Fth><th>Niche<\u002Fth><th>Platform<\u002Fth><th>Price<\u002Fth><th>Last Contacted<\u002Fth><th>Follow-up Due<\u002Fth><th>Deal<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody id=\"pipeline-table\"><\u002Ftbody><\u002Ftable>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── AI ANALYZER ── -->\n<div id=\"ai\" class=\"page\">\n  <div style=\"margin-bottom:1.75rem\">\n    <div class=\"sec-label\">Powered by AI<\u002Fdiv>\n    <div class=\"sec-title\">Pitch <em>analyzer<\u002Fem><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ai-card\">\n    <div class=\"ai-glow-badge\"><span class=\"ai-dot\"><\u002Fspan>AI-Powered · Instant Feedback<\u002Fdiv>\n    <div style=\"font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px\">Paste your pitch. Get a score + fix list.<\u002Fdiv>\n    <div style=\"font-size:13px;color:var(--text-muted);font-weight:300;margin-bottom:1.25rem;line-height:1.7\">Drop in your cold DM, email pitch, or follow-up. The AI will score it out of 10 on the P.A.I.D. framework and tell you exactly what to fix before you hit send.<\u002Fdiv>\n    <textarea class=\"ai-textarea\" id=\"ai-pitch-input\" placeholder=\"Paste your pitch here...\n\ne.g. Hi [Brand], I love your products! I'm a UGC creator and would love to work together. Let me know if you're interested!\"><\u002Ftextarea>\n    <div style=\"display:flex;align-items:center;gap:12px;margin-top:1rem;flex-wrap:wrap\">\n      <button class=\"btn btn-primary\" onclick=\"analyzePitch()\" id=\"ai-analyze-btn\">Analyze my pitch ✦<\u002Fbutton>\n      <button class=\"btn btn-sm\" onclick=\"loadExamplePitch()\">Load example pitch<\u002Fbutton>\n      <span style=\"font-size:11px;color:var(--text-muted)\">Scored on: Personalization · Clarity · Proof · Direction · CTA<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ai-loading\" id=\"ai-loading\">Analyzing your pitch<span class=\"ai-loading-dots\"><span>.<\u002Fspan><span>.<\u002Fspan><span>.<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <div class=\"ai-result\" id=\"ai-result\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ai-tips-grid\">\n    <div class=\"ai-tip\"><div class=\"ai-tip-label\">✦ Personalization<\u002Fdiv><div class=\"ai-tip-text\">Reference something specific — a campaign, product, or value. Generic openers kill pitches instantly.<\u002Fdiv><\u002Fdiv>\n    <div class=\"ai-tip\"><div class=\"ai-tip-label\">◈ Proof points<\u002Fdiv><div class=\"ai-tip-text\">One metric beats zero metrics every time. Even \"8% engagement rate\" is better than nothing.<\u002Fdiv><\u002Fdiv>\n    <div class=\"ai-tip\"><div class=\"ai-tip-label\">◉ The offer<\u002Fdiv><div class=\"ai-tip-text\">Be specific. \"3 UGC videos for your summer launch\" beats \"I'd love to collab\" every time.<\u002Fdiv><\u002Fdiv>\n    <div class=\"ai-tip\"><div class=\"ai-tip-label\">◇ The CTA<\u002Fdiv><div class=\"ai-tip-text\">One door only. \"Would you be open to a quick chat?\" closes more deals than a list of options.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── PRICE CALCULATOR ── -->\n<div id=\"calculator\" class=\"page\">\n  <div style=\"margin-bottom:1.75rem\"><div class=\"sec-label\">Know your worth<\u002Fdiv><div class=\"sec-title\">Price <em>calculator<\u002Fem><\u002Fdiv><\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n    <div>\n      <div class=\"calc-card\">\n        <div class=\"calc-section\">\n          <div class=\"calc-title\">📹 Video deliverables<\u002Fdiv>\n          <div class=\"calc-row\"><label><input type=\"checkbox\" onchange=\"calcPrice()\" id=\"v15\"> 1× short video (15–30 sec)<\u002Flabel><input type=\"number\" value=\"200\" min=\"0\" id=\"v15p\" oninput=\"calcPrice()\" style=\"opacity:0.4;transition:opacity 0.2s\"><\u002Fdiv>\n          <div class=\"calc-row\"><label><input type=\"checkbox\" onchange=\"calcPrice()\" id=\"v60\"> 1× long video (45–60 sec)<\u002Flabel><input type=\"number\" value=\"350\" min=\"0\" id=\"v60p\" oninput=\"calcPrice()\" style=\"opacity:0.4\"><\u002Fdiv>\n          <div class=\"calc-row\"><label><input type=\"checkbox\" onchange=\"calcPrice()\" id=\"v3\"> 3-video bundle<\u002Flabel><input type=\"number\" value=\"550\" min=\"0\" id=\"v3p\" oninput=\"calcPrice()\" style=\"opacity:0.4\"><\u002Fdiv>\n          <div class=\"calc-row\"><label><input type=\"checkbox\" onchange=\"calcPrice()\" id=\"v5\"> 5-video bundle<\u002Flabel><input type=\"number\" value=\"900\" min=\"0\" id=\"v5p\" oninput=\"calcPrice()\" style=\"opacity:0.4\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"calc-section\">\n          <div class=\"calc-title\">📷 Photo deliverables<\u002Fdiv>\n          <div class=\"calc-row\"><label><input type=\"checkbox\" onchange=\"calcPrice()\" id=\"p3\"> Photo set (3 images)<\u002Flabel><input type=\"number\" value=\"150\" min=\"0\" id=\"p3p\" oninput=\"calcPrice()\" style=\"opacity:0.4\"><\u002Fdiv>\n          <div class=\"calc-row\"><label><input type=\"checkbox\" onchange=\"calcPrice()\" id=\"p6\"> Photo set (6 images)<\u002Flabel><input type=\"number\" value=\"250\" min=\"0\" id=\"p6p\" oninput=\"calcPrice()\" style=\"opacity:0.4\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"calc-section\">\n          <div class=\"calc-title\">⚖️ Usage rights add-ons<\u002Fdiv>\n          <div class=\"calc-row\"><label><input type=\"checkbox\" onchange=\"calcPrice()\" id=\"u30\"> Paid ads — 30 days<\u002Flabel><input type=\"number\" value=\"150\" min=\"0\" id=\"u30p\" oninput=\"calcPrice()\" style=\"opacity:0.4\"><\u002Fdiv>\n          <div class=\"calc-row\"><label><input type=\"checkbox\" onchange=\"calcPrice()\" id=\"u90\"> Paid ads — 90 days<\u002Flabel><input type=\"number\" value=\"300\" min=\"0\" id=\"u90p\" oninput=\"calcPrice()\" style=\"opacity:0.4\"><\u002Fdiv>\n          <div class=\"calc-row\"><label><input type=\"checkbox\" onchange=\"calcPrice()\" id=\"u6m\"> Paid ads — 6 months<\u002Flabel><input type=\"number\" value=\"500\" min=\"0\" id=\"u6mp\" oninput=\"calcPrice()\" style=\"opacity:0.4\"><\u002Fdiv>\n          <div class=\"calc-row\"><label><input type=\"checkbox\" onchange=\"calcPrice()\" id=\"u1y\"> Paid ads — 12 months<\u002Flabel><input type=\"number\" value=\"800\" min=\"0\" id=\"u1yp\" oninput=\"calcPrice()\" style=\"opacity:0.4\"><\u002Fdiv>\n          <div class=\"calc-row\"><label><input type=\"checkbox\" onchange=\"calcPrice()\" id=\"uwl\"> Whitelisting / boosting<\u002Flabel><input type=\"number\" value=\"200\" min=\"0\" id=\"uwlp\" oninput=\"calcPrice()\" style=\"opacity:0.4\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div class=\"calc-card\" style=\"position:sticky;top:60px\">\n        <div class=\"sec-label\" style=\"margin-bottom:0.75rem\">Your rate<\u002Fdiv>\n        <div class=\"calc-total\">\n          <div><div class=\"calc-total-label\">Total package price<\u002Fdiv><div class=\"calc-total-price\" id=\"calc-total\">$0<\u002Fdiv><\u002Fdiv>\n          <button class=\"btn btn-primary\" onclick=\"copyPitchLine()\">Copy pitch line<\u002Fbutton>\n        <\u002Fdiv>\n        <div id=\"calc-breakdown\" style=\"margin-top:1.25rem\"><\u002Fdiv>\n        <div class=\"calc-pitch\" id=\"calc-pitch-line\">Select your deliverables above to generate your pitch line.<\u002Fdiv>\n        <div style=\"margin-top:1.5rem\">\n          <div class=\"sec-label\" style=\"margin-bottom:0.75rem\">Rate guide<\u002Fdiv>\n          <div style=\"font-size:12px;color:var(--text-muted);line-height:1.9;font-weight:300\">✦ &nbsp;No followers needed for UGC rates<br>✦ &nbsp;Usage rights double your base rate<br>✦ &nbsp;Always include at least one revision<br>✦ &nbsp;Raise rates 10–20% every 3 months<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── FOLLOW-UPS ── -->\n<div id=\"followups\" class=\"page\">\n  <div style=\"margin-bottom:1.75rem\"><div class=\"sec-label\">Stay on schedule<\u002Fdiv><div class=\"sec-title\">Follow-up <em>tracker<\u002Fem><\u002Fdiv><\u002Fdiv>\n  <div id=\"followup-list\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── REVENUE ── -->\n<div id=\"revenue\" class=\"page\">\n  <div style=\"margin-bottom:1.75rem\"><div class=\"sec-label\">Money moves<\u002Fdiv><div class=\"sec-title\">Revenue <em>tracker<\u002Fem><\u002Fdiv><\u002Fdiv>\n  <div class=\"stat-row\" id=\"rev-stats\" style=\"grid-template-columns:repeat(3,1fr)\"><\u002Fdiv>\n  <div class=\"revenue-section\">\n    <div class=\"chart-card\">\n      <div class=\"sec-label\" style=\"margin-bottom:1rem\">Pipeline value by stage<\u002Fdiv>\n      <div style=\"position:relative;height:260px\"><canvas id=\"revenueChart\" role=\"img\" aria-label=\"Bar chart of pipeline value by stage\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"revenue-breakdown\">\n      <div class=\"sec-label\" style=\"margin-bottom:1rem\">By niche<\u002Fdiv>\n      <div id=\"rev-niche-list\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div><div class=\"sec-label\" style=\"margin-bottom:1rem\">Closed deals<\u002Fdiv>\n    <div class=\"table-wrap\">\n      <table><thead><tr><th>Brand<\u002Fth><th>Deliverables<\u002Fth><th>Amount<\u002Fth><th>Niche<\u002Fth><th>Closed<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody id=\"deals-table\"><\u002Ftbody><\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ADD MODAL -->\n<div class=\"modal-bg\" id=\"add-modal\">\n  <div class=\"modal\">\n    <div class=\"modal-header\"><div class=\"modal-title\">Add brand<\u002Fdiv><button class=\"modal-close\" onclick=\"closeModal('add-modal')\">×<\u002Fbutton><\u002Fdiv>\n    <div class=\"form-grid\">\n      <div class=\"form-group\"><label>Brand Name *<\u002Flabel><input type=\"text\" id=\"f-brand\" placeholder=\"e.g. Bloom Nutrition\"><\u002Fdiv>\n      <div class=\"form-group\"><label>Contact Name<\u002Flabel><input type=\"text\" id=\"f-contact\" placeholder=\"First Last\"><\u002Fdiv>\n      <div class=\"form-group\"><label>Email<\u002Flabel><input type=\"email\" id=\"f-email\" placeholder=\"hello@brand.com\"><\u002Fdiv>\n      <div class=\"form-group\"><label>Status<\u002Flabel>\n        <select id=\"f-status\"><option>Reach Out<\u002Foption><option>Initial Message Sent<\u002Foption><option>Waiting for Response<\u002Foption><option>Need to Follow-up<\u002Foption><option>Follow-up 1<\u002Foption><option>Follow-up 2<\u002Foption><option>Final Follow-up<\u002Foption><option>Email Received<\u002Foption><option>Deal Closed<\u002Foption><option>NOT INTERESTED<\u002Foption><\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"form-group\"><label>Niche<\u002Flabel>\n        <select id=\"f-niche\"><option>Skincare &amp; Beauty<\u002Foption><option>Health &amp; Supplements<\u002Foption><option>Fragrances<\u002Foption><option>Fashion &amp; Apparel<\u002Foption><option>Fitness &amp; Wellness<\u002Foption><option>Food &amp; Beverage<\u002Foption><option>Creator Tech<\u002Foption><option>Home &amp; Lifestyle<\u002Foption><\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"form-group\"><label>Platform<\u002Flabel>\n        <select id=\"f-platform\"><option>Email<\u002Foption><option>Instagram DM<\u002Foption><option>TikTok DM<\u002Foption><option>Amazon<\u002Foption><option>Brand Form<\u002Foption><option>Twitter/X DM<\u002Foption><\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"form-group\"><label>Price ($)<\u002Flabel><input type=\"number\" id=\"f-price\" placeholder=\"0\" min=\"0\"><\u002Fdiv>\n      <div class=\"form-group\"><label>Last Contacted<\u002Flabel><input type=\"date\" id=\"f-last\"><\u002Fdiv>\n      <div class=\"form-group\"><label>Follow-up Due<\u002Flabel><input type=\"date\" id=\"f-followup\"><\u002Fdiv>\n      <div class=\"form-group full\"><label>Deliverables<\u002Flabel><input type=\"text\" id=\"f-deliverables\" placeholder=\"e.g. 3 UGC videos (30 sec), paid ads 90 days\"><\u002Fdiv>\n      <div class=\"form-group full\"><label>Notes<\u002Flabel><textarea id=\"f-notes\" placeholder=\"Anything relevant...\"><\u002Ftextarea><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;margin-top:1.5rem;justify-content:flex-end\">\n      <button class=\"btn\" onclick=\"closeModal('add-modal')\">Cancel<\u002Fbutton>\n      <button class=\"btn btn-primary\" onclick=\"addBrand()\">Add brand →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- VIEW MODAL -->\n<div class=\"modal-bg\" id=\"view-modal\">\n  <div class=\"modal\">\n    <div class=\"modal-header\"><div class=\"modal-title\" id=\"vm-title\">Brand<\u002Fdiv><button class=\"modal-close\" onclick=\"closeModal('view-modal')\">×<\u002Fbutton><\u002Fdiv>\n    <div id=\"vm-content\"><\u002Fdiv>\n    <div style=\"display:flex;gap:10px;margin-top:1.5rem;justify-content:flex-end\">\n      <button class=\"btn btn-sm\" style=\"color:#fca5a5;border-color:rgba(239,68,68,0.3)\" onclick=\"deleteBrand()\">Delete<\u002Fbutton>\n      <button class=\"btn btn-primary btn-sm\" onclick=\"markFollowup()\">Mark followed up<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"toast\" id=\"toast\"><div class=\"toast-dot\"><\u002Fdiv><span id=\"toast-msg\">Done!<\u002Fspan><\u002Fdiv>\n\n<script src=\"61186b34-0a1b-4dd8-8a47-8a01f1738c63\"><\u002Fscript>\n<script>\nconst STATUS_COLORS={'Reach Out':'b-blue','Initial Message Sent':'b-purple','Waiting for Response':'b-gray','Need to Follow-up':'b-yellow','Follow-up 1':'b-yellow','Follow-up 2':'b-yellow','Final Follow-up':'b-orange','Resend Email':'b-orange','Email Received':'b-green','Waiting for Approval':'b-teal','NOT INTERESTED':'b-red','Deal Closed':'b-pink'};\nconst PLATFORM_COLORS={'Email':'b-blue','Instagram DM':'b-pink','TikTok DM':'b-purple','Amazon':'b-orange','Brand Form':'b-yellow','Twitter/X DM':'b-gray'};\n\nlet brands=JSON.parse(localStorage.getItem('prinfluence_brands')||'[]');\nif(!brands.length){brands=[\n  {id:1,brand:'Bloom Nutrition',contact:'Sarah K.',email:'collabs@bloom.com',status:'Need to Follow-up',niche:'Health & Supplements',platform:'Email',price:450,lastContacted:'2026-05-14',followupDue:'2026-05-21',deliverables:'2 UGC videos (30 sec), paid ads 30 days',notes:'Responded positively to initial pitch.',deal:false},\n  {id:2,brand:'Scentlab',contact:'',email:'',status:'Waiting for Response',niche:'Fragrances',platform:'Instagram DM',price:300,lastContacted:'2026-05-16',followupDue:'2026-05-23',deliverables:'1 UGC video (60 sec), organic only',notes:'Sent cold DM referencing their summer collection.',deal:false},\n  {id:3,brand:'Aureday',contact:'Mike T.',email:'mike@aureday.com',status:'Deal Closed',niche:'Creator Tech',platform:'Email',price:800,lastContacted:'2026-05-10',followupDue:'',deliverables:'3-video bundle, paid ads 90 days',notes:'Great to work with.',deal:true},\n  {id:4,brand:'Socialite Lighting',contact:'',email:'',status:'Reach Out',niche:'Home & Lifestyle',platform:'Instagram DM',price:250,lastContacted:'',followupDue:'2026-05-22',deliverables:'Photo set + 1 video',notes:'Aesthetic matches my feed.',deal:false},\n  {id:5,brand:'Rae Wellness',contact:'',email:'press@raewellness.com',status:'Initial Message Sent',niche:'Health & Supplements',platform:'Email',price:600,lastContacted:'2026-05-18',followupDue:'2026-05-25',deliverables:'3-video bundle, paid ads 90 days',notes:'Cold email sent.',deal:false},\n];save();}\nlet viewingId=null;\nfunction save(){localStorage.setItem('prinfluence_brands',JSON.stringify(brands));updateHeaderStats();}\n\nfunction updateHeaderStats(){\n  const total=brands.length;\n  const pipeline=brands.filter(b=>!b.deal).reduce((a,b)=>a+(b.price||0),0);\n  const pitched=brands.filter(b=>b.status!=='Reach Out').length;\n  const closed=brands.filter(b=>b.deal).length;\n  const rate=pitched>0?Math.round((closed/pitched)*100):0;\n  document.getElementById('hs-brands').textContent=total;\n  document.getElementById('hs-pipeline').textContent='$'+pipeline.toLocaleString();\n  document.getElementById('hs-rate').textContent=rate+'%';\n}\n\nfunction showPage(id,btn){\n  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));\n  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));\n  document.getElementById(id).classList.add('active');\n  if(btn)btn.classList.add('active');\n  if(id==='dashboard')renderDashboard();\n  if(id==='pipeline')renderPipeline();\n  if(id==='followups')renderFollowups();\n  if(id==='revenue')renderRevenue();\n}\n\nfunction statusBadge(s){return`<span class=\"badge ${STATUS_COLORS[s]||'b-gray'}\">${s}<\u002Fspan>`}\nfunction platformBadge(p){return`<span class=\"badge ${PLATFORM_COLORS[p]||'b-gray'}\">${p}<\u002Fspan>`}\n\nfunction getConversionRate(){\n  const pitched=brands.filter(b=>b.status!=='Reach Out').length;\n  const closed=brands.filter(b=>b.deal).length;\n  return pitched>0?Math.round((closed/pitched)*100):0;\n}\n\nfunction conversionRing(rate){\n  const r=22,circ=2*Math.PI*r,dash=circ*(rate/100);\n  const color=rate>=30?'#86efac':rate>=15?'#fde047':'#e274a0';\n  return`<div class=\"conversion-ring\"><svg width=\"56\" height=\"56\" viewBox=\"0 0 56 56\"><circle cx=\"28\" cy=\"28\" r=\"${r}\" fill=\"none\" stroke=\"rgba(255,255,255,0.06)\" stroke-width=\"4\"/><circle cx=\"28\" cy=\"28\" r=\"${r}\" fill=\"none\" stroke=\"${color}\" stroke-width=\"4\" stroke-dasharray=\"${dash.toFixed(1)} ${circ.toFixed(1)}\" stroke-linecap=\"round\"/><\u002Fsvg><div class=\"conversion-pct\">${rate}%<\u002Fdiv><\u002Fdiv>`;\n}\n\nfunction renderDashboard(){\n  const total=brands.length;\n  const active=brands.filter(b=>!['NOT INTERESTED','Deal Closed'].includes(b.status)).length;\n  const deals=brands.filter(b=>b.deal);\n  const revenue=deals.reduce((a,b)=>a+(b.price||0),0);\n  const pipeline=brands.filter(b=>!b.deal).reduce((a,b)=>a+(b.price||0),0);\n  const rate=getConversionRate();\n  const pitched=brands.filter(b=>b.status!=='Reach Out').length;\n  document.getElementById('stat-row').innerHTML=`\n    <div class=\"stat-card stat-pink\"><div class=\"stat-label\">Total Pipeline<\u002Fdiv><div class=\"stat-value\">$${pipeline.toLocaleString()}<\u002Fdiv><div class=\"stat-sub\">${active} active brands<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-card\"><div class=\"stat-label\">Deals Closed<\u002Fdiv><div class=\"stat-value\">${deals.length}<\u002Fdiv><div class=\"stat-sub\">$${revenue.toLocaleString()} earned<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-card\"><div class=\"stat-label\">Total Brands<\u002Fdiv><div class=\"stat-value\">${total}<\u002Fdiv><div class=\"stat-sub\">${brands.filter(b=>b.status==='Reach Out').length} to reach out<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-card\"><div class=\"stat-label\">Follow-ups Due<\u002Fdiv><div class=\"stat-value\">${brands.filter(b=>['Need to Follow-up','Follow-up 1','Follow-up 2','Final Follow-up'].includes(b.status)).length}<\u002Fdiv><div class=\"stat-sub\">This week<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-card stat-conversion\"><div class=\"stat-label\">Close Rate<\u002Fdiv>${conversionRing(rate)}<div class=\"stat-sub\">${deals.length} of ${pitched} pitched<\u002Fdiv><\u002Fdiv>\n  `;\n  const due=brands.filter(b=>['Need to Follow-up','Follow-up 1','Follow-up 2'].includes(b.status));\n  document.getElementById('dashboard-table').innerHTML=due.length?due.map(b=>`\n    <tr onclick=\"viewBrand(${b.id})\"><td>${b.brand}<\u002Ftd><td>${statusBadge(b.status)}<\u002Ftd>\n    <td>${b.lastContacted||'—'}<\u002Ftd><td style=\"color:var(--pink)\">${b.followupDue||'—'}<\u002Ftd>\n    <td>${b.price?'$'+b.price.toLocaleString():'—'}<\u002Ftd>\n    <td><button class=\"btn btn-sm\" onclick=\"event.stopPropagation();markDone(${b.id})\">Mark sent<\u002Fbutton><\u002Ftd><\u002Ftr>`).join('')\n    :`<tr><td colspan=\"6\"><div class=\"empty\"><div class=\"empty-icon\">✦<\u002Fdiv><p>No follow-ups due — you're on top of it!<\u002Fp><\u002Fdiv><\u002Ftd><\u002Ftr>`;\n  renderMiniKanban();\n}\n\nfunction renderMiniKanban(){\n  const stages=[['Reach Out','b-blue'],['Active','b-purple'],['Replied','b-green'],['Closed / No','b-gray']];\n  const buckets={'Reach Out':brands.filter(b=>b.status==='Reach Out'),'Active':brands.filter(b=>['Initial Message Sent','Waiting for Response','Need to Follow-up','Follow-up 1','Follow-up 2','Final Follow-up'].includes(b.status)),'Replied':brands.filter(b=>b.status==='Email Received'),'Closed / No':brands.filter(b=>['Deal Closed','NOT INTERESTED'].includes(b.status))};\n  document.getElementById('mini-kanban').innerHTML=stages.map(([s])=>`\n    <div class=\"kanban-col\"><div class=\"kanban-col-header\"><span>${s}<\u002Fspan><div class=\"kanban-count\">${buckets[s].length}<\u002Fdiv><\u002Fdiv>\n    ${buckets[s].slice(0,4).map(b=>`<div class=\"kanban-card\" onclick=\"viewBrand(${b.id})\"><div class=\"kanban-card-name\">${b.brand}<\u002Fdiv><div class=\"kanban-card-meta\">${platformBadge(b.platform)}<\u002Fdiv>${b.price?`<div class=\"kanban-card-price\">$${b.price.toLocaleString()}<\u002Fdiv>`:''}<\u002Fdiv>`).join('')}\n    ${buckets[s].length>4?`<div style=\"font-size:11px;color:var(--text-muted);text-align:center;padding:6px\">+${buckets[s].length-4} more<\u002Fdiv>`:''}<\u002Fdiv>`).join('');\n}\n\nfunction renderPipeline(){\n  const search=(document.getElementById('search-input')?.value||'').toLowerCase();\n  const sf=document.getElementById('status-filter')?.value||'';\n  const nf=document.getElementById('niche-filter')?.value||'';\n  const pf=document.getElementById('platform-filter')?.value||'';\n  const filtered=brands.filter(b=>{\n    if(search&&!b.brand.toLowerCase().includes(search))return false;\n    if(sf&&b.status!==sf)return false;\n    if(nf&&b.niche!==nf)return false;\n    if(pf&&b.platform!==pf)return false;\n    return true;\n  });\n  document.getElementById('pipeline-table').innerHTML=filtered.length?filtered.map(b=>`\n    <tr onclick=\"viewBrand(${b.id})\"><td>${b.brand}${b.contact?`<div style=\"font-size:11px;color:var(--text-muted);margin-top:2px\">${b.contact}<\u002Fdiv>`:''}<\u002Ftd>\n    <td>${statusBadge(b.status)}<\u002Ftd><td><span class=\"badge b-gray\">${b.niche}<\u002Fspan><\u002Ftd>\n    <td>${platformBadge(b.platform)}<\u002Ftd><td>${b.price?'$'+b.price.toLocaleString():'—'}<\u002Ftd>\n    <td>${b.lastContacted||'—'}<\u002Ftd><td style=\"color:${b.followupDue?'var(--pink)':'var(--text-muted)'}\">${b.followupDue||'—'}<\u002Ftd>\n    <td>${b.deal?'<span class=\"badge b-green\">✓ Deal<\u002Fspan>':'—'}<\u002Ftd>\n    <td><button class=\"btn btn-sm\" onclick=\"event.stopPropagation();viewBrand(${b.id})\">View<\u002Fbutton><\u002Ftd><\u002Ftr>`).join('')\n    :`<tr><td colspan=\"9\"><div class=\"empty\"><div class=\"empty-icon\">◈<\u002Fdiv><p>No brands match this filter.<\u002Fp><\u002Fdiv><\u002Ftd><\u002Ftr>`;\n}\nfunction filterTable(){renderPipeline()}\n\nfunction openAddModal(){\n  document.getElementById('add-modal').classList.add('open');\n  const today=new Date().toISOString().split('T')[0];\n  document.getElementById('f-last').value=today;\n  const fu=new Date();fu.setDate(fu.getDate()+7);\n  document.getElementById('f-followup').value=fu.toISOString().split('T')[0];\n}\n\nfunction addBrand(){\n  const name=document.getElementById('f-brand').value.trim();\n  if(!name){showToast('Please enter a brand name');return}\n  brands.unshift({id:Date.now(),brand:name,contact:document.getElementById('f-contact').value,email:document.getElementById('f-email').value,status:document.getElementById('f-status').value,niche:document.getElementById('f-niche').value,platform:document.getElementById('f-platform').value,price:parseFloat(document.getElementById('f-price').value)||0,lastContacted:document.getElementById('f-last').value,followupDue:document.getElementById('f-followup').value,deliverables:document.getElementById('f-deliverables').value,notes:document.getElementById('f-notes').value,deal:false});\n  save();closeModal('add-modal');\n  document.getElementById('f-brand').value='';\n  renderPipeline();renderDashboard();showToast('Brand added ✦');\n}\n\nfunction viewBrand(id){\n  const b=brands.find(x=>x.id===id);if(!b)return;viewingId=id;\n  document.getElementById('vm-title').textContent=b.brand;\n  document.getElementById('vm-content').innerHTML=`\n    <div class=\"modal-detail-row\"><span class=\"modal-detail-label\">Status<\u002Fspan>${statusBadge(b.status)}<\u002Fdiv>\n    <div class=\"modal-detail-row\"><span class=\"modal-detail-label\">Niche<\u002Fspan><span class=\"modal-detail-val\">${b.niche}<\u002Fspan><\u002Fdiv>\n    <div class=\"modal-detail-row\"><span class=\"modal-detail-label\">Platform<\u002Fspan>${platformBadge(b.platform)}<\u002Fdiv>\n    ${b.contact?`<div class=\"modal-detail-row\"><span class=\"modal-detail-label\">Contact<\u002Fspan><span class=\"modal-detail-val\">${b.contact}<\u002Fspan><\u002Fdiv>`:''}\n    ${b.email?`<div class=\"modal-detail-row\"><span class=\"modal-detail-label\">Email<\u002Fspan><span class=\"modal-detail-val\" style=\"color:var(--pink)\">${b.email}<\u002Fspan><\u002Fdiv>`:''}\n    <div class=\"modal-detail-row\"><span class=\"modal-detail-label\">Price<\u002Fspan><span class=\"modal-detail-val\" style=\"color:var(--pink);font-weight:500\">${b.price?'$'+b.price.toLocaleString():'Not set'}<\u002Fspan><\u002Fdiv>\n    <div class=\"modal-detail-row\"><span class=\"modal-detail-label\">Deliverables<\u002Fspan><span class=\"modal-detail-val\">${b.deliverables||'—'}<\u002Fspan><\u002Fdiv>\n    <div class=\"modal-detail-row\"><span class=\"modal-detail-label\">Last Contacted<\u002Fspan><span class=\"modal-detail-val\">${b.lastContacted||'—'}<\u002Fspan><\u002Fdiv>\n    <div class=\"modal-detail-row\"><span class=\"modal-detail-label\">Follow-up Due<\u002Fspan><span class=\"modal-detail-val\" style=\"color:${b.followupDue?'var(--pink)':'inherit'}\">${b.followupDue||'—'}<\u002Fspan><\u002Fdiv>\n    <div class=\"modal-detail-row\"><span class=\"modal-detail-label\">Deal<\u002Fspan>${b.deal?'<span class=\"badge b-green\">✓ Closed<\u002Fspan>':'<span class=\"badge b-gray\">Open<\u002Fspan>'}<\u002Fdiv>\n    ${b.notes?`<div class=\"modal-notes\">${b.notes}<\u002Fdiv>`:''}\n    <div style=\"margin-top:1rem\"><label style=\"font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:6px;display:block\">Update status<\u002Flabel>\n    <select style=\"width:100%\" onchange=\"updateStatus(${id},this.value)\">${['Reach Out','Initial Message Sent','Waiting for Response','Need to Follow-up','Follow-up 1','Follow-up 2','Final Follow-up','Email Received','Deal Closed','NOT INTERESTED'].map(s=>`<option${s===b.status?' selected':''}>${s}<\u002Foption>`).join('')}<\u002Fselect><\u002Fdiv>`;\n  document.getElementById('view-modal').classList.add('open');\n}\n\nfunction updateStatus(id,status){\n  const b=brands.find(x=>x.id===id);if(!b)return;\n  b.status=status;if(status==='Deal Closed')b.deal=true;\n  b.lastContacted=new Date().toISOString().split('T')[0];\n  const fu=new Date();fu.setDate(fu.getDate()+7);\n  b.followupDue=['Deal Closed','NOT INTERESTED'].includes(status)?'':fu.toISOString().split('T')[0];\n  save();showToast('Status updated');renderDashboard();renderPipeline();\n}\n\nfunction markDone(id){\n  const b=brands.find(x=>x.id===id);if(!b)return;\n  const map={'Need to Follow-up':'Follow-up 1','Follow-up 1':'Follow-up 2','Follow-up 2':'Final Follow-up','Final Follow-up':'Waiting for Response'};\n  b.status=map[b.status]||'Waiting for Response';\n  b.lastContacted=new Date().toISOString().split('T')[0];\n  const fu=new Date();fu.setDate(fu.getDate()+7);\n  b.followupDue=fu.toISOString().split('T')[0];\n  save();renderDashboard();renderPipeline();showToast('Follow-up marked ✦');\n}\nfunction markFollowup(){if(viewingId)markDone(viewingId);closeModal('view-modal')}\nfunction deleteBrand(){\n  if(!viewingId)return;\n  if(confirm('Delete this brand?')){brands=brands.filter(b=>b.id!==viewingId);save();closeModal('view-modal');renderDashboard();renderPipeline();showToast('Removed');}\n}\n\nfunction renderFollowups(){\n  const due=brands.filter(b=>b.followupDue&&!['Deal Closed','NOT INTERESTED'].includes(b.status)).sort((a,b)=>a.followupDue.localeCompare(b.followupDue));\n  const today=new Date().toISOString().split('T')[0];\n  document.getElementById('followup-list').innerHTML=due.length?due.map(b=>{\n    const stageIdx={'Reach Out':0,'Initial Message Sent':1,'Waiting for Response':1,'Need to Follow-up':1,'Follow-up 1':2,'Follow-up 2':3,'Final Follow-up':4,'Email Received':4}[b.status]??1;\n    const overdue=b.followupDue<today;\n    return`<div class=\"followup-card\" onclick=\"viewBrand(${b.id})\" style=\"border-color:${overdue?'rgba(239,68,68,0.3)':'var(--border)'}\">\n      <div style=\"display:flex;align-items:flex-start;justify-content:space-between\"><div><div class=\"followup-brand\">${b.brand}<\u002Fdiv><div class=\"followup-meta\">${platformBadge(b.platform)} &nbsp; ${b.niche} ${b.price?'· $'+b.price.toLocaleString():''}<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:right\"><div style=\"font-size:12px;color:${overdue?'#fca5a5':'var(--pink)'};font-weight:500\">${overdue?'OVERDUE — ':'Due '}${b.followupDue}<\u002Fdiv>\n      <button class=\"btn btn-sm btn-primary\" style=\"margin-top:6px\" onclick=\"event.stopPropagation();markDone(${b.id});renderFollowups()\">Mark sent<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"followup-timeline\" style=\"margin-top:1rem\">${['Pitched','Follow-up 1','Follow-up 2','Final','Done'].map((s,i)=>`<div class=\"followup-step\"><div class=\"followup-dot ${i<stageIdx?'done':i===stageIdx?'next':''}\">${i<stageIdx?'✓':i+1}<\u002Fdiv><div class=\"followup-step-label\">${s}<\u002Fdiv><\u002Fdiv>`).join('')}<\u002Fdiv>\n    <\u002Fdiv>`}).join(''):`<div class=\"empty\"><div class=\"empty-icon\">✦<\u002Fdiv><p>No follow-ups scheduled.<\u002Fp><\u002Fdiv>`;\n}\n\nlet revenueChart=null;\nfunction renderRevenue(){\n  const closed=brands.filter(b=>b.deal);\n  const totalEarned=closed.reduce((a,b)=>a+(b.price||0),0);\n  const pipeline=brands.filter(b=>!b.deal&&b.status!=='NOT INTERESTED').reduce((a,b)=>a+(b.price||0),0);\n  const avgDeal=closed.length?Math.round(totalEarned/closed.length):0;\n  document.getElementById('rev-stats').innerHTML=`\n    <div class=\"stat-card stat-pink\"><div class=\"stat-label\">Total Earned<\u002Fdiv><div class=\"stat-value\">$${totalEarned.toLocaleString()}<\u002Fdiv><div class=\"stat-sub\">${closed.length} deals closed<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-card\"><div class=\"stat-label\">Pipeline Value<\u002Fdiv><div class=\"stat-value\">$${pipeline.toLocaleString()}<\u002Fdiv><div class=\"stat-sub\">Active opportunities<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-card\"><div class=\"stat-label\">Avg Deal Size<\u002Fdiv><div class=\"stat-value\">$${avgDeal.toLocaleString()}<\u002Fdiv><div class=\"stat-sub\">Per closed deal<\u002Fdiv><\u002Fdiv>`;\n  const sg={'Reach Out':0,'In Progress':0,'Replied':0,'Closed':0};\n  brands.forEach(b=>{\n    if(b.status==='Reach Out')sg['Reach Out']+=(b.price||0);\n    else if(['Initial Message Sent','Waiting for Response','Need to Follow-up','Follow-up 1','Follow-up 2','Final Follow-up'].includes(b.status))sg['In Progress']+=(b.price||0);\n    else if(b.status==='Email Received')sg['Replied']+=(b.price||0);\n    else if(b.status==='Deal Closed')sg['Closed']+=(b.price||0);\n  });\n  if(revenueChart)revenueChart.destroy();\n  revenueChart=new Chart(document.getElementById('revenueChart'),{type:'bar',data:{labels:Object.keys(sg),datasets:[{label:'Value',data:Object.values(sg),backgroundColor:['rgba(226,116,160,0.25)','rgba(200,160,240,0.25)','rgba(74,222,128,0.25)','rgba(226,116,160,0.65)'],borderColor:['#e274a0','#c8a0f0','#4ade80','#e274a0'],borderWidth:1,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'$'+v.toLocaleString(),color:'rgba(240,234,245,0.4)'},grid:{color:'rgba(255,255,255,0.05)'},border:{display:false}},x:{ticks:{color:'rgba(240,234,245,0.5)'},grid:{display:false},border:{display:false}}}}});\n  const niches={};brands.forEach(b=>{if(b.price)niches[b.niche]=(niches[b.niche]||0)+b.price});\n  const sorted=Object.entries(niches).sort((a,b)=>b[1]-a[1]);const maxV=sorted[0]?.[1]||1;\n  document.getElementById('rev-niche-list').innerHTML=sorted.map(([n,v])=>`<div class=\"rev-item\"><div><div class=\"rev-niche\">${n}<\u002Fdiv><div style=\"height:3px;width:${Math.round((v/maxV)*100)}%;background:var(--pink);border-radius:2px;margin-top:4px;opacity:0.6\"><\u002Fdiv><\u002Fdiv><div style=\"color:var(--text);font-weight:500\">$${v.toLocaleString()}<\u002Fdiv><\u002Fdiv>`).join('')||'<div style=\"color:var(--text-muted);font-size:13px\">No data yet<\u002Fdiv>';\n  document.getElementById('deals-table').innerHTML=closed.length?closed.map(b=>`<tr onclick=\"viewBrand(${b.id})\"><td>${b.brand}<\u002Ftd><td style=\"font-size:12px;color:var(--text-muted)\">${b.deliverables||'—'}<\u002Ftd><td style=\"color:var(--pink);font-weight:500\">$${(b.price||0).toLocaleString()}<\u002Ftd><td><span class=\"badge b-gray\">${b.niche}<\u002Fspan><\u002Ftd><td>${b.lastContacted||'—'}<\u002Ftd><\u002Ftr>`).join(''):`<tr><td colspan=\"5\"><div class=\"empty\"><div class=\"empty-icon\">◇<\u002Fdiv><p>No closed deals yet.<\u002Fp><\u002Fdiv><\u002Ftd><\u002Ftr>`;\n}\n\nfunction calcPrice(){\n  const items=[['v15','v15p','1× video (15–30 sec)'],['v60','v60p','1× video (45–60 sec)'],['v3','v3p','3-video bundle'],['v5','v5p','5-video bundle'],['p3','p3p','Photo set (3 images)'],['p6','p6p','Photo set (6 images)'],['u30','u30p','Paid ads 30 days'],['u90','u90p','Paid ads 90 days'],['u6m','u6mp','Paid ads 6 months'],['u1y','u1yp','Paid ads 12 months'],['uwl','uwlp','Whitelisting']];\n  let total=0;const selected=[];\n  items.forEach(([cb,inp,label])=>{const checked=document.getElementById(cb)?.checked;document.getElementById(inp).style.opacity=checked?'1':'0.4';if(checked){const val=parseFloat(document.getElementById(inp).value)||0;total+=val;selected.push({label,val})}});\n  document.getElementById('calc-total').textContent='$'+total.toLocaleString();\n  document.getElementById('calc-breakdown').innerHTML=selected.length?`<div style=\"margin-bottom:1rem\">${selected.map(s=>`<div style=\"display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);padding:4px 0;border-bottom:1px solid var(--border)\"><span>${s.label}<\u002Fspan><span>$${s.val.toLocaleString()}<\u002Fspan><\u002Fdiv>`).join('')}<\u002Fdiv>`:'';\n  const d=selected.filter(s=>!s.label.startsWith('Paid')&&!s.label.startsWith('Whit')).map(s=>s.label).join(' + ');\n  const r=selected.filter(s=>s.label.startsWith('Paid')||s.label.startsWith('Whit')).map(s=>s.label.toLowerCase()).join(' + ');\n  document.getElementById('calc-pitch-line').textContent=total>0?`\"My package is $${total.toLocaleString()} for ${d||'the deliverables discussed'}${r?' with '+r:''}. All content is fully edited and brand-ready.\"` :'Select your deliverables above to generate your pitch line.';\n}\nfunction copyPitchLine(){navigator.clipboard.writeText(document.getElementById('calc-pitch-line').textContent).then(()=>showToast('Pitch line copied ✦')).catch(()=>showToast('Copy the pitch line manually'));}\n\n// ── AI PITCH ANALYZER ──\nfunction loadExamplePitch(){document.getElementById('ai-pitch-input').value=`Hi [Brand], I love your products! I'm a UGC creator and I think we would make a great partnership. I have experience creating content and I think my audience would love your brand. Please let me know if you'd be interested in working together!`;}\n\nasync function analyzePitch(){\n  const pitch=document.getElementById('ai-pitch-input').value.trim();\n  if(!pitch||pitch.length<20){showToast('Please paste a pitch to analyze');return}\n  const btn=document.getElementById('ai-analyze-btn');\n  const loading=document.getElementById('ai-loading');\n  const result=document.getElementById('ai-result');\n  btn.disabled=true;btn.textContent='Analyzing...';\n  loading.classList.add('show');result.classList.remove('show');\n  try{\n    const response=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`You are a UGC pitch coach. Analyze this pitch using the P.A.I.D. framework (Personalized opener, About you, Impact/proof, Direction/offer, CTA). \n\nPitch to analyze:\n\"${pitch}\"\n\nRespond ONLY with a valid JSON object, no markdown, no backticks:\n{\n  \"score\": <number 1-10>,\n  \"verdict\": \"<one sentence overall verdict>\",\n  \"paid_scores\": {\n    \"personalization\": <1-10>,\n    \"about_you\": <1-10>,\n    \"impact\": <1-10>,\n    \"direction\": <1-10>,\n    \"cta\": <1-10>\n  },\n  \"strengths\": [\"<strength 1>\", \"<strength 2>\"],\n  \"fixes\": [\"<specific fix 1>\", \"<specific fix 2>\", \"<specific fix 3>\"],\n  \"rewrite_opening\": \"<rewrite just the first 2 sentences to be better>\"\n}`}]})});\n    const data=await response.json();\n    const text=data.content?.find(c=>c.type==='text')?.text||'{}';\n    let parsed;\n    try{parsed=JSON.parse(text.replace(/```json|```/g,'').trim())}catch(e){parsed=null}\n    loading.classList.remove('show');\n    if(parsed){\n      const scoreColor=parsed.score>=8?'#86efac':parsed.score>=5?'#fde047':'#fca5a5';\n      const paidBars=Object.entries(parsed.paid_scores||{}).map(([k,v])=>`<div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px\"><span style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);width:100px;flex-shrink:0\">${k.replace('_',' ')}<\u002Fspan><div style=\"flex:1;height:4px;background:rgba(255,255,255,0.07);border-radius:2px\"><div style=\"height:100%;width:${v*10}%;background:var(--pink);border-radius:2px;transition:width 0.5s\"><\u002Fdiv><\u002Fdiv><span style=\"font-size:12px;color:var(--text-muted);width:20px;text-align:right\">${v}<\u002Fspan><\u002Fdiv>`).join('');\n      result.innerHTML=`\n        <div class=\"ai-score-row\">\n          <div class=\"ai-score-circle\" style=\"background:linear-gradient(135deg,${scoreColor},var(--lav))\">${parsed.score}/10<\u002Fdiv>\n          <div><div class=\"ai-score-label\">${parsed.verdict||'Analysis complete'}<\u002Fdiv><div class=\"ai-score-sub\">P.A.I.D. framework score<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-bottom:1.25rem\">${paidBars}<\u002Fdiv>\n        ${parsed.strengths?.length?`<div style=\"margin-bottom:1rem\"><div style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:#86efac;font-weight:600;margin-bottom:8px\">✓ What's working<\u002Fdiv>${parsed.strengths.map(s=>`<div style=\"font-size:13px;color:var(--text-mid);padding:5px 0;border-bottom:1px solid var(--border);font-weight:300\">✓ &nbsp;${s}<\u002Fdiv>`).join('')}<\u002Fdiv>`:''}\n        ${parsed.fixes?.length?`<div style=\"margin-bottom:1rem\"><div style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:#fca5a5;font-weight:600;margin-bottom:8px\">✕ Fix these<\u002Fdiv>${parsed.fixes.map(f=>`<div style=\"font-size:13px;color:var(--text-mid);padding:5px 0;border-bottom:1px solid var(--border);font-weight:300\">→ &nbsp;${f}<\u002Fdiv>`).join('')}<\u002Fdiv>`:''}\n        ${parsed.rewrite_opening?`<div style=\"margin-top:1rem\"><div style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--pink);font-weight:600;margin-bottom:8px\">✦ Suggested rewrite<\u002Fdiv><div style=\"padding:1rem;background:var(--surface);border-left:3px solid var(--pink);border-radius:0 10px 10px 0;font-size:13px;color:var(--text-mid);font-style:italic;line-height:1.7\">${parsed.rewrite_opening}<\u002Fdiv><\u002Fdiv>`:''}`;\n      result.classList.add('show');\n    }else{result.innerHTML=`<div class=\"ai-feedback\">Analysis complete. Your pitch scored ${data.content?.[0]?.text?.match(/\\d+/)?.[0]||'—'}/10. Paste a clearer pitch for detailed feedback.<\u002Fdiv>`;result.classList.add('show');}\n  }catch(e){loading.classList.remove('show');showToast('Analysis failed — check connection');}\n  btn.disabled=false;btn.textContent='Analyze my pitch ✦';\n}\n\nfunction closeModal(id){document.getElementById(id).classList.remove('open')}\ndocument.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')}));\n\nfunction showToast(msg){const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}\n\nupdateHeaderStats();\nrenderDashboard();\n\n/* ── HOLOGRAPHIC HEADER: tilt + shimmer + particles ── */\n(function initHoloHeader(){\n  const header = document.getElementById('holo-header');\n  if(!header) return;\n  const cursorGlow = header.querySelector('.holo-cursor-glow');\n  const particleHost = document.getElementById('holo-particles');\n\n  // particles\n  const particles = [\n    [8,10,3,'rgba(226,116,160,0.9)',0,3.2],[85,8,2,'rgba(196,176,255,0.9)',0.5,2.8],\n    [15,80,4,'rgba(226,116,160,0.7)',1,3.5],[90,75,2,'rgba(100,200,255,0.8)',0.3,2.5],\n    [50,5,3,'rgba(160,255,200,0.7)',0.8,4],[5,45,2,'rgba(255,220,100,0.8)',1.2,3],\n    [92,40,3,'rgba(226,116,160,0.8)',0.2,2.7],[45,92,2,'rgba(196,176,255,0.8)',0.7,3.3],\n    [72,20,2,'rgba(100,200,255,0.7)',1.5,2.9],[28,60,3,'rgba(255,180,220,0.7)',0.4,3.8],\n    [60,85,2,'rgba(196,176,255,0.6)',0.9,2.6],[35,15,4,'rgba(226,116,160,0.5)',1.3,4.2]\n  ];\n  if(particleHost){\n    particles.forEach(([x,y,s,c,d,du])=>{\n      const el=document.createElement('div');\n      el.className='holo-particle';\n      el.style.cssText=`left:${x}%;top:${y}%;width:${s}px;height:${s}px;background:${c};box-shadow:0 0 ${s*3}px ${c};animation-delay:${d}s;animation-duration:${du}s`;\n      particleHost.appendChild(el);\n    });\n  }\n\n  // tilt + shimmer (smooth lerp)\n  const target={x:0.5,y:0.5};\n  const smooth={x:0.5,y:0.5};\n  let hovering=false;\n  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n\n  header.addEventListener('mousemove',(e)=>{\n    const r=header.getBoundingClientRect();\n    target.x=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));\n    target.y=Math.max(0,Math.min(1,(e.clientY-r.top)/r.height));\n    hovering=true;\n    if(cursorGlow){\n      cursorGlow.style.setProperty('--mx',(target.x*100)+'%');\n      cursorGlow.style.setProperty('--my',(target.y*100)+'%');\n    }\n  });\n  header.addEventListener('mouseleave',()=>{\n    target.x=0.5;target.y=0.5;hovering=false;\n  });\n\n  function tick(){\n    smooth.x+=(target.x-smooth.x)*0.08;\n    smooth.y+=(target.y-smooth.y)*0.08;\n    if(!reduce){\n      const rx=(smooth.y-0.5)*5;\n      const ry=(smooth.x-0.5)*-7;\n      header.style.transform=`rotateX(${rx.toFixed(2)}deg) rotateY(${ry.toFixed(2)}deg)`;\n    }\n    header.style.setProperty('--shine',`${(smooth.x*100).toFixed(1)}% ${(smooth.y*100).toFixed(1)}%`);\n    requestAnimationFrame(tick);\n  }\n  requestAnimationFrame(tick);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
