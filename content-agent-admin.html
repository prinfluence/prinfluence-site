<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Agent — Prinfluence Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --paper:#F6F3EE;--panel:#FFFFFF;--ink:#1C1620;--ink-soft:rgba(28,22,32,0.62);--ink-faint:rgba(28,22,32,0.38);
  --line:rgba(28,22,32,0.12);--rose:#CE4E84;--gold:#C5A062;--mint:#A8E6C1;
  --font-display:"Fraunces",Georgia,serif;--font-sans:"DM Sans",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--font-sans);min-height:100vh;padding:48px 24px}
.wrap{max-width:820px;margin:0 auto}
.eyebrow{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--rose);font-weight:600;margin-bottom:12px}
h1{font-family:var(--font-display);font-size:30px;font-weight:600;margin-bottom:8px;letter-spacing:-.02em}
.lead{font-size:14.5px;color:var(--ink-soft);margin-bottom:32px}
.toolbar{display:flex;gap:10px;margin-bottom:32px;align-items:center}
.btn{background:var(--ink);color:var(--paper);border:none;padding:13px 22px;border-radius:100px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:var(--font-sans)}
.btn:hover{background:var(--rose)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{background:var(--panel);color:var(--ink)}
.topic-input{flex:1;padding:13px 16px;border:1px solid var(--line);border-radius:100px;font-size:13.5px;font-family:var(--font-sans);outline:none}
.topic-input:focus{border-color:var(--rose)}
.draft-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px;margin-bottom:20px}
.draft-meta{font-size:11px;color:var(--ink-faint);margin-bottom:10px;display:flex;gap:10px}
.draft-title{font-family:var(--font-display);font-size:22px;font-weight:500;margin-bottom:10px;width:100%;border:none;background:transparent;font-family:inherit;color:var(--ink)}
.draft-excerpt{font-size:13.5px;color:var(--ink-soft);width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-family:var(--font-sans)}
.draft-content{font-size:14px;line-height:1.6;width:100%;min-height:300px;border:1px solid var(--line);border-radius:8px;padding:14px;font-family:monospace;font-size:12.5px;color:var(--ink-soft)}
.draft-actions{display:flex;gap:10px;margin-top:16px}
.btn-publish{background:var(--mint);color:#2F6B47}
.btn-publish:hover{background:#8fd9ae}
.btn-delete{background:transparent;color:#A93567;border:1px solid rgba(206,78,132,0.3)}
.btn-delete:hover{background:rgba(206,78,132,0.06)}
.empty{text-align:center;padding:60px 0;color:var(--ink-faint)}
.status-pill{font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:.04em}
.status-pill.draft{background:rgba(197,160,98,0.18);color:#8A6A2E}
.status-pill.published{background:rgba(168,230,193,0.25);color:#2F6B47}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Admin only</div>
  <h1>Content agent</h1>
  <p class="lead">New drafts land here every week. Review, edit if needed, then publish — nothing goes live without your approval.</p>

  <div class="toolbar">
    <input type="text" class="topic-input" id="topicInput" placeholder="Optional: give the agent a specific topic to write about" />
    <button class="btn" id="generateBtn" onclick="generateDraft()">✦ Draft a new post</button>
  </div>

  <div id="draftsContainer">
    <div class="empty">Loading drafts...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xavhjbcmqgoznuggzpep.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_oKv6t4MSb9mG8ggGedTwyQ_ZO3WeNEr';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadDrafts() {
  const container = document.getElementById('draftsContainer');
  try {
    const { data, error } = await sb.from('blog_posts').select('*').order('created_at', { ascending: false });
    if (error) throw error;

    if (!data || data.length === 0) {
      container.innerHTML = '<div class="empty">No posts yet. Click "Draft a new post" to generate your first one.</div>';
      return;
    }

    container.innerHTML = data.map(post => `
      <div class="draft-card" data-id="${post.id}">
        <div class="draft-meta">
          <span class="status-pill ${post.status}">${post.status}</span>
          <span>${post.category || ''}</span>
          <span>${new Date(post.created_at).toLocaleDateString()}</span>
        </div>
        <input class="draft-title" value="${escapeAttr(post.title)}" data-field="title" />
        <textarea class="draft-excerpt" rows="2" data-field="excerpt">${escapeHtml(post.excerpt || '')}</textarea>
        <textarea class="draft-content" data-field="content">${escapeHtml(post.content || '')}</textarea>
        <div class="draft-actions">
          <button class="btn btn-ghost" onclick="saveEdits('${post.id}')">Save edits</button>
          ${post.status === 'draft'
            ? `<button class="btn btn-publish" onclick="publishPost('${post.id}')">Publish →</button>`
            : `<button class="btn btn-ghost" onclick="unpublishPost('${post.id}')">Unpublish</button>`}
          <button class="btn btn-delete" onclick="deletePost('${post.id}')">Delete</button>
        </div>
      </div>
    `).join('');
  } catch (err) {
    console.error(err);
    container.innerHTML = '<div class="empty">Error loading drafts.</div>';
  }
}

function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(s) { return (s||'').replace(/"/g,'&quot;'); }

async function generateDraft() {
  const topic = document.getElementById('topicInput').value.trim();
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = 'Drafting... (~20s)';

  try {
    const res = await fetch('/.netlify/functions/draft-blog-post', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(topic ? { topic } : {})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    document.getElementById('topicInput').value = '';
    loadDrafts();
  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '✦ Draft a new post';
  }
}

async function saveEdits(id) {
  const card = document.querySelector(`.draft-card[data-id="${id}"]`);
  const title = card.querySelector('[data-field="title"]').value;
  const excerpt = card.querySelector('[data-field="excerpt"]').value;
  const content = card.querySelector('[data-field="content"]').value;

  const { error } = await sb.from('blog_posts').update({ title, excerpt, content }).eq('id', id);
  if (error) { alert('Save failed: ' + error.message); return; }
  loadDrafts();
}

async function publishPost(id) {
  const { error } = await sb.from('blog_posts').update({ status: 'published', published_at: new Date().toISOString() }).eq('id', id);
  if (error) { alert('Publish failed: ' + error.message); return; }
  loadDrafts();
}

async function unpublishPost(id) {
  const { error } = await sb.from('blog_posts').update({ status: 'draft' }).eq('id', id);
  if (error) { alert('Failed: ' + error.message); return; }
  loadDrafts();
}

async function deletePost(id) {
  if (!confirm('Delete this post permanently?')) return;
  const { error } = await sb.from('blog_posts').delete().eq('id', id);
  if (error) { alert('Delete failed: ' + error.message); return; }
  loadDrafts();
}

loadDrafts();
</script>
</body>
</html>
